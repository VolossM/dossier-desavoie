<script>
'use strict';
/* ═══════════════════════════════════════════════════════════
   BUILD
═══════════════════════════════════════════════════════════ */
const BUILD_ID = '2026-03-06 10:02';  // horodatage injecté à la génération

/* ═══════════════════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════════════════ */
// PX_PER_DAY supprimé — échelle exponentielle dynamique
let EPOCH_START    = new Date('1929-01-01');  // recalibré dynamiquement dans buildYearSpine
const CANVAS_PAD_TOP    = 48;
const CANVAS_PAD_BOTTOM = 80;
const CANVAS_MIN_WIDTH  = 900;
const CANVAS_FIXED_H_BASE = 6200;  // hauteur de base (px) — CANVAS_FIXED_H = BASE × ZOOM
let   CANVAS_FIXED_H      = 6200;  // hauteur courante (recalculée à chaque rebuild)

// ── Mise en page des bandes de sociétés ──
const BAND_W      = 22;   // largeur d'une lane de société (px)
const BAND_GAP    =  6;   // espace entre axes (inter-axe)
const AXIS_GAP    = 30;   // espace supplémentaire entre axes narratifs distincts
const CARD_OFFSET = 10;   // espace entre bord droit de la bande société et le dot
const AXIS_LEFT   = 32;   // marge gauche du canvas
const CARD_EST_H  = 78;   // hauteur estimée d'une carte complète (px, premier passage)
const PEEK_H      = 20;   // hauteur minimale visible d'une carte compressée (titre seul)
const PEEK_GAP    = 4;    // écart supplémentaire entre cartes compressées
// Moitié de la hauteur de la première ligne du titre (font-size 13.5px × line-height 1.3 / 2).
// Sert à décaler la carte vers le haut pour que la première ligne du titre soit centrée sur le dot.
const CARD_TITLE_HALF_H = Math.round(13.5 * 1.3 / 2); // ≈ 9 px

// Couleur de fond par statut
const STATUS_BG = {
  active:    '#e8f0e8',   // vert pâle : société active
  dormant:   '#e8e8e8',   // gris clair : dormante
  dissolved: '#deded8',   // gris-beige : dissoute
  insolvent: '#fff3cc',   // jaune paille : cessation de paiements / insolvable
  rj:        '#ffd9a8',   // orange pâle : redressement judiciaire
  lj:        '#f5c0c0',   // rouge pâle : liquidation judiciaire
  default:   '#efefec',   // gris neutre
};

// Palette de couleurs pour les dirigeants (jusqu'à 12)
const PERSON_COLORS = [
  '#e8c874','#74b8e8','#e87474','#74e8b4','#c874e8',
  '#e8a474','#74e8e8','#a4e874','#e874c8','#b4b4e8',
  '#e8e874','#74c8e8',
];
let _personColorMap = {};
let _personColorIdx = 0;
function personColor(personId) {
  if (!_personColorMap[personId]) {
    _personColorMap[personId] = PERSON_COLORS[_personColorIdx % PERSON_COLORS.length];
    _personColorIdx++;
  }
  return _personColorMap[personId];
}

// ── Paramètre de tension T (en jours) ──────────────────────
// Fonction : y = PAD_TOP + (H_usable) * (exp(t/T) - 1) / (exp(D/T) - 1)
// Petit T → forte dilatation du passé récent ; T→∞ → linéaire
let SCALE_T       = 1500;   // valeur initiale (jours)
let SCALE_T_OPT   = 1500;   // T optimal calculé après chargement
let SCALE_D       = 1;      // durée totale en jours (calculée après chargement)
const SCALE_T_MIN = 60;
const SCALE_T_MAX = 30000;

// ── Zoom temporel ──────────────────────────────────────────
let ZOOM = 1.0;
const ZOOM_MIN   = 0.4;
const ZOOM_MAX   = 4.0;
const ZOOM_STEPS = [0.4, 0.5, 0.6, 0.75, 1.0, 1.25, 1.5, 2.0, 2.5, 3.0, 4.0];

function expScale(tDays) {
  // Normalise [0, SCALE_D] → [0, 1] selon courbe exponentielle
  // Petit T : les derniers jours occupent une grande fraction
  if (SCALE_T > SCALE_D * 50) return tDays / SCALE_D; // quasi-linéaire
  const num = Math.exp(tDays / SCALE_T) - 1;
  const den = Math.exp(SCALE_D / SCALE_T) - 1;
  return num / den;
}

// FtM schemas that carry event semantics (have a date → rendered on timeline)
const EVENT_SCHEMAS = new Set(['Event','Payment','Directorship','Ownership','Document','CourtCase']);
// schemas rendered as context nodes (resolved in modal, not on timeline)
const CONTEXT_SCHEMAS = new Set(['Person','Company','LegalEntity']);

/* ═══════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════ */
let MANIFEST = null;
let ENTITIES  = {};        // id → entity (deduplicated, merged)
let EVENTS    = [];        // event-bearing entities, sorted by date
let AXIS_MAP  = {};        // axisId → axis config
let MUTED_AXES = new Set();
let MUTED_COS  = new Set();  // coIds des bandes company masquées individuellement
let SHOW_CONNECTORS = false;
let CANVAS_WIDTH = 0;
let CANVAS_HEIGHT = 0;
let INVERT_TIMELINE = true;   // true = plus récent en haut (défaut)
let _uboIndex = null; // { byCompany: Map<coId,[{uboId,pct,estimated}]>, byUbo: Map<uboId,[{coId,pct,estimated}]> }

/* ═══════════════════════════════════════════════════════════
   DATE UTILITIES
═══════════════════════════════════════════════════════════ */
function parseDate(s) {
  if (!s) return null;
  // Supprimer les préfixes de borne (< ou >) issus des dates partielles reconstituées
  s = s.trim().replace(/^[<>]/, '');
  const p = s.split('-');
  const y = parseInt(p[0]);
  const m = p[1] ? parseInt(p[1]) - 1 : 0;
  const d = p[2] ? parseInt(p[2]) : 1;
  if (isNaN(y)) return null;
  return new Date(y, m, d);
}

function daysSinceEpoch(date) {
  if (!date) return 0;
  return (date - EPOCH_START) / 86400000;
}

function dateY(dateStr) {
  const d = parseDate(dateStr);
  if (!d) return CANVAS_PAD_TOP;
  const t = daysSinceEpoch(d);
  const usable = CANVAS_FIXED_H - CANVAS_PAD_TOP - CANVAS_PAD_BOTTOM;
  const raw = Math.round(CANVAS_PAD_TOP + expScale(t) * usable);
  return INVERT_TIMELINE ? (CANVAS_FIXED_H - raw) : raw;
}

function formatDate(s) {
  if (!s) return '';
  const MONTHS = ['jan.','févr.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];
  const p = s.trim().split('-');
  const y = p[0];
  const m = p[1] ? MONTHS[parseInt(p[1])-1] : null;
  const d = p[2] ? parseInt(p[2]) : null;
  if (d && m) return `${d} ${m} ${y}`;
  if (m) return `${m} ${y}`;
  return y;
}

// Retourne une chaîne ISO YYYY-MM-DD décalée de n mois (n peut être ≤ 0)
function addMonths(dateStr, n) {
  const d = parseDate((dateStr || '').trim().replace(/^[<>]/, ''));
  if (!d) return null;
  d.setMonth(d.getMonth() + n);
  return d.getFullYear() + '-'
       + String(d.getMonth() + 1).padStart(2, '0') + '-'
       + String(d.getDate()).padStart(2, '0');
}

function formatAmount(raw, currency) {
  if (!raw) return null;
  const n = parseFloat(raw);
  if (isNaN(n)) return null;
  const abs = Math.abs(n);
  let val;
  if (abs >= 1e9) val = (n/1e9).toFixed(1).replace(/\.0$/,'') + ' Md';
  else if (abs >= 1e6) val = (n/1e6).toFixed(0) + ' M';
  else if (abs >= 1e3) val = (n/1e3).toFixed(0) + ' K';
  else val = n.toFixed(0);
  const sym = currency === 'USD' ? '$' : currency === 'EUR' ? '€' : (currency || '');
  return `${val} ${sym}`.trim();
}

/* ═══════════════════════════════════════════════════════════
   FtM PROPERTY HELPERS
═══════════════════════════════════════════════════════════ */
const p1 = (e, k) => (e?.properties?.[k] || [])[0] || null;
const pAll = (e, k) => e?.properties?.[k] || [];

function eventDate(e) {
  return p1(e,'date') || p1(e,'startDate') || p1(e,'incorporationDate') || null;
}
function eventEndDate(e) {
  return p1(e,'endDate') || p1(e,'dissolutionDate') || null;
}
function eventName(e) {
  const explicit = p1(e,'name') || p1(e,'fileName') || p1(e,'eventLabel');
  if (explicit) return explicit;

  // Générer un titre synthétique pour Directorship et Ownership sans name explicite
  if (e.schema === 'Directorship') {
    const dirId  = p1(e,'director') || p1(e,'person');
    const orgId  = p1(e,'organization');
    const role   = p1(e,'role');
    const dir    = dirId  ? (p1(ENTITIES[dirId],  'name') || dirId)  : null;
    const org    = orgId  ? (p1(ENTITIES[orgId],  'name') || orgId)  : null;
    const end    = p1(e,  'endDate');
    const label  = role ? role : (end ? 'Ex-dirigeant' : 'Dirigeant');
    if (dir && org) return `${label} : ${dir} → ${org}`;
    if (dir) return `${label} : ${dir}`;
    if (org) return `${label} : ${org}`;
    return 'Mandat';
  }
  if (e.schema === 'Ownership') {
    const ownerId = p1(e,'owner');
    const assetId = p1(e,'asset');
    const pct     = p1(e,'percentage');
    const owner   = ownerId ? (p1(ENTITIES[ownerId], 'name') || ownerId) : null;
    const asset   = assetId ? (p1(ENTITIES[assetId], 'name') || assetId) : null;
    const pctStr  = pct ? ` (${pct}%)` : '';
    if (owner && asset) return `Participation : ${owner} → ${asset}${pctStr}`;
    if (owner) return `Participation : ${owner}${pctStr}`;
    if (asset) return `Participation → ${asset}${pctStr}`;
    return 'Participation';
  }
  return e.schema;
}
function eventDesc(e) {
  return p1(e,'description') || p1(e,'text') || null;
}
function entityAxis(e) {
  return p1(e,'axis') || null;
}
function isAlert(e) {
  const a = p1(e,'alert');
  return a === 'true' || a === true;
}
/* Retourne 'rj', 'lj', ou null selon le contenu du nom/description de l'événement. */
function eventProcType(e) {
  const text = [...pAll(e,'name'), ...pAll(e,'description')].join(' ');
  if (/liquidation judiciaire/i.test(text))   return 'lj';
  if (/redressement judiciaire/i.test(text))  return 'rj';
  return null;
}

/* Retourne la classe CSS du schéma (dot + carte). */
function schemaClass(e) {
  const pt = eventProcType(e);
  if (pt) return pt;  // 'rj' | 'lj'
  switch (e.schema) {
    case 'CourtCase':    return 'court';
    case 'Directorship': return 'directorship';
    case 'Ownership':    return 'ownership';
    case 'Payment':      return 'payment';
    case 'Document':     return 'document';
    default:             return null;
  }
}



/* ═══════════════════════════════════════════════════════════
   DEDUPLICATION / MERGE
═══════════════════════════════════════════════════════════ */
function mergeEntity(existing, incoming) {
  if (!existing) return incoming;
  const merged = { ...existing };
  merged.properties = { ...existing.properties };
  for (const [k, vals] of Object.entries(incoming.properties || {})) {
    const cur = merged.properties[k] || [];
    merged.properties[k] = [...new Set([...cur, ...vals])];
  }
  return merged;
}

function ingestLine(line, fileAxisId) {
  line = line.trim();
  if (!line || line.startsWith('//')) return;
  let ent;
  try { ent = JSON.parse(line); } catch { return; }
  if (!ent.id || !ent.schema) return;

  // If entity has no axis and file has a default axis, assign it
  if (!entityAxis(ent) && fileAxisId) {
    ent = { ...ent, properties: { ...ent.properties, axis: [fileAxisId] } };
  }

  ENTITIES[ent.id] = mergeEntity(ENTITIES[ent.id], ent);
}

/* ═══════════════════════════════════════════════════════════
   AXIS POSITION (continuous, 0–1 → pixels)
═══════════════════════════════════════════════════════════ */
function axisX(axisId) {
  const ax = AXIS_MAP[axisId];
  if (!ax) return CANVAS_WIDTH * 0.5;
  return ax._xPx;
}

// _companyLayout : id → { xPx, wPx, lane, axisId }
let _companyLayout = {};

// Passe 1 : géométrie horizontale pure (sans dateY, sans SCALE_D)
// Stocke pour chaque société : lane, axisId, dateStrings
// Les yStart/yEnd sont calculés dans buildAxisRails (après buildYearSpine).
function computeLayout() {
  CANVAS_WIDTH = Math.max(CANVAS_MIN_WIDTH, window.innerWidth - 56);
  _personColorMap = {};
  _personColorIdx = 0;
  _companyLayout  = {};

  // 1. Grouper les sociétés par axe narratif (en excluant les masquées pour le repacking)
  const axisCompanies = {};
  for (const ax of Object.values(AXIS_MAP)) axisCompanies[ax.id] = [];

  const _seenCoIds = new Set();  // garde anti-doublon : chaque coId ne doit apparaître qu'une fois
  for (const ent of Object.values(ENTITIES)) {
    if (ent.schema !== 'Company') continue;
    // Exclure les doublons explicitement marqués _deprecated
    if (ent._deprecated && ent._deprecated.length) continue;
    // Anti-doublon strict
    if (_seenCoIds.has(ent.id)) continue;
    _seenCoIds.add(ent.id);
    const axId = p1(ent, 'axis') || Object.keys(AXIS_MAP)[0];
    // Exclure les companies dont l'axe est masqué ou qui sont masquées individuellement
    if (MUTED_AXES.has(axId)) continue;
    if (MUTED_COS.has(ent.id)) continue;
    // Exclure selon statut masqué
    const st = p1(ent, 'status') || 'default';
    if (MUTED_STATUSES.size > 0 && MUTED_STATUSES.has(st)) continue;
    if (!axisCompanies[axId]) axisCompanies[axId] = [];
    axisCompanies[axId].push(ent);
  }

  // 2. Lane-packing horizontal par axe.
  //    Chaque société obtient une lane propre si elle chevauche temporellement
  //    une autre société déjà dans la même lane (comparaison ISO string).
  //    ax._xStart   : bord gauche de la zone de bandes pour cet axe
  //    ax._xPx      : centre de l'axe (milieu de la zone bandes) — ancrage des cartes sans société
  //    ax._wPx      : largeur totale de la zone de bandes
  // ── Dimensions zoomées (ZOOM s'applique aux X seulement ; Y via CANVAS_FIXED_H) ──
  const zBW = Math.max(8,  Math.round(BAND_W   * ZOOM));  // largeur bande
  const zBG = Math.max(2,  Math.round(BAND_GAP * ZOOM));  // gap inter-lane
  const zAG = Math.max(12, Math.round(AXIS_GAP * ZOOM));  // gap inter-axe
  const zAL = Math.max(8,  Math.round(AXIS_LEFT * ZOOM)); // marge gauche
  let cursor = zAL;
  const axIds = Object.keys(AXIS_MAP);
  for (let ai = 0; ai < axIds.length; ai++) {
    const ax  = AXIS_MAP[axIds[ai]];
    const cos = axisCompanies[ax.id] || [];
    ax._xStart = cursor;

    // Axe entièrement masqué : 0 largeur, pas de gap
    if (MUTED_AXES.has(ax.id)) {
      ax._xPx = cursor;
      ax._wPx = 0;
      continue;
    }

    cos.sort((a, b) => {
      const da = p1(a, 'incorporationDate') || '0000';
      const db = p1(b, 'incorporationDate') || '0000';
      return da < db ? -1 : da > db ? 1 : 0;
    });

    // laneEndStr[lane] = date ISO de fin de la dernière société dans cette lane
    const laneEndStr = [];
    for (const co of cos) {
      const incStr = p1(co, 'incorporationDate') || '';
      const disStr = p1(co, 'dissolutionDate')   || '';

      // Chercher une lane libre : fin < début de la société courante
      let lane = laneEndStr.findIndex(e => !e || e <= (incStr || '0000'));
      if (lane === -1) { lane = laneEndStr.length; }
      laneEndStr[lane] = disStr || '9999-12-31';

      _companyLayout[co.id] = {
        xPx:    cursor + lane * zBW,
        wPx:    zBW,
        lane,
        axisId: ax.id,
        incStr,
        disStr,
        yStart: 0,
        yEnd:   0,
      };
    }

    const nLanes = Math.max(1, laneEndStr.length);
    ax._xPx  = cursor + Math.floor(nLanes * zBW / 2);
    ax._wPx  = nLanes * zBW;
    // Espace entre axes : zBG entre lanes, zAG entre axes distincts
    cursor  += nLanes * zBW + (ai < axIds.length - 1 ? zAG : zBG);
  }

  // Recalculer CANVAS_WIDTH pour englober toutes les bandes + une carte à droite
  const CARD_SPACE = 520 + 32; // max card width + marge
  CANVAS_WIDTH = Math.max(CANVAS_MIN_WIDTH, cursor + CARD_SPACE);
}

// Passe 2 : calcul des coordonnées verticales (après buildYearSpine → SCALE_D OK)
function resolveLayoutY() {
  // ── Index : coId → date ISO du premier événement qui référence cette société ──
  // Utilisé comme fallback pour les sociétés sans incorporationDate.
  const firstRefDate = {};  // coId → ISO string
  for (const ev of EVENTS) {
    const d = eventDate(ev);
    if (!d) continue;
    const refs = pAll(ev, 'ftmRef').concat(pAll(ev, 'organization'));
    for (const ref of refs) {
      if (!firstRefDate[ref] || d < firstRefDate[ref]) firstRefDate[ref] = d;
    }
  }

  for (const [coId, layout] of Object.entries(_companyLayout)) {
    const inc = layout.incStr;

    // Calcul du Y d'incorporation (ou fallback)
    let yInc;
    let noStartDate = false;

    if (inc) {
      yInc = dateY(inc);
    } else {
      const fallback = firstRefDate[coId];
      if (fallback) {
        yInc = dateY(fallback);
      } else {
        // Aucune date connue : zone contemporaine.
        // Sans inversion : bas (CANVAS_HEIGHT - pad). Avec inversion : haut (pad).
        yInc = INVERT_TIMELINE
          ? CANVAS_PAD_TOP + 80
          : CANVAS_HEIGHT - CANVAS_PAD_BOTTOM - 80;
      }
      noStartDate = true;
    }

    // Calcul du Y de dissolution (ou extension jusqu'au présent/bord de la frise)
    // Sans inversion : pas de dissolution → CANVAS_HEIGHT (bas = présent).
    // Avec inversion : pas de dissolution → CANVAS_PAD_TOP (haut = présent).
    const yDis = layout.disStr
      ? dateY(layout.disStr)
      : (INVERT_TIMELINE ? CANVAS_PAD_TOP : CANVAS_HEIGHT);

    // yStart = bord supérieur (plus petit Y), yEnd = bord inférieur (plus grand Y)
    layout.yStart      = Math.min(yInc, yDis);
    layout.yEnd        = Math.max(yInc, yDis);
    layout.noStartDate = noStartDate;

    // Hauteur minimale de 60px pour que la bande soit toujours visible
    if (layout.yEnd - layout.yStart < 60) layout.yEnd = layout.yStart + 60;
  }
}

function computeAxisPositions() { computeLayout(); }

/* ═══════════════════════════════════════════════════════════
   DYNAMIC AXIS ASSIGNMENT (for events without explicit axis)
═══════════════════════════════════════════════════════════ */
function assignDynamicAxis(ev) {
  const existing = entityAxis(ev);
  if (existing && AXIS_MAP[existing]) return existing;

  const refs = pAll(ev,'ftmRef');
  if (!refs.length) return Object.keys(AXIS_MAP)[0] || null;

  // Count how many ftmRef entities belong to each axis
  const scores = {};
  for (const id of refs) {
    const ref = ENTITIES[id];
    if (!ref) continue;
    const ax = entityAxis(ref);
    if (ax && AXIS_MAP[ax]) scores[ax] = (scores[ax]||0) + 1;
  }

  if (!Object.keys(scores).length) {
    // Fallback: check anchor_entities
    for (const [axId, ax] of Object.entries(AXIS_MAP)) {
      if ((ax.anchor_entities||[]).some(a => refs.includes(a))) {
        scores[axId] = (scores[axId]||0) + 2;
      }
    }
  }

  if (!Object.keys(scores).length) return null;
  return Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
}

/* ═══════════════════════════════════════════════════════════
   BUILD EVENTS LIST
═══════════════════════════════════════════════════════════ */
function buildEvents() {
  EVENTS = [];
  for (const ent of Object.values(ENTITIES)) {
    if (!EVENT_SCHEMAS.has(ent.schema)) continue;
    const date = eventDate(ent);
    if (!date) continue;
    const axis = assignDynamicAxis(ent) || assignFallbackAxis(ent);
    if (!axis) continue;
    ent._resolvedAxis = axis;
    EVENTS.push(ent);
  }
  EVENTS.sort((a,b) => {
    const da = parseDate(eventDate(a));
    const db = parseDate(eventDate(b));
    return (da||0) - (db||0);
  });
}

function assignFallbackAxis(ev) {
  // Last resort: use file default stored on entity
  return entityAxis(ev) || Object.keys(AXIS_MAP)[0] || null;
}

/* ═══════════════════════════════════════════════════════════
   YEAR SPINE
═══════════════════════════════════════════════════════════ */
function buildYearSpine() {
  const spine = document.getElementById('year-spine');
  if (!EVENTS.length) return;

  const firstDate = parseDate(eventDate(EVENTS[0]));
  const lastDate  = parseDate(eventDate(EVENTS[EVENTS.length-1]));
  const lastYear  = lastDate.getFullYear() + 1;

  // Remonter jusqu'à la date d'incorporation la plus ancienne
  let firstYear = firstDate.getFullYear();
  for (const ent of Object.values(ENTITIES)) {
    if (ent.schema !== 'Company') continue;
    const inc = p1(ent, 'incorporationDate');
    if (!inc) continue;
    const y = parseInt(inc.replace(/^[<>]/, '').slice(0, 4));
    if (!isNaN(y) && y < firstYear) firstYear = y;
  }

  // ── EPOCH_START dynamique ──
  {
    let minYear = firstDate.getFullYear();
    for (const ent of Object.values(ENTITIES)) {
      if (ent.schema !== 'Company') continue;
      const inc = p1(ent, 'incorporationDate');
      if (!inc) continue;
      const y = parseInt(inc.replace(/^[<>]/, '').slice(0, 4));
      if (!isNaN(y) && y < minYear) minYear = y;
    }
    EPOCH_START = new Date(`${minYear - 1}-01-01`);
  }

  // SCALE_D calibré sur la distance epoch → dernier événement
  SCALE_D       = Math.max(1, daysSinceEpoch(lastDate));
  CANVAS_HEIGHT = CANVAS_FIXED_H;

  // Recréer le wrapper interne (détruit les yr-blocks précédents)
  spine.innerHTML = '<div id="year-spine-inner"></div>';
  const inner = document.getElementById('year-spine-inner');

  // ── Positionnement absolu de chaque bloc dans inner ──
  // Chaque bloc occupe exactement la plage canvas correspondant à son année.
  // Cela fonctionne dans les deux sens (INVERT_TIMELINE ou non) parce que dateY()
  // applique déjà l'inversion : avec INVERT_TIMELINE, une année récente → petit Y
  // (haut du canvas), une ancienne → grand Y (bas).
  inner.style.height = CANVAS_FIXED_H + 'px';

  const MIN_LABEL_H = 14;
  const STEPS = [1, 2, 5, 10, 25, 50, 100];
  function snapStep(rawStep) {
    return STEPS.find(s => s >= rawStep) ?? STEPS[STEPS.length - 1];
  }

  for (let y = firstYear; y <= lastYear; y++) {
    // yTop = Y canvas du début du bloc (bord supérieur = plus petit Y)
    // yBot = Y canvas de la fin du bloc (bord inférieur = plus grand Y)
    let yTop, yBot;
    if (INVERT_TIMELINE) {
      // Récent en haut : l'année y+1 (plus récente) a un Y plus petit que l'année y
      yTop = dateY(`${y+1}-01-01`); // début du bloc (haut)
      yBot = dateY(`${y}-01-01`);   // fin du bloc (bas)
    } else {
      yTop = dateY(`${y}-01-01`);
      yBot = dateY(`${y+1}-01-01`);
    }
    yTop = Math.max(0, Math.min(CANVAS_FIXED_H, yTop));
    yBot = Math.max(0, Math.min(CANVAS_FIXED_H, yBot));
    const height = Math.max(0, yBot - yTop);
    if (height < 1) continue;

    const block = document.createElement('div');
    block.className = 'yr-block';
    block.style.top    = yTop + 'px';
    block.style.height = height + 'px';
    block.setAttribute('data-year', y);

    // Zèbre discret sur les blocs d'années impaires
    if (y % 2 === 0) block.style.background = 'rgba(0,0,0,0.018)';

    const step = snapStep(height > 0 ? MIN_LABEL_H / height : 100);
    if (y % step === 0) {
      const label = document.createElement('div');
      // En mode antichronologique (récent en haut), les années récentes ont de grands
      // blocs (beaucoup d'événements → échelle exponentielle les étire) mais doivent
      // être étiquetées verticalement pour ne pas saturer la spine.
      // Les vieilles années ont de petits blocs (rares, espacés) et peuvent se
      // permettre un label horizontal lisible.
      // → seuil horizontal/vertical inversé quand INVERT_TIMELINE.
      const useHoriz = INVERT_TIMELINE ? (height < 32) : (height >= 32);
      if (useHoriz) {
        // Label horizontal centré
        label.className = 'yr-label yr-label--horiz';
        label.textContent = y;
      } else {
        // Label vertical, orientation selon le sens de la frise
        label.className = INVERT_TIMELINE ? 'yr-label yr-label--inv' : 'yr-label';
        label.textContent = y;
      }
      block.appendChild(label);
    }
    inner.appendChild(block);
  }
}

/* ═══════════════════════════════════════════════════════════
   UBO INDEX — reconstitution des bénéficiaires effectifs
   (données non publiques depuis la réforme du RBE 31/07/2024)
═══════════════════════════════════════════════════════════ */
function buildUboIndex() {
  // 1. Construire les adjacences depuis les entités Ownership
  //    ownersOf[assetId] = [{ownerId, pct, estimated}]
  const ownersOf = new Map();
  for (const ent of Object.values(ENTITIES)) {
    if (ent.schema !== 'Ownership') continue;
    const owner = p1(ent, 'owner');
    const asset = p1(ent, 'asset');
    if (!owner || !asset) continue;
    const rawPct = p1(ent, 'percentage');
    let pct = null, estimated = false;
    if (rawPct) {
      const n = parseFloat(rawPct);
      if (!isNaN(n)) { pct = n; }
      else { estimated = true; pct = /majority/i.test(rawPct) ? 51 : null; }
    }
    if (!ownersOf.has(asset)) ownersOf.set(asset, []);
    ownersOf.get(asset).push({ ownerId: owner, pct, estimated });
  }

  // 2. Remonter récursivement jusqu'à trouver des Person (= UBO)
  //    Retourne [{uboId, pct, estimated}] — pct = produit cumulé des parts
  function resolveUbos(startId, visited = new Set()) {
    if (visited.has(startId)) return [];
    visited.add(startId);
    const owners = ownersOf.get(startId) || [];
    const result = [];
    for (const { ownerId, pct, estimated } of owners) {
      const ownerEnt = ENTITIES[ownerId];
      if (!ownerEnt) continue;
      if (ownerEnt.schema === 'Person') {
        result.push({ uboId: ownerId, pct, estimated });
      } else {
        // Intermédiaire : remonter et composer les pourcentages
        for (const u of resolveUbos(ownerId, new Set(visited))) {
          const chainPct = (pct != null && u.pct != null) ? Math.round((pct / 100) * u.pct * 100) / 100 : null;
          result.push({ uboId: u.uboId, pct: chainPct, estimated: estimated || u.estimated });
        }
      }
    }
    return result;
  }

  // 3. Construire les deux index
  const byCompany = new Map(); // coId → [{uboId, pct, estimated}]
  const byUbo     = new Map(); // uboId → [{coId, pct, estimated}]

  for (const [id, ent] of Object.entries(ENTITIES)) {
    if (ent.schema !== 'Company' && ent.schema !== 'LegalEntity') continue;
    const ubos = resolveUbos(id);
    if (!ubos.length) continue;
    byCompany.set(id, ubos);
    for (const { uboId, pct, estimated } of ubos) {
      if (!byUbo.has(uboId)) byUbo.set(uboId, []);
      byUbo.get(uboId).push({ coId: id, pct, estimated });
    }
  }
  return { byCompany, byUbo };
}

// Formater un % UBO pour affichage (gère les valeurs estimées et null)
function _fmtUboPct(pct, estimated) {
  if (pct == null) return '?%';
  const s = Number.isInteger(pct) ? pct : pct.toFixed(1).replace(/\.0$/, '');
  return estimated ? `~${s}%` : `${s}%`;
}

// Supprimer les badges et classes UBO de toutes les bandes
function _clearUboHighlight() {
  document.querySelectorAll('.co-band.ubo-lit, .co-band.ubo-dim').forEach(b => {
    b.classList.remove('ubo-lit', 'ubo-dim');
    b.style.removeProperty('--ubo-alpha');
    b.querySelectorAll('.ubo-pct-badge').forEach(el => el.remove());
  });
}

// Déclencher le surlignage UBO pour la société coId
function _triggerUboHighlight(coId) {
  if (!_uboIndex) return;
  const ubos = _uboIndex.byCompany.get(coId);
  if (!ubos || !ubos.length) return;

  // Recueillir toutes les sociétés partageant au moins un UBO avec coId
  // co-band DOM id format : co-${coId}
  const litMap = new Map(); // coId → {pct, estimated, uboNames}
  for (const { uboId, pct, estimated } of ubos) {
    const uboName = p1(ENTITIES[uboId], 'name') || uboId;
    const siblings = _uboIndex.byUbo.get(uboId) || [];
    for (const s of siblings) {
      if (!litMap.has(s.coId)) litMap.set(s.coId, { pct: s.pct, estimated: s.estimated, uboNames: [] });
      litMap.get(s.coId).uboNames.push(uboName);
    }
  }

  if (litMap.size <= 1) return; // Seule la société elle-même → pas de groupe visible

  // Calcul de l'alpha max pour la normalisation (max pct documenté parmi les filiales)
  const maxPct = [...litMap.values()].reduce((m, v) => Math.max(m, v.pct ?? 0), 0);

  // Appliquer les classes
  const allBands = document.querySelectorAll('.co-band');
  for (const band of allBands) {
    const id = band.id.replace(/^co-/, '');
    if (litMap.has(id)) {
      const { pct, estimated } = litMap.get(id);
      const alpha = pct != null && maxPct > 0
        ? Math.max(0.10, Math.min(0.50, (pct / maxPct) * 0.45))
        : 0.18;
      band.classList.add('ubo-lit');
      band.style.setProperty('--ubo-alpha', alpha.toFixed(3));
      // Badge %
      const badge = document.createElement('div');
      badge.className = 'ubo-pct-badge';
      badge.textContent = _fmtUboPct(pct, estimated);
      band.appendChild(badge);
    } else {
      band.classList.add('ubo-dim');
    }
  }
}

/* ═══════════════════════════════════════════════════════════
   AXIS RAILS
═══════════════════════════════════════════════════════════ */
// Positionner le tooltip près du curseur (appelé par les bandes de sociétés)
function _moveBandTooltip(e) {
  const TW = tooltip.offsetWidth  || 180;
  const TH = tooltip.offsetHeight || 60;
  let x = e.clientX + 14;
  let y = e.clientY - TH / 2;
  if (x + TW > window.innerWidth  - 8) x = e.clientX - TW - 10;
  if (y < 4)                           y = 4;
  if (y + TH > window.innerHeight - 4) y = window.innerHeight - TH - 4;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}

/* ═══════════════════════════════════════════════════════════
   HACHURES PROCÉDURALES — RJ / LJ
   Superpose trois couches de hachures sur la bande de chaque société
   ayant fait l'objet d'un RJ ou d'une LJ :
   ① Rouge épais (45°)  — 2 premiers mois depuis publication BODACC
       → délai déclaration des créances (art. L. 622-24 C. com.)
   ② Orange épais (-45°) — mois 3 à 6 depuis le jugement d'ouverture
       → délai relevé de forclusion (art. L. 622-26 C. com.)
   ③ Noir fin (135°, superposé) — toute la plage de 6 mois
       → rappel du délai d'appel de la liste des créances (art. L. 624-3)
       La date de la liste définitive n'étant pas disponible dans les données,
       la plage de 6 mois sert de proxy conservateur.
═══════════════════════════════════════════════════════════ */
function buildProcedureHatching(canvas) {
  const RJ_KWD = /redressement judiciaire/i;
  const LJ_KWD = /liquidation judiciaire/i;

  // Supprimer les hachures précédentes (rebuild)
  canvas.querySelectorAll('.proc-hatch').forEach(el => el.remove());

  for (const ev of EVENTS) {
    // Détecter le type d'événement dans le nom et/ou la description
    const nameArr = pAll(ev, 'name');
    const descArr = pAll(ev, 'description');
    const searchText = [...nameArr, ...descArr].join(' ');
    const isRJ = RJ_KWD.test(searchText);
    const isLJ = LJ_KWD.test(searchText);
    if (!isRJ && !isLJ) continue;

    const evDate = eventDate(ev);
    if (!evDate) continue;

    const coIds = pAll(ev, 'ftmRef');
    if (!coIds.length) continue;

    // Dates-clés
    const dateM2  = addMonths(evDate, 2);   // fin délai DDC
    const dateM6  = addMonths(evDate, 6);   // fin délai relevé forclusion

    for (const coId of coIds) {
      const layout = _companyLayout[coId];
      if (!layout) continue;

      // Coordonnées Y canvas pour chaque borne (dateY gère l'inversion)
      const yEv  = dateY(evDate);
      const yM2  = dateY(dateM2);
      const yM6  = dateY(dateM6);

      // Avec INVERT_TIMELINE : plus récent = Y plus petit (haut)
      // → "après" dans le temps = Y plus petit
      const ddcTop  = Math.min(yEv, yM2);
      const ddcBot  = Math.max(yEv, yM2);
      const forcTop = Math.min(yM2, yM6);
      const forcBot = Math.max(yM2, yM6);
      const appTop  = Math.min(yEv, yM6);
      const appBot  = Math.max(yEv, yM6);

      const { xPx, wPx, yStart: bandTop, yEnd: bandBot } = layout;

      // Helper : crée un div hachure clipé aux limites de la bande
      const makeHatch = (rawTop, rawBot, cls, titleStr) => {
        const t = Math.max(bandTop, Math.min(bandBot, rawTop));
        const b = Math.max(bandTop, Math.min(bandBot, rawBot));
        if (b - t < 2) return; // zone invisible ou nulle
        const el = document.createElement('div');
        el.className = `proc-hatch ${cls}`;
        el.style.left   = xPx + 'px';
        el.style.top    = t + 'px';
        el.style.width  = wPx + 'px';
        el.style.height = (b - t) + 'px';
        el.title = titleStr;
        canvas.appendChild(el);
      };

      const typeLabel = isLJ ? 'LJ' : 'RJ';
      makeHatch(ddcTop, ddcBot,  'proc-hatch-ddc',
        `${typeLabel} – ${formatDate(evDate)} : déclaration des créances, délai 2 mois (art. L. 622-24)`);
      makeHatch(forcTop, forcBot, 'proc-hatch-forc',
        `${typeLabel} – ${formatDate(evDate)} : relevé de forclusion, mois 3–6 (art. L. 622-26)`);
      makeHatch(appTop,  appBot,  'proc-hatch-appel',
        `${typeLabel} – ${formatDate(evDate)} : appel liste des créances, 1 mois depuis publication BODACC (art. L. 624-3)`);
    }
  }
}

/* ═══════════════════════════════════════════════════════════
   INDEX CDP — cessation des paiements par société
   Construit un map coId → dateISO (date la plus précise connue,
   ou estimée à -18 mois du jugement d'ouverture si absente).
═══════════════════════════════════════════════════════════ */
function buildCdpIndex() {
  const CDP_KWD  = /cessation des paiements/i;
  const RJ_KWD   = /redressement judiciaire/i;
  const LJ_KWD   = /liquidation judiciaire/i;

  // 1. Collecter les CDP explicites : coId → date (prioriser la plus ancienne)
  const cdpByCompany = {};  // coId → ISO string (date CDP explicite)
  const rjljByCompany = {}; // coId → ISO string (date premier jugement RJ ou LJ)

  for (const ev of EVENTS) {
    const nameArr = pAll(ev, 'name');
    const descArr = pAll(ev, 'description');
    const text    = [...nameArr, ...descArr].join(' ');
    const evDate  = eventDate(ev);
    if (!evDate) continue;

    const refs = pAll(ev, 'ftmRef');
    // Filtrer seulement les coIds (sociétés)
    const coRefs = refs.filter(id => {
      const ent = ENTITIES[id];
      return ent && (ent.schema === 'Company' || ent.schema === 'LegalEntity');
    });
    if (!coRefs.length) continue;

    if (CDP_KWD.test(text)) {
      for (const coId of coRefs) {
        // Prioriser la plus ancienne CDP
        if (!cdpByCompany[coId] || evDate < cdpByCompany[coId]) {
          cdpByCompany[coId] = evDate;
        }
      }
    }
    if (RJ_KWD.test(text) || LJ_KWD.test(text)) {
      for (const coId of coRefs) {
        // Garder le premier jugement d'ouverture (le plus ancien RJ ou LJ)
        if (!rjljByCompany[coId] || evDate < rjljByCompany[coId]) {
          rjljByCompany[coId] = evDate;
        }
      }
    }
  }

  // 2. Pour les sociétés sans CDP explicite mais avec RJ/LJ :
  //    remonter de 18 mois depuis le premier jugement d'ouverture (art. L. 631-8 C. com.)
  const result = {}; // coId → { cdpDate, estimated }
  const allCos = new Set([...Object.keys(cdpByCompany), ...Object.keys(rjljByCompany)]);
  for (const coId of allCos) {
    if (cdpByCompany[coId]) {
      result[coId] = { cdpDate: cdpByCompany[coId], estimated: false };
    } else if (rjljByCompany[coId]) {
      const est = addMonths(rjljByCompany[coId], -18);
      if (est) result[coId] = { cdpDate: est, estimated: true };
    }
  }
  return result;
}

function buildAxisRails(canvas) {
  // Passe 2 : résolution des coordonnées Y (SCALE_D est maintenant calibré)
  resolveLayoutY();

  // Index CDP : construit une fois par rebuild
  const cdpIndex = buildCdpIndex();

  // ── Zones de fond par axe narratif ──
  for (const ax of Object.values(AXIS_MAP)) {
    const zone = document.createElement('div');
    zone.className = 'axis-zone';
    zone.style.left       = ax._xStart + 'px';
    zone.style.width      = ax._wPx + 'px';
    zone.style.background = ax.color;
    canvas.appendChild(zone);
  }

  // ── Bandes de sociétés ──
  // Précollecte des directorships indexés par company
  const dirsByCompany = {}; // companyId → [directorship entity]
  for (const ent of Object.values(ENTITIES)) {
    if (ent.schema !== 'Directorship') continue;
    const org = p1(ent, 'organization');
    if (!org) continue;
    if (!dirsByCompany[org]) dirsByCompany[org] = [];
    dirsByCompany[org].push(ent);
  }

  for (const [coId, layout] of Object.entries(_companyLayout)) {
    const co  = ENTITIES[coId];
    if (!co) continue;
    const ax  = AXIS_MAP[layout.axisId];
    if (!ax) continue;

    const status = p1(co, 'status') || 'default';
    const bg     = STATUS_BG[status] || STATUS_BG.default;

    const band = document.createElement('div');
    band.className = 'co-band';
    band.id = `co-${coId}`;
    band.style.left       = layout.xPx + 'px';
    band.style.top        = layout.yStart + 'px';
    band.style.width      = layout.wPx + 'px';
    band.style.height     = (layout.yEnd - layout.yStart) + 'px';
    band.style.background    = bg;
    band.style.borderColor   = 'rgba(0,0,0,0.15)';
    band.style.borderTopColor = ax.color;
    if (layout.noStartDate) band.classList.add('no-start-date');

    // Étiquette verticale : nom + forme sociale
    const label = document.createElement('div');
    label.className = 'co-band-label';
    label.style.color = ax.color;
    const coName = p1(co, 'name') || coId;
    const coForm = p1(co, 'legalForm') || '';
    const labelFull = coForm ? `${coName} · ${coForm}` : coName;
    label.title = labelFull;
    label.textContent = labelFull;
    band.appendChild(label);

    // Mandats (Directorship) dans cette société
    const dirs = dirsByCompany[coId] || [];
    for (const dir of dirs) {
      const start = p1(dir, 'startDate');
      const end   = p1(dir, 'endDate');
      const personId = p1(dir, 'director');
      if (!start) continue;

      const yS = dateY(start);
      const yE = end ? dateY(end) : layout.yEnd;
      const col = personColor(personId);

      // Décalage horizontal dans la bande selon l'index du dirigeant
      const pIdx = Object.keys(_personColorMap).indexOf(personId);
      const mx   = 3 + (pIdx % 3) * 4; // 3 colonnes de 4px dans la bande

      const line = document.createElement('div');
      line.className = 'mandate-line';
      line.style.left       = mx + 'px';
      line.style.top        = (yS - layout.yStart) + 'px';
      line.style.height     = Math.max(2, yE - yS) + 'px';
      line.style.background = col;
      line.title = `${p1(dir,'role') || 'Mandat'} — ${personId}`;
      band.appendChild(line);
    }

    // Tooltip au survol de la bande + surlignage UBO + surlignage événements liés
    band.addEventListener('mouseenter', (e) => {
      const name_   = p1(co, 'name')         || coId;
      const form    = p1(co, 'legalForm')     || '';
      const jur     = p1(co, 'jurisdiction')  || p1(co, 'country') || '';
      const inc     = p1(co, 'incorporationDate') || '';
      const dis     = p1(co, 'dissolutionDate')   || '';
      const st      = p1(co, 'status')        || '';
      const STATUS_LABEL = {
        active:'active', dormant:'dormante', dissolved:'dissoute',
        insolvent:'insolvable', liquidation:'liquidation judiciaire',
        terminated:'radiée', rj:'redressement judiciaire', default:''
      };
      const stLabel = STATUS_LABEL[st] || st;
      let lines = [`<strong>${esc(name_)}</strong>`];
      if (form)  lines.push(`<span style="opacity:0.75">${esc(form)}</span>`);
      const meta = [jur, stLabel ? `<em>${esc(stLabel)}</em>` : ''].filter(Boolean).join(' · ');
      if (meta) lines.push(meta);
      if (inc) lines.push(`Imm. ${formatDate(inc)}${dis ? ' → ' + formatDate(dis) : ''}`);
      // Ligne UBO si données disponibles
      if (_uboIndex) {
        const ubos = _uboIndex.byCompany.get(coId);
        if (ubos && ubos.length) {
          const uboStr = ubos.map(u => {
            const n = p1(ENTITIES[u.uboId], 'name') || u.uboId;
            return `${esc(n)} ${_fmtUboPct(u.pct, u.estimated)}`;
          }).join(', ');
          lines.push(`<span style="color:#ffe082;font-size:0.88em">UBE : ${uboStr}</span>`);
        }
      }
      tooltip.innerHTML = lines.join('<br>');
      tooltip.style.borderLeft = `3px solid ${ax.color}`;
      tooltip.style.display = 'block';
      _moveBandTooltip(e);
      // Surlignage groupé par UBO
      _clearUboHighlight();
      _triggerUboHighlight(coId);
      // ── Surlignage dots, cartes et lignes liés à cette société ──
      document.querySelectorAll('.ev-dot-node[data-co-ids]').forEach(node => {
        const ids = node.dataset.coIds.split(' ');
        node.classList.toggle('band-hovered', ids.includes(coId));
        node.classList.toggle('band-dimmed',  !ids.includes(coId));
      });
      document.querySelectorAll('.ev-anchor[data-co-ids]').forEach(node => {
        const ids = node.dataset.coIds.split(' ');
        node.classList.toggle('band-hovered', ids.includes(coId));
        node.classList.toggle('band-dimmed',  !ids.includes(coId));
      });
      document.querySelectorAll('.dot-card-line[data-evid]').forEach(line => {
        const evId = line.getAttribute('data-evid');
        const anch = document.getElementById(`ev-${evId}`);
        const ids  = anch ? (anch.dataset.coIds || '').split(' ') : [];
        line.classList.toggle('band-hovered', ids.includes(coId));
        line.classList.toggle('band-dimmed',  !ids.includes(coId));
      });
    });
    band.addEventListener('mousemove', _moveBandTooltip);
    band.addEventListener('mouseleave', () => {
      tooltip.style.display = 'none';
      _clearUboHighlight();
      // Effacer le surlignage
      document.querySelectorAll('.ev-dot-node.band-hovered, .ev-dot-node.band-dimmed').forEach(n =>
        n.classList.remove('band-hovered', 'band-dimmed'));
      document.querySelectorAll('.ev-anchor.band-hovered, .ev-anchor.band-dimmed').forEach(n =>
        n.classList.remove('band-hovered', 'band-dimmed'));
      document.querySelectorAll('.dot-card-line.band-hovered, .dot-card-line.band-dimmed').forEach(l =>
        l.classList.remove('band-hovered', 'band-dimmed'));
    });

    canvas.appendChild(band);

    // ── Fond jaune CDP sur la bande ──
    // Si la société a une CDP (explicite ou estimée à -18 mois du jugement),
    // colorier le fond en jaune entre la CDP et le jugement d'ouverture (ou bord de la bande).
    const cdpInfo = cdpIndex[coId];
    if (cdpInfo) {
      const yCdp   = dateY(cdpInfo.cdpDate);
      // Le haut de la plage jaune = bord supérieur de la bande (min y = plus récent si inversé)
      // Plage jaune : entre CDP et la borne supérieure de la bande (= jugement d'ouverture ou
      // simplement le bord de la bande si pas de jugement explicite dans les données).
      const yTop   = Math.min(yCdp, layout.yStart);
      const yBot   = Math.max(yCdp, layout.yStart);
      const cdpH   = Math.max(0, yBot - yTop);
      if (cdpH > 1) {
        const cdpZone = document.createElement('div');
        cdpZone.className = 'cdp-zone';
        cdpZone.style.cssText = [
          `position:absolute`,
          `left:${layout.xPx}px`,
          `top:${yTop}px`,
          `width:${layout.wPx}px`,
          `height:${cdpH}px`,
          `background:${cdpInfo.estimated
            ? 'repeating-linear-gradient(90deg,rgba(255,210,50,0.28)0px,rgba(255,210,50,0.28)4px,rgba(255,243,150,0.18)4px,rgba(255,243,150,0.18)8px)'
            : 'rgba(255,220,40,0.38)'}`,
          `pointer-events:none`,
          `z-index:9`,
          `box-sizing:border-box`,
          `border:none`,
        ].join(';');
        cdpZone.title = cdpInfo.estimated
          ? `CDP estimée ≥ ${formatDate(cdpInfo.cdpDate)} (max 18 mois avant jugement, art. L. 631-8 C. com.)`
          : `CDP fixée au ${formatDate(cdpInfo.cdpDate)} (art. L. 631-8 C. com.)`;
        canvas.appendChild(cdpZone);
      }
    }
  }
}

/* ═══════════════════════════════════════════════════════════
   CARD SIDE (left/right alternation per axis to avoid overlap)
═══════════════════════════════════════════════════════════ */
// cardSide supprimé — toutes les cartes à droite de leur axe

/* ═══════════════════════════════════════════════════════════
   EVENT NODES
═══════════════════════════════════════════════════════════ */
// Retourne le X du dot : centre de la bande de la 1ère société ftmRef
// qui possède un layout. Fallback = centre du bloc de bandes de l'axe.
function evDotX(ev, ax) {
  const refs = pAll(ev, 'ftmRef');
  for (const ref of refs) {
    const lay = _companyLayout[ref];
    if (lay) return lay.xPx + Math.floor(lay.wPx / 2); // centre de la bande
  }
  return ax._xStart + Math.floor((ax._wPx || BAND_W) / 2);
}


/* ═══════════════════════════════════════════════════════════
   ESTIMATION LARGEUR CARTE (avant rendu DOM)
   Approximation : 7px/caractère à 13px Inter + marges
   Utilisé par le stacking pour détecter les chevauchements
   horizontaux avec la largeur réelle de chaque carte.
═══════════════════════════════════════════════════════════ */
const CARD_CHAR_PX   = 7.0;   // px par caractère à 13px Inter
const CARD_PAD_H     = 14;    // padding-left + padding-right
const CARD_BORDER_L  = 4;     // border-left-width
const CARD_MIN_W_EST = 110;
function estimateCardW(ev) {
  // Largeur estimée = longueur du contenu le plus large × CHAR_PX,
  // clampée à [CARD_MIN_W_EST, CARD_MAX_W_EST].
  // Le max-width CSS sera lu depuis --card-max-w si disponible.
  const CARD_MAX_W_EST = parseFloat(
    getComputedStyle(document.documentElement).getPropertyValue('--card-max-w')
  ) || 520;

  const title  = eventName(ev) || '';
  const desc   = eventDesc(ev) || '';
  const amount = formatAmount(p1(ev,'amount')||p1(ev,'amountExpected'),
                              p1(ev,'amountCurrency')||p1(ev,'currency')) || '';
  // Chaque élément contribue à la largeur max de la carte
  // (la carte est width:max-content → elle prend la largeur du plus long enfant non-wrappable)
  // Pour le titre (13px, wrappable) : on utilise sqrt(len) × char_px pour approcher
  // la largeur effective après wrapping éventuel, mais au premier passage on suppose 1 ligne.
  const wTitle  = title.length  * CARD_CHAR_PX;
  const wDesc   = desc.length   * 6.3;   // 11px Inter ≈ 6.3px/char
  const wAmount = amount.length * 7.5;   // monospace 12px
  const wMax = Math.max(wTitle, wDesc, wAmount);
  const raw = Math.round(wMax + CARD_PAD_H + CARD_BORDER_L);
  return Math.max(CARD_MIN_W_EST, Math.min(CARD_MAX_W_EST, raw));
}

function buildEvents_DOM(canvas) {
  // ── Passe 1 : calculer le X naturel et le Y naturel de chaque événement ──
  const items = []; // { ev, ax, xNat, yNat, wPx }
  for (const ev of EVENTS) {
    const ax = AXIS_MAP[ev._resolvedAxis];
    if (!ax) continue;

    const yNat = dateY(eventDate(ev));
    // Ancrage X : bord droit de la bande de la société référencée (= position du dot)
    // + CARD_OFFSET. Chaque événement s'aligne sur sa propre société, non sur l'axe.
    const xDotNat = evDotX(ev, ax);
    const xNat = xDotNat + CARD_OFFSET;
    const wPx  = estimateCardW(ev);
    items.push({ ev, ax, xNat: Math.round(xNat), yNat, wPx });
  }

  // ── Passe 2 : dépilement vertical avec détection de chevauchement réel ──
  // Chaque carte a sa propre largeur estimée (estimateCardW).
  // Deux cartes se chevauchent horizontalement si leurs plages [xNat, xNat+wPx] se croisent.
  // placed stocke wPx pour chaque carte déjà positionnée.
  const placed = []; // { ev, ax, xNat, yNat, yFinal, peeked, stackDepth, wPx }

  // Prédicat : deux cartes se chevauchent-elles horizontalement ?
  function hOverlap(a, b) {
    return a.xNat < b.xNat + b.wPx && b.xNat < a.xNat + a.wPx;
  }

  if (INVERT_TIMELINE) {
    // ── Mode inversé : ancien = grand Y, traité en premier ──
    items.sort((a, b) => b.yNat - a.yNat);

    for (const item of items) {
      let yFinal = item.yNat;
      let peeked = false;
      let stackDepth = 0;

      const hConflicts = placed.filter(p => hOverlap(item, p));

      if (hConflicts.length > 0) {
        const cursor = Math.min(...hConflicts.map(p => p.yFinal));
        if (yFinal + CARD_EST_H > cursor - PEEK_GAP) {
          yFinal = cursor - PEEK_GAP - PEEK_H;
          peeked = true;
          stackDepth = hConflicts.filter(p => p.peeked).length;
        }
      }

      placed.push({ ev: item.ev, ax: item.ax, xNat: item.xNat, yNat: item.yNat,
                    yFinal, peeked, stackDepth, wPx: item.wPx });
    }
  } else {
    // ── Mode normal : ancien = petit Y, traité en premier ──
    items.sort((a, b) => a.yNat - b.yNat);

    for (const item of items) {
      let yFinal = item.yNat;
      let peeked = false;
      let stackDepth = 0;

      const hConflicts = placed.filter(p => hOverlap(item, p));

      if (hConflicts.length > 0) {
        const cursor = Math.max(...hConflicts.map(p => p.yFinal + (p.peeked ? PEEK_H : CARD_EST_H)));
        if (yFinal < cursor + PEEK_GAP) {
          yFinal = cursor + PEEK_GAP;
          peeked = true;
          stackDepth = hConflicts.filter(p => p.peeked).length;
        }
      }

      placed.push({ ev: item.ev, ax: item.ax, xNat: item.xNat, yNat: item.yNat,
                    yFinal, peeked, stackDepth, wPx: item.wPx });
    }
  }

  // ── Passe 3 : rendu DOM ──
  for (const { ev, ax, xNat, yNat, yFinal, peeked, stackDepth } of placed) {
    const DOT_R = 7; // doit correspondre à --dot-r

    // Refs sociétés liées à cet événement (pour surlignage sur hover bande)
    const coIds = pAll(ev, 'ftmRef').join(' ');

    // ── Nœud dot — positionné sur la bande de la société ftmRef ──
    const xDot = evDotX(ev, ax);
    const dotNode = document.createElement('div');
    dotNode.className = 'ev-dot-node';
    dotNode.setAttribute('data-ev-id', ev.id);
    if (coIds) dotNode.dataset.coIds = coIds;
    dotNode.style.left = xDot + 'px';
    dotNode.style.top  = yNat + 'px';

    // Segment bar pour événements à durée (ancré sur le dot)
    const endDate = eventEndDate(ev);
    if (endDate) {
      const yEnd = dateY(endDate);
      const segTop = Math.min(yNat, yEnd) - yNat; // relatif au dotNode
      const segH   = Math.abs(yEnd - yNat);
      const seg = document.createElement('div');
      seg.className = 'ev-segment';
      seg.style.top    = segTop + 'px';
      seg.style.height = segH + 'px';
      seg.style.background = ax.color;
      dotNode.appendChild(seg);
    }

    const dot = document.createElement('div');
    const sCls = schemaClass(ev);
    // null sCls = Event générique → tick horizontal ; sinon forme spécifique
    const dotShapeCls = sCls ? 'ev-dot--' + sCls : 'ev-dot--tick';
    dot.className = ['ev-dot', dotShapeCls, isAlert(ev) ? 'alert-dot' : '']
      .filter(Boolean).join(' ');
    // Payment : couleur via currentColor ; tick : opacité CSS ; autres : background
    if (sCls === 'payment') dot.style.color = ax.color;
    else dot.style.background = ax.color;
    dotNode.appendChild(dot);

    canvas.appendChild(dotNode);

    // ── Card anchor — ancré sur le centre du dot (xDot, yFinal+DOT_R) ──
    // Le coin haut-gauche de l'anchor est au centre vertical du dot :
    //   X = xDot (centre de la bande)
    //   Y = yFinal + DOT_R (intègre l'empilement — c'est là que s'affiche la carte)
    // Le dateLabel est rattaché ici pour s'aligner sur la carte, pas sur le dot à yNat.
    const dateStr  = eventDate(ev);
    const endStr   = eventEndDate(ev);
    const dateDisplay = endStr
      ? `${formatDate(dateStr)} – ${formatDate(endStr)}`
      : formatDate(dateStr);

    const anchor = document.createElement('div');
    anchor.className = 'ev-anchor';
    anchor.id = `ev-${ev.id}`;
    anchor.setAttribute('data-axis', ev._resolvedAxis);
    anchor.setAttribute('data-dot-x', xDot);
    anchor.setAttribute('data-dot-y', yNat);
    if (coIds) anchor.dataset.coIds = coIds;
    anchor.style.left = xDot + 'px';
    anchor.style.top  = (yFinal + DOT_R - CARD_TITLE_HALF_H) + 'px';

    // ── Label date à gauche du dot, ancré sur l'anchor ──
    // anchor.top = yFinal + DOT_R - CARD_TITLE_HALF_H.
    // Le translateY(-50%) de .ev-dot-label le centre sur (anchor.top + 0) = yFinal+DOT_R-TITLE_HALF
    // → décaler la date pour qu'elle reste alignée sur le centre du dot :
    //   on a besoin qu'elle soit à anchor.top + CARD_TITLE_HALF_H = yFinal+DOT_R (centre du dot).
    // On passe CARD_TITLE_HALF_H en custom property sur l'anchor pour le CSS.
    anchor.style.setProperty('--title-half', CARD_TITLE_HALF_H + 'px');
    if (dateStr) {
      const dateLabel = document.createElement('div');
      dateLabel.className = 'ev-dot-label';
      dateLabel.textContent = dateDisplay;
      anchor.appendChild(dateLabel);
    }

    // Card
    const card = document.createElement('div');
    const sCls2 = schemaClass(ev);
    const cls = ['ev-card', 'right',
                 sCls2 ? 'ev-card--' + sCls2 : '',
                 peeked ? 'peeked' : '',
                 isAlert(ev) ? 'is-alert' : '']
      .filter(Boolean).join(' ');
    card.className = cls;
    card.style.borderLeftColor = ax.color;
    card.style.zIndex = String(peeked ? 10 + stackDepth : 20 + stackDepth);
    if (peeked && stackDepth > 0) {
      card.setAttribute('data-stack-depth', '+' + stackDepth);
    }

    const amount = formatAmount(p1(ev,'amount')||p1(ev,'amountExpected'), p1(ev,'amountCurrency')||p1(ev,'currency'));

    card.innerHTML = `
      <div class="ev-card-title">${esc(eventName(ev))}</div>
      ${eventDesc(ev) ? `<div class="ev-card-desc">${esc(eventDesc(ev))}</div>` : ''}
      ${amount ? `<span class="ev-card-amount">${esc(amount)}</span>` : ''}
    `;

    // Sources : modal uniquement (supprimées des cartes)
    // Handlers — dot et carte partagent les mêmes actions
    const hlAll = () => { highlightConnectors(ev.id); highlightDotConnector(ev.id); };
    const clAll = () => { clearConnectorHighlights(); clearDotConnectorHighlights(); };
    dot.addEventListener('mouseenter', (e) => { showTooltip(e, ev); hlAll(); });
    dot.addEventListener('mouseleave',  () => { hideTooltip(); clAll(); });
    dot.addEventListener('click',  () => openModal(ev));
    // Sur mobile : tap = ouvrir modal directement (pas de hover)
    dot.addEventListener('touchend', (e) => { e.preventDefault(); openModal(ev); }, { passive: false });
    card.addEventListener('click', () => openModal(ev));
    card.addEventListener('mouseenter', hlAll);
    card.addEventListener('mouseleave',  clAll);

    anchor.appendChild(card);
    canvas.appendChild(anchor);
  }
}

/* ═══════════════════════════════════════════════════════════
   CONNECTOR LINES (SVG)
═══════════════════════════════════════════════════════════ */
let connectorMap = {}; // sharedEntityId → [evId, …]

function buildConnectors(svg) {
  connectorMap = {};

  // Group events by shared ftmRef
  for (const ev of EVENTS) {
    for (const ref of pAll(ev,'ftmRef')) {
      if (!connectorMap[ref]) connectorMap[ref] = [];
      connectorMap[ref].push(ev.id);
    }
  }

  svg.innerHTML = '';
  svg.style.width  = CANVAS_WIDTH + 'px';
  svg.style.height = CANVAS_HEIGHT + 'px';

  for (const [refId, evIds] of Object.entries(connectorMap)) {
    if (evIds.length < 2) continue;
    // Draw lines between consecutive pairs
    for (let i = 0; i < evIds.length - 1; i++) {
      const a = EVENTS.find(e => e.id === evIds[i]);
      const b = EVENTS.find(e => e.id === evIds[i+1]);
      if (!a || !b) continue;

      const ax1 = AXIS_MAP[a._resolvedAxis];
      const ax2 = AXIS_MAP[b._resolvedAxis];
      if (!ax1 || !ax2) continue;
      if (ax1 === ax2) continue; // same axis = no cross connector

      const x1 = ax1._xPx, y1 = dateY(eventDate(a));
      const x2 = ax2._xPx, y2 = dateY(eventDate(b));

      // Shared entity color = first axis color
      const color = ax1.color;

      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      const cx = (x1+x2)/2;
      path.setAttribute('d', `M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}`);
      path.setAttribute('stroke', color);
      path.classList.add('connector-line');
      path.setAttribute('data-evids', `${evIds[i]}|${evIds[i+1]}`);
      path.setAttribute('data-refid', refId);
      svg.appendChild(path);
    }
  }
}

function setConnectorsVisible(v) {
  document.querySelectorAll('.connector-line').forEach(l => {
    l.classList.toggle('visible', v);
  });
}

/* ═══════════════════════════════════════════════════════════
   DOT-CARD CONNECTOR LINES (trait permanent carte ↔ dot sur bande)
═══════════════════════════════════════════════════════════ */
function buildDotConnectors(svg) {
  const DOT_R = 7;
  for (const anchor of document.querySelectorAll('.ev-anchor[data-dot-x]')) {
    const xDot  = +anchor.getAttribute('data-dot-x');
    const yDot  = +anchor.getAttribute('data-dot-y');
    const xCard = parseFloat(anchor.style.left);
    const yCard = parseFloat(anchor.style.top);

    // Origine du trait : centre du dot (xDot, yDot + DOT_R)
    // Destination : centre de la première ligne du titre = anchor.top + CARD_TITLE_HALF_H
    //   → yCard + CARD_TITLE_HALF_H = (yFinal + DOT_R - CARD_TITLE_HALF_H) + CARD_TITLE_HALF_H
    //   = yFinal + DOT_R (= centre du dot hors empilement → trait nul → skip)
    const x1 = xDot,                          y1 = yDot + DOT_R;
    const x2 = xCard,                         y2 = yCard + CARD_TITLE_HALF_H;
    // Skip uniquement si le déplacement vertical est nul (dot et carte parfaitement superposés)
    if (Math.abs(y1 - y2) < 2) continue;

    const evId = anchor.id.replace(/^ev-/, '');
    const ev = EVENTS.find(e => e.id === evId);
    if (!ev) continue;
    const ax = AXIS_MAP[ev._resolvedAxis];
    if (!ax) continue;

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', ax.color);
    line.classList.add('dot-card-line');
    line.setAttribute('data-evid', evId);
    svg.appendChild(line);
  }
}


/* ═══════════════════════════════════════════════════════════
   LIGNE CDP PAR PERSONNE
   Pour chaque Person ayant des sociétés avec CDP connue :
   tracer une ligne horizontale pointillée colorée traversant
   toute la largeur du canvas, au niveau de la CDP la plus ancienne.
═══════════════════════════════════════════════════════════ */
function buildPersonCdpLines(svg) {
  svg.querySelectorAll('.person-cdp-line, .person-cdp-label').forEach(el => el.remove());

  const CDP_KWD = /cessation des paiements/i;

  // 1. CDP par société (date la plus ancienne)
  const cdpByCompany = {};
  for (const ev of EVENTS) {
    const text = [...pAll(ev,'name'), ...pAll(ev,'description')].join(' ');
    if (!CDP_KWD.test(text)) continue;
    const d = eventDate(ev);
    if (!d) continue;
    const refs = pAll(ev,'ftmRef').filter(id => {
      const ent = ENTITIES[id];
      return ent && (ent.schema === 'Company' || ent.schema === 'LegalEntity');
    });
    for (const coId of refs) {
      if (!cdpByCompany[coId] || d < cdpByCompany[coId]) cdpByCompany[coId] = d;
    }
  }

  // 2. Pour chaque Person : trouver la plus ancienne CDP parmi ses sociétés liées
  const personOldestCdp = {};
  for (const ent of Object.values(ENTITIES)) {
    let personId = null, coId = null;
    if (ent.schema === 'Directorship') {
      personId = p1(ent,'director') || p1(ent,'person');
      coId     = p1(ent,'organization');
    } else if (ent.schema === 'Ownership') {
      personId = p1(ent,'owner');
      coId     = p1(ent,'asset');
    }
    if (!personId || !coId) continue;
    const pEnt = ENTITIES[personId];
    if (!pEnt || pEnt.schema !== 'Person') continue;
    const d = cdpByCompany[coId];
    if (!d) continue;
    if (!personOldestCdp[personId] || d < personOldestCdp[personId].date) {
      personOldestCdp[personId] = { date: d, via: coId };
    }
  }

  // 3. Tracer les lignes
  const tooltip = document.getElementById('band-tooltip');
  for (const [personId, info] of Object.entries(personOldestCdp)) {
    const pEnt  = ENTITIES[personId];
    const pName = pEnt ? (p1(pEnt,'name') || personId) : personId;
    const col   = personColor(personId);
    const yLine = dateY(info.date);

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', 0);
    line.setAttribute('y1', yLine);
    line.setAttribute('x2', CANVAS_WIDTH);
    line.setAttribute('y2', yLine);
    line.setAttribute('stroke', col);
    line.classList.add('person-cdp-line');
    line.setAttribute('data-person', personId);

    line.addEventListener('mouseenter', (e) => {
      const viaName = p1(ENTITIES[info.via], 'name') || info.via;
      tooltip.innerHTML = `<strong style="color:${col}">${esc(pName)}</strong><br>CDP la plus ancienne : <em>${esc(formatDate(info.date))}</em><br><span style="opacity:0.72;font-size:0.9em">via ${esc(viaName)}</span>`;
      tooltip.style.borderLeft = `3px solid ${col}`;
      tooltip.style.display = 'block';
    });
    line.addEventListener('mousemove', (e) => {
      const canvasEl = document.getElementById('canvas');
      const rect = canvasEl.getBoundingClientRect();
      tooltip.style.left = (e.clientX - rect.left + 14) + 'px';
      tooltip.style.top  = (e.clientY - rect.top  - 10 + canvasEl.scrollTop) + 'px';
    });
    line.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
    svg.appendChild(line);

    // Label texte en SVG : nom de la personne, collé à gauche
    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', 4);
    label.setAttribute('y', yLine - 3);
    label.setAttribute('fill', col);
    label.setAttribute('font-size', '7.5');
    label.setAttribute('font-family', 'var(--font-mono, monospace)');
    label.setAttribute('letter-spacing', '0.06em');
    label.setAttribute('opacity', '0.88');
    label.setAttribute('pointer-events', 'none');
    label.setAttribute('paint-order', 'stroke fill');
    label.setAttribute('stroke', 'rgba(242,241,238,0.92)');
    label.setAttribute('stroke-width', '3');
    label.setAttribute('stroke-linejoin', 'round');
    label.classList.add('person-cdp-label');
    label.textContent = pName.toUpperCase() + ' — CDP';
    svg.appendChild(label);
  }
}

/* ═══════════════════════════════════════════════════════════
   FILTRES : axe, schéma, texte
═══════════════════════════════════════════════════════════ */
let MUTED_SCHEMAS  = new Set();
let MUTED_STATUSES = new Set();  // statuts co-band masqués (rj, lj, active, …)
let VISUAL_FLAGS   = {           // éléments visuels togglables
  mandates:    true,
  hatching:    true,
  cdpZones:    true,
  connectors:  true,
  dotConns:    true,
  personCdp:   true,
  heatmap:     true,
  alerts:      true,
  axisZones:   true,
};
let SEARCH_TEXT   = '';

function applyFilters() {
  const needle = SEARCH_TEXT.trim().toLowerCase();
  document.querySelectorAll('.ev-anchor').forEach(el => {
    const evId   = el.id.replace('ev-', '');
    const evAxis = el.getAttribute('data-axis');
    const ev     = EVENTS.find(e => e.id === evId);
    if (!ev) return;

    // Critère 1 : axe muté
    const hiddenByAxis = MUTED_AXES.has(evAxis);

    // Critère 2 : schéma muté
    const hiddenBySchema = MUTED_SCHEMAS.size > 0 && !MUTED_SCHEMAS.has(ev.schema);

    // Critère 3 : texte absent
    let hiddenBySearch = false;
    if (needle) {
      const hay = [
        eventName(ev),
        eventDesc(ev) || '',
        eventDate(ev) || '',
        ev.schema,
        p1(ev, 'sourceLabel') || '',
      ].join(' ').toLowerCase();
      hiddenBySearch = !hay.includes(needle);
    }

    // Critères 4+5 : company principale de l'événement masquée (par id, axe ou statut)
    // Company principale = premier ftmRef qui est une Company dans ENTITIES.
    // Si cette company est masquée, l'événement disparaît avec sa bande.
    let hiddenByCo    = false;
    let hiddenByStatus = false;
    {
      const evCoIds = pAll(ev, 'ftmRef');
      if (evCoIds.length > 0) {
        // Trouver la company principale (premier ftmRef de schema Company)
        const primaryId = evCoIds.find(id => ENTITIES[id]?.schema === 'Company') || evCoIds[0];
        const co = ENTITIES[primaryId];
        if (co) {
          const axId = p1(co, 'axis') || null;
          const st   = p1(co, 'status') || 'default';
          hiddenByCo = MUTED_COS.has(primaryId)
            || (axId && MUTED_AXES.has(axId));
          hiddenByStatus = MUTED_STATUSES.size > 0 && MUTED_STATUSES.has(st);
        }
      }
    }

    el.classList.toggle('axis-hidden',
      hiddenByAxis || hiddenBySchema || hiddenBySearch || hiddenByCo || hiddenByStatus);
  });

  // Bandes co-band : masquer selon company individuelle, axe ou statut
  document.querySelectorAll('.co-band').forEach(band => {
    const coId   = band.id.replace('co-', '');
    const co     = ENTITIES[coId];
    const st     = p1(co, 'status') || 'default';
    const axisId = _companyLayout[coId]?.axisId;
    const muted  = MUTED_COS.has(coId)
      || (axisId && MUTED_AXES.has(axisId))
      || (MUTED_STATUSES.size > 0 && MUTED_STATUSES.has(st));
    band.classList.toggle('co-muted', muted);
  });
}

function buildSchemaFilters() {
  // Recenser les schémas présents dans EVENTS
  const counts = {};
  for (const ev of EVENTS) counts[ev.schema] = (counts[ev.schema] || 0) + 1;

  const container = document.getElementById('inf-schema-btns');
  if (!container) return;
  container.innerHTML = '';

  // Icônes par schéma
  const SCHEMA_ICON = {
    Event:        '⬡',
    Document:     '◻',
    Directorship: '◈',
    Payment:      '⊛',
    Ownership:    '◉',
  };

  for (const [schema, count] of Object.entries(counts).sort((a,b)=>b[1]-a[1])) {
    const btn = document.createElement('button');
    btn.className = 'inf-schema-btn active';
    btn.dataset.schema = schema;
    btn.title = `${schema} (${count})`;
    btn.innerHTML = `${SCHEMA_ICON[schema] || '○'} ${schema}`;
    btn.addEventListener('click', () => {
      if (MUTED_SCHEMAS.has(schema)) {
        MUTED_SCHEMAS.delete(schema);
        btn.classList.add('active');
      } else {
        MUTED_SCHEMAS.add(schema);
        btn.classList.remove('active');
      }
      applyFilters();
    });
    container.appendChild(btn);
  }
}

// Recherche texte : debounced
let _searchDebounce = null;
document.addEventListener('DOMContentLoaded', () => {
  const inp = document.getElementById('inf-search');
  if (!inp) return;
  inp.addEventListener('input', () => {
    clearTimeout(_searchDebounce);
    _searchDebounce = setTimeout(() => {
      SEARCH_TEXT = inp.value;
      applyFilters();
    }, 200);
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Escape') { inp.value = ''; SEARCH_TEXT = ''; applyFilters(); inp.blur(); }
  });
});

function toggleAxis(axId) {
  if (MUTED_AXES.has(axId)) MUTED_AXES.delete(axId);
  else MUTED_AXES.add(axId);

  // Sync pill header
  document.getElementById(`pill-${axId}`)?.classList.toggle('muted', MUTED_AXES.has(axId));

  // Repacking complet : les bandes restantes se resserrent
  rebuildCanvas();
}

/* Masquer / afficher une bande company individuelle. */
function toggleCo(coId) {
  if (MUTED_COS.has(coId)) MUTED_COS.delete(coId);
  else MUTED_COS.add(coId);

  // Repacking complet : les bandes restantes se resserrent
  rebuildCanvas();
}


/* ═══════════════════════════════════════════════════════════
   APPLY VISUALS — applique VISUAL_FLAGS au DOM
═══════════════════════════════════════════════════════════ */
function applyVisuals() {
  const canvas = document.getElementById('canvas');
  if (!canvas) return;

  // Mandats (lignes dirigeants dans les bandes)
  canvas.querySelectorAll('.mandate-line').forEach(el => {
    el.style.display = VISUAL_FLAGS.mandates ? '' : 'none';
  });
  // Hachures procédurales DDC/forclusion/appel
  canvas.querySelectorAll('.proc-hatch').forEach(el => {
    el.style.display = VISUAL_FLAGS.hatching ? '' : 'none';
  });
  // Zones CDP (fond jaune)
  canvas.querySelectorAll('.cdp-zone').forEach(el => {
    el.style.display = VISUAL_FLAGS.cdpZones ? '' : 'none';
  });
  // Zones de fond par axe (axis-zone)
  canvas.querySelectorAll('.axis-zone').forEach(el => {
    el.style.opacity = VISUAL_FLAGS.axisZones ? '' : '0';
  });
  // Connexions SVG entre entités
  const connSvg = document.getElementById('connector-svg');
  if (connSvg) {
    connSvg.querySelectorAll('.conn-line, .conn-arrow, .conn-path, g[class^="conn"]').forEach(el => {
      el.style.display = VISUAL_FLAGS.connectors ? '' : 'none';
    });
    // Lignes CDP par personne
    connSvg.querySelectorAll('.person-cdp-line, .person-cdp-label').forEach(el => {
      el.style.display = VISUAL_FLAGS.personCdp ? '' : 'none';
    });
    // Lignes dot-connectors (entre dots liés)
    connSvg.querySelectorAll('.dot-card-line').forEach(el => {
      el.style.display = VISUAL_FLAGS.dotConns ? '' : 'none';
    });
  }
  // Heatmap densité
  const hm = document.getElementById('density-heatmap');
  if (hm) hm.style.opacity = VISUAL_FLAGS.heatmap ? '' : '0';

  // Alertes (pulse + banner)
  document.querySelectorAll('.alert-dot, .ev-card.is-alert').forEach(el => {
    el.classList.toggle('visually-hidden-alert', !VISUAL_FLAGS.alerts);
  });
}

/* ═══════════════════════════════════════════════════════════
   TOOLTIP
═══════════════════════════════════════════════════════════ */
const tooltip = document.getElementById('tooltip');
function showTooltip(e, ev) {
  const ax = AXIS_MAP[ev._resolvedAxis];
  const amount = formatAmount(p1(ev,'amount')||p1(ev,'amountExpected'), p1(ev,'amountCurrency')||p1(ev,'currency'));
  tooltip.innerHTML = `
    <strong>${esc(eventName(ev))}</strong>
    <span style="color:${ax?.color||'#999'};font-family:var(--font-mono);font-size:9px;letter-spacing:0.06em">${formatDate(eventDate(ev))}</span>
    ${amount ? `<br><span style="font-family:var(--font-mono);font-size:11px;font-weight:600">${esc(amount)}</span>` : ''}
  `;
  tooltip.classList.add('visible');
  moveTooltip(e);
}
function moveTooltip(e) {
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top  = (e.clientY - 10) + 'px';
}
function hideTooltip() { tooltip.classList.remove('visible'); }
document.addEventListener('mousemove', e => {
  if (tooltip.classList.contains('visible')) moveTooltip(e);
});

/* ═══════════════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════════════ */
function openModal(ev) {
  const ax = AXIS_MAP[ev._resolvedAxis];
  const backdrop = document.getElementById('modal-backdrop');

  document.getElementById('modal-axis-tag').textContent = ax?.label || ev._resolvedAxis;
  document.getElementById('modal-axis-tag').style.background = ax?.color || '#666';
  document.getElementById('modal-schema-tag').textContent = ev.schema;
  document.getElementById('modal-title').textContent = eventName(ev);

  const dateStr = eventDate(ev);
  const endStr  = eventEndDate(ev);
  document.getElementById('modal-date').textContent =
    endStr ? `${formatDate(dateStr)} – ${formatDate(endStr)}` : formatDate(dateStr);

  const body = document.getElementById('modal-body');
  body.innerHTML = '';

  // Description
  const desc = eventDesc(ev);
  if (desc) {
    const sec = section('Description');
    const p = document.createElement('p');
    p.className = 'modal-description';
    p.textContent = desc;
    sec.appendChild(p);
    body.appendChild(sec);
  }

  // Amount
  const amount = formatAmount(p1(ev,'amount')||p1(ev,'amountExpected'), p1(ev,'amountCurrency')||p1(ev,'currency'));
  if (amount) {
    const sec = section('Montant');
    const el = document.createElement('div');
    el.className = 'modal-amount';
    el.style.color = ax?.color || 'inherit';
    el.textContent = amount;
    sec.appendChild(el);
    body.appendChild(sec);
  }

  // Properties grid (show interesting props)
  const skipProps = new Set(['name','fileName','description','date','startDate','endDate','dissolutionDate','incorporationDate','amount','amountCurrency','currency','axis','eventLabel','ftmRef','alert','sourceUrl']);
  const propsToShow = Object.entries(ev.properties || {})
    .filter(([k]) => !skipProps.has(k) && ev.properties[k].length);
  if (propsToShow.length) {
    const sec = section('Propriétés');
    const grid = document.createElement('div');
    grid.className = 'modal-prop-grid';
    for (const [k, vals] of propsToShow) {
      const prop = document.createElement('div');
      prop.className = 'modal-prop';
      prop.innerHTML = `<div class="modal-prop-key">${esc(k)}</div><div class="modal-prop-val">${esc(vals.join(' · '))}</div>`;
      grid.appendChild(prop);
    }
    sec.appendChild(grid);
    body.appendChild(sec);
  }

  // FtM references
  const refs = pAll(ev,'ftmRef');
  if (refs.length) {
    const sec = section('Entités liées');
    const refsCont = document.createElement('div');
    refsCont.className = 'modal-refs';
    for (const refId of refs) {
      const refEnt = ENTITIES[refId];
      if (!refEnt) {
        const el = document.createElement('div');
        el.className = 'modal-ref-card';
        el.innerHTML = `<span class="modal-ref-schema" style="background:#888">${esc(refId.split('-')[0])}</span><span class="modal-ref-name" style="color:var(--dust)">${esc(refId)}</span>`;
        refsCont.appendChild(el);
        continue;
      }
      const refAx = AXIS_MAP[entityAxis(refEnt)];
      const schemaColor = refAx?.color || '#888';
      const el = document.createElement('div');
      el.className = 'modal-ref-card';
      el.style.cursor = 'pointer';
      el.innerHTML = `
        <span class="modal-ref-schema" style="background:${schemaColor}">${esc(refEnt.schema)}</span>
        <span class="modal-ref-name">${esc(p1(refEnt,'name')||p1(refEnt,'fileName')||refId)}</span>
      `;
      if (pAll(refEnt,'name').length > 1) {
        el.title = 'Également : ' + pAll(refEnt,'name').slice(1).join(' · ');
      }
      el.addEventListener('click', () => {
        // If it's an event entity, navigate to it; else show its modal
        const asEvent = EVENTS.find(e => e.id === refId);
        if (asEvent) openModal(asEvent);
      });
      refsCont.appendChild(el);
    }
    sec.appendChild(refsCont);
    body.appendChild(sec);
  }

  // Source URL
  const srcUrls = pAll(ev,'sourceUrl');
  if (srcUrls.length) {
    const sec = section('Source primaire');
    for (const url of srcUrls) {
      const a = document.createElement('a');
      a.href = url;
      a.target = '_blank';
      a.rel = 'noopener';
      a.className = 'modal-source-link';
      let label = url;
      try { label = new URL(url).hostname; } catch {}
      a.innerHTML = `
        <span class="modal-source-icon">↗</span>
        <span class="modal-source-text">
          <span class="modal-source-label">${esc(label)}</span>
          <span class="modal-source-url">${esc(url)}</span>
        </span>
      `;
      sec.appendChild(a);
    }
    body.appendChild(sec);
  }

  backdrop.classList.add('open');
}

/* ═══════════════════════════════════════════════════════════
   ESCAPE
═══════════════════════════════════════════════════════════ */
function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════════════════════════
   SHA-256 (Web Crypto API — natif, sans dépendance)
═══════════════════════════════════════════════════════════ */
async function sha256hex(text) {
  const buf = await crypto.subtle.digest(
    'SHA-256', new TextEncoder().encode(text)
  );
  return Array.from(new Uint8Array(buf))
    .map(b => b.toString(16).padStart(2,'0')).join('');
}

function integrityColor(s) {
  if (s === INT_OK)      return '#27ae60';
  if (s === INT_NEW)     return '#f39c12';
  if (s === INT_ALTERED) return '#e74c3c';
  return '#6b6762';
}
