   MAIN LOAD & RENDER
═══════════════════════════════════════════════════════════ */
async function main() {
  const loader = document.getElementById('loader');

  // ── Log de démarrage : identifier la version exacte ──
  console.group('%c⬡ Affaire DeSavoie — chargement', 'color:#e67e22;font-weight:600');
  console.log(`BUILD_ID  : ${BUILD_ID}`);
  // Tenter de lire le nom réel de la page (fonctionne en HTTP, pas en file://)
  try {
    const resp = await fetch(location.href, {method:'HEAD'});
    const cd = resp.headers.get('content-disposition') || '';
    const fnMatch = cd.match(/filename="([^"]+)"/);
    console.log(`index.html: ${fnMatch ? fnMatch[1] : location.pathname.split('/').pop() || location.href}`);
  } catch {
    console.log(`index.html: ${location.pathname.split('/').pop() || location.href}`);
  }
  console.groupEnd();

  // 0. Détecter le protocole file:// — fetch() bloqué par le navigateur
  if (location.protocol === 'file:') {
    loader.querySelector('.loader-text').innerHTML =
      'Ouverture directe non supportée&nbsp;(protocole <code>file://</code>)<br>' +
      '<span style="font-size:11px;opacity:0.7;font-family:var(--font-mono)">' +
      'Lancez&nbsp;<strong>python deploy.py --local</strong>&nbsp;puis ouvrez&nbsp;' +
      '<strong>http://localhost:8080</strong></span>';
    loader.querySelector('.loader-text').style.color = '#f39c12';
    return;
  }

  // 1. Charger le manifest — nom canonique uniquement (deploy.py gère le versionnage)
  let manifest;
  let manifestText = null;
  try {
    const r = await fetch('manifest.json');
    if (r.ok) manifestText = await r.text();
  } catch {}
  if (!manifestText) {
    loader.querySelector('.loader-text').textContent = 'Erreur : manifest.json introuvable';
    loader.querySelector('.loader-text').style.color = '#e74c3c';
    return;
  }
  try { manifest = JSON.parse(manifestText); }
  catch(e) {
    loader.querySelector('.loader-text').textContent = `Erreur manifest JSON : ${e.message}`;
    loader.querySelector('.loader-text').style.color = '#e74c3c';
    return;
  }
  const manifestVersion = 0; // versionnage géré par deploy.py, pas par le navigateur
  const manifestHash = await sha256hex(manifestText);
  FILE_REPORTS.push({
    name: 'manifest.json',
    version: manifestVersion,
    status: INT_UNKNOWN,  // le manifest lui-même ne peut pas se vérifier
    hash: manifestHash,
    size: manifestText.length,
  });

  // Log manifest
  const mvLabel = manifestVersion > 0 ? ` (${manifestVersion})` : '';
  console.log(
    `%cmanifest${mvLabel}.json%c  ${manifestHash.slice(0,12)}…  ${(manifestText.length/1024).toFixed(1)} Ko  axes:${(manifest.axes||[]).length}  fichiers:${(manifest.files||[]).length}`,
    'font-weight:600;color:#1a1c22',
    'color:#6b6762'
  );

  MANIFEST = manifest;
  for (const ax of (manifest.axes||[])) AXIS_MAP[ax.id] = ax;

  document.getElementById('hd-title-el').textContent = manifest.title || '';
  document.getElementById('hd-sub-el').textContent   = manifest.subtitle || '';

  // 2. Charger tous les JSONL avec détection de version et vérification hash
  const files = manifest.files || [];

  const fetches = files.map(async (f) => {
    const base = f.path; // ex: "data/reseau_goldberg.ftm.jsonl"
    const parts = base.match(/^(.*\/)([^/]+)(\.[^.]+)$/) ||
                  base.match(/^()([^/]+)(\.[^.]+)$/);
    const dir    = parts ? parts[1] : '';
    const stem   = parts ? parts[2] : base;
    const ext    = parts ? parts[3] : '';

    // Charger le nom canonique uniquement — deploy.py a résolu le versionnage
    loaderFile(base, 'loading');

    let bestText = null, bestVersion = 0, bestSize = 0;

    try {
      const r = await fetch(base);
      if (r.ok) {
        bestText    = await r.text();
        bestVersion = 0;
        bestSize    = bestText.length;
      }
    } catch {}

    if (!bestText) {
      loaderFile(base, 'warn');
      FILE_REPORTS.push({ name: base.split('/').pop(), version: 0,
        status: INT_MISSING, hash: '', size: 0 });
      console.warn(`Fichier non trouvé : ${base}`);
      return;
    }

    // Vérification d'intégrité
    const hash = await sha256hex(bestText);
    const expected = f.sha256;
    let status;
    if (!expected)           status = INT_UNKNOWN;
    else if (hash === expected) status = INT_OK;
    else                     status = INT_NEW;

    // Ingestion
    for (const line of bestText.split('\n')) ingestLine(line, f.axis);

    FILE_REPORTS.push({
      name: base.split('/').pop(),
      version: bestVersion,
      status,
      hash,
      size: bestSize,
    });

    const loaderState = status === INT_ALTERED ? 'error' :
                        status === INT_NEW      ? 'warn'  : 'ok';
    loaderFile(base, loaderState);
    // Log console : nom effectif chargé, version Windows, hash SHA-256
    const vLabel = bestVersion > 0 ? ` (${bestVersion})` : '';
    const sLabel = status === INT_OK      ? '✓ ok'
                 : status === INT_NEW     ? '~ nouveau'
                 : status === INT_ALTERED ? '✗ altéré'
                 : '? inconnu';
    console.log(
      `%c${stem}${vLabel}${ext}%c  ${sLabel}  ${hash.slice(0,12)}…  ${(bestSize/1024).toFixed(1)} Ko`,
      'font-weight:600;color:#1a1c22',
      'color:#6b6762'
    );
  });

  await Promise.all(fetches);

  // 3. Structures dérivées
  computeAxisPositions();
  buildEvents();
  _uboIndex = buildUboIndex(); // index bénéficiaires effectifs reconstitué

  // 4. Rendu
  const canvas = document.getElementById('canvas');
  canvas.style.width    = CANVAS_WIDTH + 'px';
  canvas.style.position = 'relative';

  buildYearSpine();  // fixe CANVAS_HEIGHT et SCALE_D
  // Ne pas écraser la hauteur CSS (flex:1, height:100%) — le spacer assure le scrollable
  let spacer = document.getElementById('canvas-spacer');
  if (!spacer) {
    spacer = document.createElement('div');
    spacer.id = 'canvas-spacer';
    spacer.style.cssText = 'position:relative;pointer-events:none;flex-shrink:0;';
    canvas.appendChild(spacer);
  }
  spacer.style.height = CANVAS_HEIGHT + 'px';
  buildAxisRails(canvas);
  buildProcedureHatching(canvas); // hachures DDC / forclusion / appel
  buildHeaderAxes();
  buildEvents_DOM(canvas);
  buildSchemaFilters();

  // 5. Connecteurs SVG
  const svg = document.getElementById('connector-svg');
  svg.style.width  = CANVAS_WIDTH  + 'px';
  svg.style.height = CANVAS_HEIGHT + 'px';
  buildConnectors(svg);
  buildPersonCdpLines(svg); // lignes CDP par personne

  // 6. Barre d'état
  updateInfoBar(files.length, manifest._last_deploy);
  buildIntegrityPanel();

  // 7. Masquer le loader
  setTimeout(() => { loader.classList.add('done'); }, 400);
}

// ════════════════════════════════════════════════════════════
// ENTROPIE & OPTIMISATION DE T
// ════════════════════════════════════════════════════════════
function computeEntropyForT(T_val, eventDays, totalD, H) {
  const usable = H - CANVAS_PAD_TOP - CANVAS_PAD_BOTTOM;
  const den = T_val > totalD * 50
    ? totalD
    : Math.exp(totalD / T_val) - 1;

  const positions = eventDays.map(t => {
    const num = T_val > totalD * 50 ? t : Math.exp(t / T_val) - 1;
    return CANVAS_PAD_TOP + (num / den) * usable;
  });

  const N_BUCKETS = 80;
  const bucketH   = H / N_BUCKETS;
  const buckets   = new Array(N_BUCKETS).fill(0);
  for (const p of positions) {
    const b = Math.min(N_BUCKETS - 1, Math.floor(p / bucketH));
    buckets[b]++;
  }
  let entropy = 0;
  const n = positions.length;
  for (const c of buckets) {
    if (c > 0) entropy -= (c / n) * Math.log(c / n);
  }
  return entropy;
}

function findOptimalT(eventDays, totalD, H) {
  // 40 valeurs en progression géométrique entre T_MIN et T_MAX
  const N = 40;
  const logMin = Math.log(SCALE_T_MIN);
  const logMax = Math.log(SCALE_T_MAX);
  let bestT = SCALE_T_MIN, bestEnt = -Infinity;
  const curve = [];
  for (let i = 0; i < N; i++) {
    const T = Math.round(Math.exp(logMin + (logMax - logMin) * i / (N - 1)));
    const e = computeEntropyForT(T, eventDays, totalD, H);
    curve.push({ T, e });
    if (e > bestEnt) { bestEnt = e; bestT = T; }
  }
  return { bestT, bestEnt, curve };
}

function updateScaleUI(curve, optT, curT, optEnt) {
  // Sparkline
  const svg = document.getElementById('inf-entropy-spark');
  if (!svg) return;
  const W = 60, H2 = 16;
  const eMin = Math.min(...curve.map(p => p.e));
  const eMax = Math.max(...curve.map(p => p.e));
  const eRange = eMax - eMin || 1;
  const logMin = Math.log(SCALE_T_MIN), logMax = Math.log(SCALE_T_MAX);

  const pts = curve.map(({ T, e }, i) => {
    const x = (i / (curve.length - 1)) * W;
    const y = H2 - 2 - ((e - eMin) / eRange) * (H2 - 4);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');

  // Position curseur courant
  const curX = ((Math.log(curT) - logMin) / (logMax - logMin)) * W;
  const optX = ((Math.log(optT) - logMin) / (logMax - logMin)) * W;

  svg.innerHTML = `
    <polyline points="${pts}" fill="none" stroke="#5a5650" stroke-width="1.2"/>
    <line x1="${optX.toFixed(1)}" y1="1" x2="${optX.toFixed(1)}" y2="${H2-1}"
          stroke="#b8a060" stroke-width="1" stroke-dasharray="2 2"/>
    <circle cx="${curX.toFixed(1)}" cy="${H2/2}" r="2.5" fill="#c8943a"/>
  `;

  // Texte T courant
  const Tdays = curT;
  const Tlabel = Tdays < 365 ? `${Tdays}j`
               : Tdays < 730 ? `${(Tdays/365).toFixed(1)}an`
               : `${Math.round(Tdays/365)}ans`;
  document.getElementById('inf-scale-T').textContent = Tlabel;

  const optLabel = optT < 365 ? `${optT}j`
                 : optT < 730 ? `${(optT/365).toFixed(1)}an`
                 : `${Math.round(optT/365)}ans`;
  const optEl = document.getElementById('inf-scale-opt');
  if (optEl) optEl.textContent = `(opt: ${optLabel})`;
}

// ════════════════════════════════════════════════════════════
// HEATMAP DE DENSITÉ
// ════════════════════════════════════════════════════════════
function buildDensityHeatmap() {
  const hm = document.getElementById('density-heatmap');
  if (!hm || !EVENTS.length) return;

  hm.width  = CANVAS_WIDTH;
  hm.height = CANVAS_HEIGHT;
  hm.style.width  = CANVAS_WIDTH  + 'px';
  hm.style.height = CANVAS_HEIGHT + 'px';

  const ctx = hm.getContext('2d');
  ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

  // ── Palette polychrome visible sur fond clair (--smoke #f2f1ee) ──
  // Teintes alternées chaud/froid, chaque cycle = SCALE_T jours.
  // Les valeurs RGB sont des tons moyens — l'alpha fait le reste.
  const PALETTE = [
    [180, 140, 100],  // ocre chaud
    [140, 160, 175],  // bleu-gris froid
    [160, 120,  90],  // brun terracotta
    [120, 150, 165],  // ardoise bleue
    [175, 145, 105],  // sable chaud
    [130, 155, 170],  // gris-bleu ciel
    [155, 125,  88],  // ocre retour
  ];
  const MAX_ALPHA = 0.09;  // par bande de 2px — visible par accumulation

  // ── Cycle adaptatif : 1 cycle = SCALE_T jours ──────────────
  // On mappe les jours → position dans le cycle [0, 1[
  // puis on interpole la palette.
  const STEP = 2; // px par bande
  const usable = CANVAS_HEIGHT - CANVAS_PAD_TOP - CANVAS_PAD_BOTTOM;

  // Précalcul : pour chaque px Y, retrouver le temps en jours
  // via inversion numérique de expScale (par dichotomie)
  function yToDays(yPx) {
    // Normalise [0,1] depuis le bord PAD_TOP ; inversion si timeline retournée
    let target = (yPx - CANVAS_PAD_TOP) / usable;
    if (INVERT_TIMELINE) target = 1 - target;   // récent en haut → inverser
    if (target <= 0) return 0;
    if (target >= 1) return SCALE_D;
    if (SCALE_T > SCALE_D * 50) return target * SCALE_D; // linéaire
    // Inversion analytique : t = T * ln(1 + target*(e^(D/T)-1))
    const den = Math.exp(SCALE_D / SCALE_T) - 1;
    return SCALE_T * Math.log(1 + target * den);
  }

  function samplePalette(phase) {
    // phase ∈ [0, 1[ → couleur interpolée dans PALETTE (cycle)
    const n = PALETTE.length;
    const scaled = ((phase % 1) + 1) % 1 * n;
    const i0 = Math.floor(scaled) % n;
    const i1 = (i0 + 1) % n;
    const f  = scaled - Math.floor(scaled);
    const r  = PALETTE[i0][0] + f * (PALETTE[i1][0] - PALETTE[i0][0]);
    const g  = PALETTE[i0][1] + f * (PALETTE[i1][1] - PALETTE[i0][1]);
    const b  = PALETTE[i0][2] + f * (PALETTE[i1][2] - PALETTE[i0][2]);
    return [Math.round(r), Math.round(g), Math.round(b)];
  }

  for (let y = CANVAS_PAD_TOP; y < CANVAS_HEIGHT - CANVAS_PAD_BOTTOM; y += STEP) {
    const tDays = yToDays(y);
    // Phase = combien de cycles de SCALE_T jours se sont écoulés
    const phase = (tDays / SCALE_T) % 1;
    const [r, g, b] = samplePalette(phase);
    ctx.fillStyle = `rgba(${r},${g},${b},${MAX_ALPHA})`;
    ctx.fillRect(0, y, CANVAS_WIDTH, STEP);
  }
}

/* ═══════════════════════════════════════════════════════════
   ZOOM
═══════════════════════════════════════════════════════════ */
function updateZoomLabel() {
  const el = document.getElementById('inf-zoom-label');
  if (el) el.textContent = Math.round(ZOOM * 100) + '%';
  // Griser les boutons aux limites
  const btnOut = document.getElementById('inf-zoom-out');
  const btnIn  = document.getElementById('inf-zoom-in');
  if (btnOut) btnOut.style.opacity = ZOOM <= ZOOM_STEPS[0] + 0.001 ? '0.3' : '1';
  if (btnIn)  btnIn.style.opacity  = ZOOM >= ZOOM_STEPS[ZOOM_STEPS.length-1] - 0.001 ? '0.3' : '1';
}

function stepZoom(direction) {
  // direction: +1 (zoom in) ou -1 (zoom out)
  const idx = ZOOM_STEPS.findIndex(z => Math.abs(z - ZOOM) < 0.001);
  const cur = idx === -1 ? 4 : idx;
  const nxt = Math.max(0, Math.min(ZOOM_STEPS.length - 1, cur + direction));
  if (ZOOM_STEPS[nxt] === ZOOM) return;
  ZOOM = ZOOM_STEPS[nxt];
  rebuildCanvas();
  updateZoomLabel();
}

function buildLegendPanel() {
  const panel = document.getElementById('legend-panel');
  if (!panel) return;
  panel.innerHTML = '';

  // ── Section : axes narratifs dépliables avec liste des companies ──

    title.className = 'lgd-section-title';
    title.textContent = 'Axes narratifs';

      cosByAxis[axId].push(coId);
    }

    for (const ax of Object.values(AXIS_MAP)) {

      // <details> dépliable

      if (MUTED_AXES.has(ax.id)) details.classList.add('muted-axis');
      details.dataset.axisId = ax.id;

      const summary = document.createElement('summary');

      // Dot couleur

      dot.className = 'lgd-swatch-dot';
      dot.style.background = ax.color;

      lbl.style.color = ax.color;

      txt.appendChild(lbl);
      if (ax.sublabel) {
        const sub = document.createElement('span');

      eye.textContent = MUTED_AXES.has(ax.id) ? '✕' : '◉';
      eye.addEventListener('click', ev => {
        ev.preventDefault(); ev.stopPropagation();
        toggleAxis(ax.id);
        eye.textContent = MUTED_AXES.has(ax.id) ? '✕' : '◉';

      chev.className = 'lgd-axis-toggle';
      chev.textContent = '▶';

      summary.appendChild(dot);
      summary.appendChild(txt);
      if (coIds.length) summary.appendChild(cnt);
      summary.appendChild(eye);
      if (coIds.length) summary.appendChild(chev);

      // Liste des companies (visible quand <details open>)
      if (coIds.length) {
        const list = document.createElement('div');
        list.className = 'lgd-co-list';

        for (const coId of coIds) {
          const co = ENTITIES[coId];
          if (!co) continue;
          const coName = p1(co, 'name') || coId;
          const status = p1(co, 'status') || 'default';

          const item = document.createElement('div');
          item.className = 'lgd-co-item' + (MUTED_COS.has(coId) ? ' co-muted' : '');
          item.dataset.coId = coId;
          item.title = coName;

          const coEye = document.createElement('span');
          coEye.className = 'lgd-co-eye';
          coEye.textContent = MUTED_COS.has(coId) ? '✕' : '◉';

          const coLbl = document.createElement('span');
          coLbl.className = 'lgd-co-name';
          coLbl.textContent = coName;

            rj: '#8B4513', lj: '#1a1a1a', active: '#1a7a46',

          statusDot.className = 'lgd-co-status-dot';

          item.appendChild(coLbl);
          item.appendChild(statusDot);

  // ── Section : statuts sociétés (boutons-bascule) ──
  {
    const sec = document.createElement('div');
    sec.className = 'lgd-section';
    const title = document.createElement('div');
    title.className = 'lgd-section-title';
    title.textContent = 'Statuts';
    sec.appendChild(title);

      ['rj',        'Redressement judiciaire'],
      ['lj',        'Liquidation judiciaire'],
      ['insolvent', 'Cessation de paiements'],
      ['dissolved', 'Dissoute / radiée'],
      ['dormant',   'Dormante'],
      ['default',   'Statut inconnu'],
    ];
    for (const [key, label] of STATUTS) {
      // Compter les sociétés présentes avec ce statut

        e.schema === 'Company' && (p1(e,'status') || 'default') === key
      ).length;
      if (!count) continue; // n'afficher que les statuts représentés

      const entry = document.createElement('div');

        if (MUTED_STATUSES.has(key)) {

        } else {
          MUTED_STATUSES.add(key);
          entry.classList.add('lgd-muted');
        }
        rebuildCanvas();
      });

      sec.appendChild(entry);
    }
    panel.appendChild(sec);
  }

  // ── Section : schémas FtM (boutons-bascule) ──
  {
    const SCHEMA_ICON = {
      Event:        '⬡',
      Document:     '◻',
      Directorship: '◈',
      Payment:      '⊛',
      Ownership:    '◉',
      CourtCase:    '⚖',
    };
    const schemas = [...new Set(EVENTS.map(e => e.schema))];
    if (schemas.length) {
      const sec = document.createElement('div');
      sec.className = 'lgd-section';
      const title = document.createElement('div');
      title.className = 'lgd-section-title';
      title.textContent = 'Schémas FtM';

      for (const schema of schemas) {
        const count = EVENTS.filter(e => e.schema === schema).length;

        entry.appendChild(icon);
        entry.appendChild(lbl);

        entry.addEventListener('click', () => {
          // Logique solo-select : MUTED_SCHEMAS = ensemble des schémas NON actifs
          // Si cliqué sur le seul actif → reset tout (afficher tout)
          if (MUTED_SCHEMAS.size === schemas.length - 1 && !MUTED_SCHEMAS.has(schema)) {
            // On clique sur le seul visible → reset
            MUTED_SCHEMAS.clear();
          } else if (MUTED_SCHEMAS.has(schema)) {
            // Réactiver ce schéma
            MUTED_SCHEMAS.delete(schema);
          } else {

          }
          // Sync état visuel de toutes les entrées
          sec.querySelectorAll('.lgd-entry.toggleable').forEach(e2 => {
            const s2 = e2.dataset.schema;
            if (!s2) return;
            const isMuted = MUTED_SCHEMAS.size > 0 && !MUTED_SCHEMAS.has(s2);
            e2.classList.toggle('lgd-muted', isMuted);

          // Sync boutons info-bar (buildSchemaFilters)
          document.querySelectorAll('#inf-schema-btns button[data-schema]').forEach(btn => {
            const s2 = btn.dataset.schema;
            btn.classList.toggle('muted', MUTED_SCHEMAS.size > 0 && !MUTED_SCHEMAS.has(s2));
          });

  // ── Section : éléments visuels (boutons-bascule) ──
  {
    const sec = document.createElement('div');
    sec.className = 'lgd-section';

    // Chaque item : { flag, icon, label, color }
    const VITEMS = [

      { flag: 'hatching',   icon: '⫠', label: 'Hachures DDC/forclusion', color: 'var(--red)' },

      { flag: 'connectors', icon: '◈', label: 'Connexions SVG',        color: 'var(--dust2)' },
      { flag: 'dotConns',   icon: '⌒', label: 'Liaisons dot-à-dot',   color: 'var(--dust2)' },
      { flag: 'personCdp',  icon: '—', label: 'Lignes CDP personnes',  color: 'var(--teal)' },
      { flag: 'heatmap',    icon: '⊡', label: 'Densité événements',    color: 'var(--dust2)' },

    for (const vit of VITEMS) {

        entry.classList.toggle('lgd-muted', !VISUAL_FLAGS[vit.flag]);
        applyVisuals();
      });

      sec.appendChild(entry);
    }
    panel.appendChild(sec);
  }

/* ── Label de bande company fixe à l'écran ──────────────────
   Maintient chaque co-band-label visible dans la fenêtre courante
   en décalant son top d'un offset égal à combien la bande a été
   défilée hors du haut du viewport.
   Le z-index de la bande n'est pas modifié (label reste en arrière-plan).
─────────────────────────────────────────────────────────── */
function syncBandLabels() {
  const st = canvasEl.scrollTop;
  // Hauteur du canvas visible (viewport height) moins le header sticky
  const hd = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--hd-h') || '40', 10);
  for (const band of document.querySelectorAll('.co-band')) {
    const label = band.querySelector('.co-band-label');
    if (!label) continue;
    const bandTop    = parseFloat(band.style.top)   || 0;
    const bandHeight = parseFloat(band.style.height) || 0;
    // Combien de pixels du haut de la bande sont au-dessus du viewport courant
    const hidden = Math.max(0, st + hd - bandTop);
    // Clamper : le label ne peut pas descendre sous le bas de la bande
    // (on garde une marge de 20px pour que le texte reste lisible)
    const maxOffset = Math.max(0, bandHeight - 20);
    const offset    = Math.min(hidden, maxOffset);
    band.style.setProperty('--label-offset', offset + 'px');
  }
}

canvasEl.addEventListener('scroll', () => {
  // Sync vertical (hors garde : pas de risque de boucle)
  syncYearSpine();
  syncBandLabels(); // maintien des labels de bandes visibles à l'écran
  // Sync horizontal miroir
  if (_scrollSyncing) return;
  _scrollSyncing = true;
  scrollTrack.scrollLeft = canvasEl.scrollLeft;
  _scrollSyncing = false;
});

// ── Zoom Ctrl+molette ──────────────────────────────────────
let _zoomWheelTimer = null;
canvasEl.addEventListener('wheel', (e) => {
  if (!e.ctrlKey) return;
  e.preventDefault();

  const oldZoom = ZOOM;
  const idx = ZOOM_STEPS.findIndex(z => Math.abs(z - ZOOM) < 0.001);
  const cur = idx === -1 ? ZOOM_STEPS.indexOf(1.0) : idx;
  const delta = e.deltaY > 0 ? -1 : 1;
  const nxt = Math.max(0, Math.min(ZOOM_STEPS.length - 1, cur + delta));
  const newZoom = ZOOM_STEPS[nxt];
  if (newZoom === ZOOM) return;

  // Conserver le point de contenu sous le curseur après rebuild
  const rect = canvasEl.getBoundingClientRect();
  const mouseY = e.clientY - rect.top;
  const oldScrollTop  = canvasEl.scrollTop;
  const oldScrollLeft = canvasEl.scrollLeft;
  const scaleRatio = newZoom / oldZoom;

  ZOOM = newZoom;
  updateZoomLabel();

  // Rebuild différé pour éviter trop de reconstructions rapides
  clearTimeout(_zoomWheelTimer);
  _zoomWheelTimer = setTimeout(() => {
    rebuildCanvas();
    // Repositionner pour garder le point de contenu sous la souris
    canvasEl.scrollTop  = (mouseY + oldScrollTop)  * scaleRatio - mouseY;
    canvasEl.scrollLeft = (oldScrollLeft) * scaleRatio;
  }, 80);
}, { passive: false });

// ── Pinch-to-zoom tactile ──────────────────────────────────
let _pinchDist0 = null; // distance inter-doigts au début du pinch
let _pinchZoom0 = null; // ZOOM au début du pinch
let _pinchScrollTop0 = null;
let _pinchScrollLeft0 = null;
let _pinchMidY0 = null;

function _touchDist(t) {
  const dx = t[0].clientX - t[1].clientX;
  const dy = t[0].clientY - t[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

canvasEl.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    _pinchDist0    = _touchDist(e.touches);
    _pinchZoom0    = ZOOM;
    _pinchScrollTop0  = canvasEl.scrollTop;
    _pinchScrollLeft0 = canvasEl.scrollLeft;
    const rect = canvasEl.getBoundingClientRect();
    _pinchMidY0 = ((e.touches[0].clientY + e.touches[1].clientY) / 2) - rect.top;
  }
}, { passive: true });

canvasEl.addEventListener('touchmove', (e) => {
  if (e.touches.length !== 2 || _pinchDist0 === null) return;
  e.preventDefault();
  const dist = _touchDist(e.touches);
  const ratio = dist / _pinchDist0;
  // Trouver le ZOOM_STEP le plus proche du ZOOM cible
  const targetZ = Math.max(ZOOM_STEPS[0], Math.min(ZOOM_STEPS[ZOOM_STEPS.length - 1], _pinchZoom0 * ratio));
  const closest = ZOOM_STEPS.reduce((a, b) => Math.abs(b - targetZ) < Math.abs(a - targetZ) ? b : a);
  if (Math.abs(closest - ZOOM) < 0.001) return;
  const oldZoom = ZOOM;
  ZOOM = closest;
  updateZoomLabel();
  clearTimeout(_zoomWheelTimer);
  _zoomWheelTimer = setTimeout(() => {
    const scaleRatio = ZOOM / oldZoom;
    rebuildCanvas();
    canvasEl.scrollTop  = (_pinchMidY0 + _pinchScrollTop0)  * scaleRatio - _pinchMidY0;
    canvasEl.scrollLeft = _pinchScrollLeft0 * scaleRatio;
  }, 80);
}, { passive: false });

canvasEl.addEventListener('touchend', () => {
  if (_pinchDist0 !== null) { _pinchDist0 = null; _pinchZoom0 = null; }
}, { passive: true });
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('inf-zoom-in')?.addEventListener('click',  () => stepZoom(+1));
  document.getElementById('inf-zoom-out')?.addEventListener('click', () => stepZoom(-1));

  // Toggle panneau légende
  document.getElementById('hd-legend-btn')?.addEventListener('click', function() {
    const panel = document.getElementById('legend-panel');
    if (!panel) return;
    panel.classList.toggle('open');
    this.classList.toggle('active', panel.classList.contains('open'));
  });
});

// ── Rebuild complet du canvas (bandes + événements + connecteurs + heatmap) ──
// Appelé après tout changement de SCALE_T, ZOOM ou au resize.
function rebuildCanvas() {
  CANVAS_FIXED_H = Math.round(CANVAS_FIXED_H_BASE * ZOOM);
  computeAxisPositions();
  const canvas = document.getElementById('canvas');
  canvas.innerHTML =
    '<canvas id="density-heatmap"></canvas>' +
    '<svg id="connector-svg" xmlns="http://www.w3.org/2000/svg"></svg>';
  canvas.style.width  = CANVAS_WIDTH + 'px';
  buildYearSpine();               // recalibre SCALE_D et CANVAS_HEIGHT
  // Spacer pour rendre le canvas scrollable sans écraser height:100% du flex
  let spacer = document.getElementById('canvas-spacer');
  if (!spacer) {
    spacer = document.createElement('div');
    spacer.id = 'canvas-spacer';
    spacer.style.cssText = 'position:relative;pointer-events:none;flex-shrink:0;';
    canvas.appendChild(spacer);
  }
  spacer.style.height = CANVAS_HEIGHT + 'px';
  buildAxisRails(canvas);         // bandes sociétés (resolveLayoutY ici)
  buildProcedureHatching(canvas); // hachures DDC / forclusion / appel
  buildHeaderAxes();
  buildEvents_DOM(canvas);
  buildSchemaFilters();
  const svg = document.getElementById('connector-svg');
  svg.style.width  = CANVAS_WIDTH  + 'px';
  svg.style.height = CANVAS_HEIGHT + 'px';
  buildConnectors(svg);
  buildPersonCdpLines(svg); // lignes CDP par personne
  buildDotConnectors(svg);
  buildDensityHeatmap();
  buildLegendPanel();
  applyVisuals();   // appliquer les flags visuels après chaque rebuild
  syncScrollTrackWidth();
}

// Handle resize
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(rebuildCanvas, 200);
});

main().then(() => {
  syncScrollTrackWidth();

  // ── Calcul T optimal après chargement des données ──
  if (EVENTS.length) {
    const eventDays = EVENTS.map(ev => {
      const d = parseDate(eventDate(ev));
      return d ? Math.max(0, daysSinceEpoch(d)) : 0;
    }).filter(t => t >= 0);

    const { bestT, bestEnt, curve } = findOptimalT(eventDays, SCALE_D, CANVAS_FIXED_H);
    SCALE_T_OPT = bestT;
    SCALE_T     = bestT;

    // Reconstruire entièrement avec le T optimal
    // (main() a rendu avec SCALE_T=1500 ; les positions Y sont fausses)
    rebuildCanvas();

    // Positionner le slider sur T optimal
    const slider = document.getElementById('inf-scale-slider');
    if (slider) {
      const logMin = Math.log(SCALE_T_MIN), logMax = Math.log(SCALE_T_MAX);
      const pos = Math.round(((Math.log(bestT) - logMin) / (logMax - logMin)) * 100);
      slider.value = pos;

      slider.addEventListener('input', () => {
        const frac = parseInt(slider.value) / 100;
        SCALE_T = Math.round(Math.exp(logMin + frac * (logMax - logMin)));
        clearTimeout(slider._timer);
        slider._timer = setTimeout(() => {
          rebuildCanvas();
          updateScaleUI(curve, SCALE_T_OPT, SCALE_T, bestEnt);
        }, 150);
        updateScaleUI(curve, SCALE_T_OPT, SCALE_T, bestEnt);
      });
    }

    updateScaleUI(curve, SCALE_T_OPT, SCALE_T, bestEnt);
  }

  // Légende et zoom initial
  buildLegendPanel();
  updateZoomLabel();
}).catch(console.error);
