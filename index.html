<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affaire DeSavoie / Chicherit — Frise</title>
<style>
/* Polices système uniquement — aucune requête externe */

/* ═══════════════════════════════════════════
   TOKENS & RESET
═══════════════════════════════════════════ */
:root {
  --ink:        #0a0b0d;
  --ink2:       #1a1c22;
  --ink3:       #252830;
  --smoke:      #f2f1ee;
  --smoke2:     #e8e6e2;
  --smoke3:     #d4d1cb;
  --dust:       #9a9590;
  --dust2:      #6b6762;
  --wire:       #d0cdc8;
  --wire2:      #e6e4e0;

  --red:        #b83232;
  --amber:      #c8821a;
  --gold:       #b89a20;
  --green:      #2a7a4e;
  --violet:     #6b3fa0;
  --teal:       #1f7a78;

  --font-display: Georgia, 'Times New Roman', serif;
  --font-mono:    ui-monospace, 'Cascadia Code', 'Consolas', 'Menlo', monospace;
  --font-ui:      system-ui, -apple-system, 'Segoe UI', sans-serif;

  --rail-w: 2px;
  --dot-r:  7px;
  --card-w: 220px;
  --year-w: 56px;
  --pad-v:  18px;

  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--smoke);
  color: var(--ink);
  font-family: var(--font-ui);
  font-size: 13px;
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ═══════════════════════════════════════════
   GRAIN OVERLAY (atmosphere)
═══════════════════════════════════════════ */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1000;
  opacity: 0.6;
}

/* ═══════════════════════════════════════════
   HEADER
═══════════════════════════════════════════ */
#app-header {
  position: sticky;
  top: 0;
  z-index: 200;
  background: var(--ink2);
  border-bottom: 1px solid var(--ink3);
  display: flex;
  align-items: stretch;
  gap: 0;
  height: 56px;
}

.hd-brand {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0 24px;
  border-right: 1px solid var(--ink3);
  flex-shrink: 0;
}

.hd-brand .sigil {
  width: 28px;
  height: 28px;
  border: 1.5px solid var(--red);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.hd-brand .sigil span {
  font-family: var(--font-display);
  font-size: 14px;
  color: var(--red);
  font-weight: 600;
  line-height: 1;
}

.hd-titles { display: flex; flex-direction: column; justify-content: center; }
.hd-title {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 600;
  color: #e8e5e0;
  letter-spacing: 0.01em;
  line-height: 1.2;
}
.hd-sub {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--dust);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 1px;
}
@media (max-width: 768px) {
  .hd-sub           { display: none; }
  .hd-axis-sub      { display: none; }
  .hd-axis-pill     { padding: 0 10px; gap: 5px; }
  .hd-axis-label    { font-size: 10px; }
  .hd-brand         { padding: 0 14px; gap: 10px; }
  .hd-meta          { padding: 0 10px; }
}
@media (max-width: 480px) {
  .hd-title         { font-size: 13px; }
  .hd-axes          { overflow-x: auto; scrollbar-width: none; }
  .hd-axes::-webkit-scrollbar { display: none; }
}

.hd-axes {
  display: flex;
  align-items: center;
  gap: 0;
  flex: 1;
  overflow: hidden;
}

.hd-axis-pill {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 0 18px;
  height: 100%;
  border-right: 1px solid var(--ink3);
  cursor: pointer;
  transition: background 0.15s;
  user-select: none;
}
.hd-axis-pill:hover { background: rgba(255,255,255,0.04); }
.hd-axis-pill.muted { opacity: 0.35; }

.hd-axis-pip {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.hd-axis-label {
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 500;
  color: #c8c4be;
  white-space: nowrap;
}
.hd-axis-sub {
  font-family: var(--font-mono);
  font-size: 8.5px;
  color: var(--dust);
  white-space: nowrap;
}

.hd-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 18px;
  margin-left: auto;
  flex-shrink: 0;
}
.hd-badge {
  font-family: var(--font-mono);
  font-size: 8.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--red);
  border: 1px solid rgba(184,50,50,0.4);
  padding: 3px 7px;
  border-radius: 2px;
}

/* ═══════════════════════════════════════════
   LAYOUT: STAGE + YEAR SPINE
═══════════════════════════════════════════ */
#stage {
  position: relative;
  display: flex;
  width: 100%;
  height: calc(100vh - 56px - 10px - 28px); /* header + scroll-track + info-bar */
  overflow: hidden;
}

/* ── Year spine ── */
#year-spine {
  position: relative;
  z-index: 100;
  width: var(--year-w);
  flex-shrink: 0;
  background: var(--smoke);
  border-right: var(--rail-w) solid var(--wire);
  overflow: hidden;   /* clip le wrapper interne lors du translateY */
}
/* Wrapper interne : reçoit translateY(-scrollTop) pour synchroniser
   les millésimes avec le contenu du canvas */
#year-spine-inner {
  will-change: transform;
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
}

.yr-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding-top: var(--pad-v);
  border-bottom: 1px solid var(--wire2);
}

.yr-label {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 300;
  color: var(--dust2);
  writing-mode: vertical-rl;
  text-orientation: mixed;
  transform: rotate(180deg);
  letter-spacing: 0.12em;
  opacity: 0.7;
  user-select: none;
  flex: 1;
  padding-bottom: 12px;
}

/* ── Canvas: the scrollable timeline ── */
#canvas {
  flex: 1;
  position: relative;
  overflow-x: auto;
  overflow-y: auto;
  height: 100%;         /* occupe toute la hauteur de #stage */
  touch-action: pan-x pan-y;
  -webkit-overflow-scrolling: touch;
}

/* SVG connector overlay */
#connector-svg {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 2;
  width: 100%;
  height: 100%;
  overflow: visible;
}

/* ═══════════════════════════════════════════
   AXIS RAILS (continuous horizontal positions)
═══════════════════════════════════════════ */
.axis-rail { display: none; }

/* ── Bandes de sociétés ── */
.co-band {
  position: absolute;
  border-radius: 3px 3px 0 0;
  box-sizing: border-box;
  border: 1.5px solid rgba(0,0,0,0.18);
  border-top-width: 3px;
  overflow: visible;
  z-index: 8;
  transition: opacity 0.15s, box-shadow 0.15s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.10);
}
.co-band:hover {
  box-shadow: 0 2px 8px rgba(0,0,0,0.16);
}
.co-band.no-start-date {
  border-top-style: dashed;   /* date d'incorporation inconnue ou hors frise */
  opacity: 0.82;
}
.co-band:hover { z-index: 20; }

/* ── Surlignage bénéficiaires effectifs (UBO) ── */
.co-band.ubo-lit {
  outline: 2px solid rgba(255, 195, 40, 0.90);
  outline-offset: 1px;
  z-index: 22 !important;
}
/* Overlay coloré d'intensité proportionnelle à la part détenue */
.co-band.ubo-lit::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255, 195, 40, var(--ubo-alpha, 0.18));
  pointer-events: none;
  z-index: 1;
  border-radius: inherit;
}
.co-band.ubo-dim {
  opacity: 0.22;
  transition: opacity 0.12s;
}
/* Badge affichant le % UBO en haut de la bande */
.ubo-pct-badge {
  position: absolute;
  top: -19px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(32, 24, 4, 0.91);
  color: #ffe082;
  font-family: var(--font-mono);
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.04em;
  padding: 2px 5px;
  border-radius: 3px;
  white-space: nowrap;
  pointer-events: none;
  z-index: 120;
  line-height: 1.3;
  border: 1px solid rgba(255,195,40,0.45);
}

.co-band-label {
  position: sticky;
  top: 70px;
  font-family: var(--font-mono);
  font-size: 7.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding: 3px 4px 0;
  opacity: 0.75;
  cursor: default;
  user-select: none;
  z-index: 5;
}

/* ── Traits de mandats ── */
.mandate-line {
  position: absolute;
  width: 2px;
  border-radius: 1px;
  opacity: 0.75;
  pointer-events: none;
  z-index: 4;
}

/* ── Zone d'axe narratif (fond) ── */
.axis-zone {
  position: absolute;
  top: 0;
  bottom: 0;
  opacity: 0.025;
  pointer-events: none;
  z-index: 0;
}
._axis-rail-hidden {
  position: absolute;
  top: 0;
  bottom: 0;
  width: var(--rail-w);
  transform: translateX(-50%);
  pointer-events: none;
  z-index: 1;
}

.axis-rail-line {
  position: absolute;
  inset: 0;
  opacity: 0.18;
}

/* ─ axis column header label ─ */
.axis-col-header {
  position: sticky;
  top: 56px;
  z-index: 50;
  pointer-events: none;
}

/* ═══════════════════════════════════════════
   EVENT CARDS
═══════════════════════════════════════════ */
.ev-anchor {
  position: absolute;
  /* Pas de translateX : l'anchor est ancré à son bord gauche = bord droit de la bande */
  z-index: 10;
}
.ev-anchor:hover,
.ev-anchor.hovered {
  z-index: 900 !important;
}

.ev-dot {
  width: calc(var(--dot-r)*2);
  height: calc(var(--dot-r)*2);
  border-radius: 50%;
  border: 2px solid var(--smoke);
  position: absolute;
  top: 0;
  left: 0;
  transform: translateX(-50%);  /* centre le dot sur le bord gauche de l'anchor */
  cursor: pointer;
  transition: transform 0.2s var(--ease-out), box-shadow 0.2s;
  z-index: 3;
}
.ev-dot:hover {
  transform: translateX(-50%) scale(1.45);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.35);
}
.ev-dot.alert-dot {
  animation: pulse-alert 2.8s ease-in-out infinite;
}
@keyframes pulse-alert {
  0%, 100% { box-shadow: 0 0 0 0 rgba(184,50,50,0); }
  50%       { box-shadow: 0 0 0 6px rgba(184,50,50,0.25); }
}

/* Segment bar for events with duration */
.ev-segment {
  position: absolute;
  left: 0;
  transform: translateX(-50%);  /* centré sur le bord gauche de l'anchor */
  width: 3px;
  border-radius: 2px;
  opacity: 0.35;
  z-index: 2;
  pointer-events: none;
}

/* The floating card */
.ev-card {
  position: absolute;
  width: var(--card-w);
  top: calc(var(--dot-r) - 2px);
  background: #fff;
  border: 1px solid var(--wire);
  border-radius: 4px;
  padding: 10px 12px 9px;
  box-shadow: 0 2px 12px rgba(10,11,13,0.07), 0 1px 3px rgba(10,11,13,0.04);
  cursor: pointer;
  transition: box-shadow 0.2s, transform 0.2s var(--ease-out), opacity 0.15s;
  border-left: 3px solid transparent;
  z-index: 4;
  opacity: 0;
  animation: card-in 0.35s var(--ease-out) forwards;
}
@keyframes card-in {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.ev-card:hover {
  box-shadow: 0 6px 24px rgba(10,11,13,0.12), 0 2px 6px rgba(10,11,13,0.06);
  transform: translateY(-1px);
}
.ev-card.right { left: calc(var(--dot-r) + 10px); }

.ev-card-title {
  font-family: var(--font-display);
  font-size: 13.5px;
  font-weight: 600;
  line-height: 1.3;
  color: var(--ink);
  margin-bottom: 2px;
}
.ev-card-date {
  font-family: var(--font-mono);
  font-size: 8.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--dust);
  margin-bottom: 4px;
}
.ev-card-desc {
  font-size: 11px;
  color: var(--dust2);
  line-height: 1.55;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.ev-card-amount {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  display: block;
  margin-top: 5px;
}
.ev-card-schema {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--dust);
  margin-top: 5px;
  opacity: 0.7;
}
.ev-card-source {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 6px;
  font-family: var(--font-mono);
  font-size: 7.5px;
  color: var(--dust2);
  text-decoration: none;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  cursor: pointer;
  transition: color 0.15s;
}
.ev-card-source:hover { color: var(--ink); }
.ev-card-source-icon { flex-shrink: 0; opacity: 0.7; }
.ev-card-source-extra {
  font-size: 7px;
  opacity: 0.55;
  flex-shrink: 0;
  margin-left: 2px;
}

/* alert badge */
.ev-card.is-alert .ev-card-title::before {
  content: '⚠ ';
  color: var(--red);
  font-style: normal;
  font-family: var(--font-ui);
}

/* ── Carte compressée (empilement vertical) ── */
.ev-card.peeked {
  height: 40px;           /* titre + date visibles, corps masqué */
  overflow: hidden;
  transition: height 0.18s var(--ease-out), box-shadow 0.2s, transform 0.2s var(--ease-out), opacity 0.15s;
}
.ev-card.peeked .ev-card-desc,
.ev-card.peeked .ev-card-amount,
.ev-card.peeked .ev-card-schema {
  opacity: 0;
  pointer-events: none;
}
/* Au survol : expansion + premier plan */
.ev-card.peeked:hover {
  height: auto;
  overflow: visible;
  z-index: 999 !important;
}
.ev-card.peeked:hover .ev-card-desc,
.ev-card.peeked:hover .ev-card-amount,
.ev-card.peeked:hover .ev-card-schema {
  opacity: 1;
  pointer-events: auto;
}
/* Badge de profondeur d'empilement */
.ev-card.peeked::after {
  content: attr(data-stack-depth);
  position: absolute;
  bottom: 5px;
  right: 8px;
  font-family: var(--font-mono);
  font-size: 7.5px;
  color: var(--dust);
  opacity: 0.6;
}

/* muted state */
.ev-anchor.axis-hidden { opacity: 0; pointer-events: none; transition: opacity 0.2s; }

/* ═══════════════════════════════════════════
   CONNECTOR LINES (SVG)
═══════════════════════════════════════════ */
.connector-line {
  stroke-width: 1;
  stroke-dasharray: 4 3;
  fill: none;
  opacity: 0;
  transition: opacity 0.2s;
}
.connector-line.visible { opacity: 0.5; }

/* ═══════════════════════════════════════════
   MODAL
═══════════════════════════════════════════ */
#modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(10,11,13,0.45);
  z-index: 500;
  display: none;
  align-items: flex-start;
  justify-content: flex-end;
  backdrop-filter: blur(3px);
}
#modal-backdrop.open { display: flex; }

#modal-panel {
  width: 420px;
  max-width: 95vw;
  height: 100vh;
  background: #fff;
  border-left: 1px solid var(--wire);
  display: flex;
  flex-direction: column;
  animation: slide-in 0.28s var(--ease-out);
  overflow: hidden;
}
@keyframes slide-in {
  from { transform: translateX(40px); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}

#modal-header {
  padding: 20px 22px 16px;
  border-bottom: 1px solid var(--wire2);
  flex-shrink: 0;
}
.modal-axis-tag {
  font-family: var(--font-mono);
  font-size: 8.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #fff;
  padding: 2px 7px;
  border-radius: 2px;
  display: inline-block;
  margin-bottom: 8px;
}
.modal-schema-tag {
  font-family: var(--font-mono);
  font-size: 8.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--dust);
  margin-left: 6px;
}
#modal-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 600;
  line-height: 1.25;
  color: var(--ink);
  margin-bottom: 4px;
}
#modal-date {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--dust);
  letter-spacing: 0.06em;
}
.modal-close {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 30px; height: 30px;
  border: none;
  background: var(--smoke2);
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--dust2);
  transition: background 0.15s;
}
.modal-close:hover { background: var(--smoke3); }

#modal-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px 22px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
#modal-body::-webkit-scrollbar { width: 4px; }
#modal-body::-webkit-scrollbar-thumb { background: var(--wire); border-radius: 2px; }

.modal-section-label {
  font-family: var(--font-mono);
  font-size: 8.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--dust);
  margin-bottom: 6px;
}

.modal-description {
  font-size: 13px;
  line-height: 1.65;
  color: var(--ink2);
}

.modal-amount {
  font-family: var(--font-mono);
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.02em;
}

.modal-prop-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px 16px;
}
.modal-prop { display: flex; flex-direction: column; gap: 2px; }
.modal-prop-key {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--dust);
}
.modal-prop-val {
  font-size: 12px;
  color: var(--ink);
  word-break: break-word;
}

.modal-refs { display: flex; flex-direction: column; gap: 8px; }
.modal-ref-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  background: var(--smoke);
  border-radius: 3px;
  text-decoration: none;
  transition: background 0.12s;
}
.modal-ref-card:hover { background: var(--smoke2); }
.modal-ref-schema {
  font-family: var(--font-mono);
  font-size: 7.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #fff;
  padding: 2px 5px;
  border-radius: 2px;
  white-space: nowrap;
  flex-shrink: 0;
}
.modal-ref-name {
  font-size: 12px;
  color: var(--ink);
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.modal-source-link {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  background: var(--smoke);
  border-radius: 3px;
  text-decoration: none;
  transition: background 0.12s;
  border: 1px solid var(--wire2);
}
.modal-source-link:hover { background: var(--smoke2); }
.modal-source-icon { font-size: 12px; flex-shrink: 0; }
.modal-source-text { display: flex; flex-direction: column; min-width: 0; }
.modal-source-label { font-size: 11px; font-weight: 500; color: var(--ink); }
.modal-source-url {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--dust);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ═══════════════════════════════════════════

<script>
'use strict';
/* ═══════════════════════════════════════════════════════════
   BUILD
═══════════════════════════════════════════════════════════ */
const BUILD_ID = '2026-03-06 10:02';  // horodatage injecté à la génération

/* ═══════════════════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════════════════ */
// PX_PER_DAY supprimé — échelle exponentielle dynamique
let EPOCH_START    = new Date('1929-01-01');  // recalibré dynamiquement dans buildYearSpine
const CANVAS_PAD_TOP    = 48;
const CANVAS_PAD_BOTTOM = 80;
const CANVAS_MIN_WIDTH  = 900;
const CANVAS_FIXED_H    = 6200;  // hauteur fixe : l'échelle s'adapte, pas la hauteur

// ── Mise en page des bandes de sociétés ──
const BAND_W      = 16;   // largeur d'une lane de société (px)
const BAND_GAP    =  6;   // espace entre axes (inter-axe)
const AXIS_GAP    = 30;   // espace supplémentaire entre axes narratifs distincts
const CARD_OFFSET = 10;   // espace entre bord droit de la bande société et le dot
const AXIS_LEFT   = 32;   // marge gauche du canvas
const CARD_EST_H  = 90;   // hauteur estimée d'une carte complète (px, premier passage)
const PEEK_H      = 40;   // hauteur minimale visible d'une carte compressée
const PEEK_GAP    = 4;    // écart supplémentaire entre cartes compressées

// Couleur de fond par statut
const STATUS_BG = {
  active:    '#e8f0e8',   // vert pâle : société active
  dormant:   '#e8e8e8',   // gris clair : dormante
  dissolved: '#deded8',   // gris-beige : dissoute
  insolvent: '#fff3cc',   // jaune paille : cessation de paiements / insolvable
  rj:        '#ffd9a8',   // orange pâle : redressement judiciaire
  lj:        '#f5c0c0',   // rouge pâle : liquidation judiciaire
  default:   '#efefec',   // gris neutre
};

// Palette de couleurs pour les dirigeants (jusqu'à 12)
const PERSON_COLORS = [
  '#e8c874','#74b8e8','#e87474','#74e8b4','#c874e8',
  '#e8a474','#74e8e8','#a4e874','#e874c8','#b4b4e8',
  '#e8e874','#74c8e8',
];
let _personColorMap = {};
let _personColorIdx = 0;
function personColor(personId) {
  if (!_personColorMap[personId]) {
    _personColorMap[personId] = PERSON_COLORS[_personColorIdx % PERSON_COLORS.length];
    _personColorIdx++;
  }
  return _personColorMap[personId];
}

// ── Paramètre de tension T (en jours) ──────────────────────
// Fonction : y = PAD_TOP + (H_usable) * (exp(t/T) - 1) / (exp(D/T) - 1)
// Petit T → forte dilatation du passé récent ; T→∞ → linéaire
let SCALE_T       = 1500;   // valeur initiale (jours)
let SCALE_T_OPT   = 1500;   // T optimal calculé après chargement
let SCALE_D       = 1;      // durée totale en jours (calculée après chargement)
const SCALE_T_MIN = 60;
const SCALE_T_MAX = 30000;

function expScale(tDays) {
  // Normalise [0, SCALE_D] → [0, 1] selon courbe exponentielle
  // Petit T : les derniers jours occupent une grande fraction
  if (SCALE_T > SCALE_D * 50) return tDays / SCALE_D; // quasi-linéaire
  const num = Math.exp(tDays / SCALE_T) - 1;
  const den = Math.exp(SCALE_D / SCALE_T) - 1;
  return num / den;
}

// FtM schemas that carry event semantics (have a date → rendered on timeline)
const EVENT_SCHEMAS = new Set(['Event','Payment','Directorship','Ownership','Document','CourtCase']);
// schemas rendered as context nodes (resolved in modal, not on timeline)
const CONTEXT_SCHEMAS = new Set(['Person','Company','LegalEntity']);

/* ═══════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════ */
let MANIFEST = null;
let ENTITIES  = {};        // id → entity (deduplicated, merged)
let EVENTS    = [];        // event-bearing entities, sorted by date
let AXIS_MAP  = {};        // axisId → axis config
let MUTED_AXES = new Set();
let SHOW_CONNECTORS = false;
let CANVAS_WIDTH = 0;
let CANVAS_HEIGHT = 0;
let _uboIndex = null; // { byCompany: Map<coId,[{uboId,pct,estimated}]>, byUbo: Map<uboId,[{coId,pct,estimated}]> }

/* ═══════════════════════════════════════════════════════════
   DATE UTILITIES
═══════════════════════════════════════════════════════════ */
function parseDate(s) {
  if (!s) return null;
  // Supprimer les préfixes de borne (< ou >) issus des dates partielles reconstituées
  s = s.trim().replace(/^[<>]/, '');
  const p = s.split('-');
  const y = parseInt(p[0]);
  const m = p[1] ? parseInt(p[1]) - 1 : 0;
  const d = p[2] ? parseInt(p[2]) : 1;
  if (isNaN(y)) return null;
  return new Date(y, m, d);
}

function daysSinceEpoch(date) {
  if (!date) return 0;
  return (date - EPOCH_START) / 86400000;
}

function dateY(dateStr) {
  const d = parseDate(dateStr);
  if (!d) return CANVAS_PAD_TOP;
  const t = daysSinceEpoch(d);
  const usable = CANVAS_FIXED_H - CANVAS_PAD_TOP - CANVAS_PAD_BOTTOM;
  return Math.round(CANVAS_PAD_TOP + expScale(t) * usable);
}

function formatDate(s) {
  if (!s) return '';
  const MONTHS = ['jan.','févr.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];
  const p = s.trim().split('-');
  const y = p[0];
  const m = p[1] ? MONTHS[parseInt(p[1])-1] : null;
  const d = p[2] ? parseInt(p[2]) : null;
  if (d && m) return `${d} ${m} ${y}`;
  if (m) return `${m} ${y}`;
  return y;
}

function formatAmount(raw, currency) {
  if (!raw) return null;
  const n = parseFloat(raw);
  if (isNaN(n)) return null;
  const abs = Math.abs(n);
  let val;
  if (abs >= 1e9) val = (n/1e9).toFixed(1).replace(/\.0$/,'') + ' Md';
  else if (abs >= 1e6) val = (n/1e6).toFixed(0) + ' M';
  else if (abs >= 1e3) val = (n/1e3).toFixed(0) + ' K';
  else val = n.toFixed(0);
  const sym = currency === 'USD' ? '$' : currency === 'EUR' ? '€' : (currency || '');
  return `${val} ${sym}`.trim();
}

/* ═══════════════════════════════════════════════════════════
   FtM PROPERTY HELPERS
═══════════════════════════════════════════════════════════ */
const p1 = (e, k) => (e.properties?.[k] || [])[0] || null;
const pAll = (e, k) => e.properties?.[k] || [];

function eventDate(e) {
  return p1(e,'date') || p1(e,'startDate') || p1(e,'incorporationDate') || null;
}
function eventEndDate(e) {
  return p1(e,'endDate') || p1(e,'dissolutionDate') || null;
}
function eventName(e) {
  return p1(e,'name') || p1(e,'fileName') || p1(e,'eventLabel') || e.schema;
}
function eventDesc(e) {
  return p1(e,'description') || p1(e,'text') || null;
}
function entityAxis(e) {
  return p1(e,'axis') || null;
}
function isAlert(e) {
  const a = p1(e,'alert');
  return a === 'true' || a === true;
}

/* ═══════════════════════════════════════════════════════════
   DEDUPLICATION / MERGE
═══════════════════════════════════════════════════════════ */
function mergeEntity(existing, incoming) {
  if (!existing) return incoming;
  const merged = { ...existing };
  merged.properties = { ...existing.properties };
  for (const [k, vals] of Object.entries(incoming.properties || {})) {
    const cur = merged.properties[k] || [];
    merged.properties[k] = [...new Set([...cur, ...vals])];
  }
  return merged;
}

function ingestLine(line, fileAxisId) {
  line = line.trim();
  if (!line || line.startsWith('//')) return;
  let ent;
  try { ent = JSON.parse(line); } catch { return; }
  if (!ent.id || !ent.schema) return;

  // If entity has no axis and file has a default axis, assign it
  if (!entityAxis(ent) && fileAxisId) {
    ent = { ...ent, properties: { ...ent.properties, axis: [fileAxisId] } };
  }

  ENTITIES[ent.id] = mergeEntity(ENTITIES[ent.id], ent);
}

/* ═══════════════════════════════════════════════════════════
   AXIS POSITION (continuous, 0–1 → pixels)
═══════════════════════════════════════════════════════════ */
function axisX(axisId) {
  const ax = AXIS_MAP[axisId];
  if (!ax) return CANVAS_WIDTH * 0.5;
  return ax._xPx;
}

// _companyLayout : id → { xPx, wPx, lane, axisId }
let _companyLayout = {};

// Passe 1 : géométrie horizontale pure (sans dateY, sans SCALE_D)
// Stocke pour chaque société : lane, axisId, dateStrings
// Les yStart/yEnd sont calculés dans buildAxisRails (après buildYearSpine).
function computeLayout() {
  CANVAS_WIDTH = Math.max(CANVAS_MIN_WIDTH, window.innerWidth - 56);
  _personColorMap = {};
  _personColorIdx = 0;
  _companyLayout  = {};

  // 1. Grouper les sociétés par axe narratif
  const axisCompanies = {};
  for (const ax of Object.values(AXIS_MAP)) axisCompanies[ax.id] = [];

  for (const ent of Object.values(ENTITIES)) {
    if (ent.schema !== 'Company') continue;
    const axId = p1(ent, 'axis') || Object.keys(AXIS_MAP)[0];
    if (!axisCompanies[axId]) axisCompanies[axId] = [];
    axisCompanies[axId].push(ent);
  }

  // 2. Lane-packing horizontal par axe.
  //    Chaque société obtient une lane propre si elle chevauche temporellement
  //    une autre société déjà dans la même lane (comparaison ISO string).
  //    ax._xStart   : bord gauche de la zone de bandes pour cet axe
  //    ax._xPx      : centre de l'axe (milieu de la zone bandes) — ancrage des cartes sans société
  //    ax._wPx      : largeur totale de la zone de bandes
  let cursor = AXIS_LEFT;
  const axIds = Object.keys(AXIS_MAP);
  for (let ai = 0; ai < axIds.length; ai++) {
    const ax  = AXIS_MAP[axIds[ai]];
    const cos = axisCompanies[ax.id] || [];
    ax._xStart = cursor;

    cos.sort((a, b) => {
      const da = p1(a, 'incorporationDate') || '0000';
      const db = p1(b, 'incorporationDate') || '0000';
      return da < db ? -1 : da > db ? 1 : 0;
    });

    // laneEndStr[lane] = date ISO de fin de la dernière société dans cette lane
    const laneEndStr = [];
    for (const co of cos) {
      const incStr = p1(co, 'incorporationDate') || '';
      const disStr = p1(co, 'dissolutionDate')   || '';

      // Chercher une lane libre : fin < début de la société courante
      let lane = laneEndStr.findIndex(e => !e || e <= (incStr || '0000'));
      if (lane === -1) { lane = laneEndStr.length; }
      laneEndStr[lane] = disStr || '9999-12-31';

      _companyLayout[co.id] = {
        xPx:    cursor + lane * BAND_W + Math.floor(lane > 0 ? BAND_GAP * 0 : 0),
        wPx:    BAND_W,
        lane,
        axisId: ax.id,
        incStr,
        disStr,
        yStart: 0,
        yEnd:   0,
      };
    }

    const nLanes = Math.max(1, laneEndStr.length);
    ax._xPx  = cursor + Math.floor(nLanes * BAND_W / 2);
    ax._wPx  = nLanes * BAND_W;
    // Espace entre axes : BAND_GAP entre lanes, AXIS_GAP entre axes distincts
    cursor  += nLanes * BAND_W + (ai < axIds.length - 1 ? AXIS_GAP : BAND_GAP);
  }

  // Recalculer CANVAS_WIDTH pour englober toutes les bandes + une carte à droite
  const CARD_SPACE = 220 + 32; // --card-w + marge
  CANVAS_WIDTH = Math.max(CANVAS_MIN_WIDTH, cursor + CARD_SPACE);
}

// Passe 2 : calcul des coordonnées verticales (après buildYearSpine → SCALE_D OK)
function resolveLayoutY() {
  // ── Index : coId → date ISO du premier événement qui référence cette société ──
  // Utilisé comme fallback pour les sociétés sans incorporationDate.
  const firstRefDate = {};  // coId → ISO string
  for (const ev of EVENTS) {
    const d = eventDate(ev);
    if (!d) continue;
    const refs = pAll(ev, 'ftmRef').concat(pAll(ev, 'organization'));
    for (const ref of refs) {
      if (!firstRefDate[ref] || d < firstRefDate[ref]) firstRefDate[ref] = d;
    }
  }

  for (const [coId, layout] of Object.entries(_companyLayout)) {
    const inc = layout.incStr;

    // Deux cas pour yStart :
    // A) Date connue (quelle que soit l'ancienneté) → position exacte sur l'échelle exp.
    // B) Pas de date → fallback sur premier événement référençant ; sinon sommet, marqué.
    let yStart;
    let noStartDate = false;

    if (inc) {
      yStart = dateY(inc);
    } else {
      const fallback = firstRefDate[coId];
      if (fallback) {
        yStart = dateY(fallback);
      } else {
        // Aucune date connue et aucun événement référent : placer en bas de frise
        // (zone contemporaine) plutôt qu'au sommet (~1929) pour éviter l'accumulation.
        yStart = CANVAS_HEIGHT - CANVAS_PAD_BOTTOM - 80;
      }
      noStartDate = true;
    }

    layout.yStart      = yStart;
    layout.noStartDate = noStartDate;
    layout.yEnd        = layout.disStr ? dateY(layout.disStr) : CANVAS_HEIGHT;

    // Hauteur minimale de 60px pour que la bande soit toujours visible
    if (layout.yEnd - layout.yStart < 60) layout.yEnd = layout.yStart + 60;
  }
}

function computeAxisPositions() { computeLayout(); }

/* ═══════════════════════════════════════════════════════════
   DYNAMIC AXIS ASSIGNMENT (for events without explicit axis)
═══════════════════════════════════════════════════════════ */
function assignDynamicAxis(ev) {
  const existing = entityAxis(ev);
  if (existing && AXIS_MAP[existing]) return existing;

  const refs = pAll(ev,'ftmRef');
  if (!refs.length) return Object.keys(AXIS_MAP)[0] || null;

  // Count how many ftmRef entities belong to each axis
  const scores = {};
  for (const id of refs) {
    const ref = ENTITIES[id];
    if (!ref) continue;
    const ax = entityAxis(ref);
    if (ax && AXIS_MAP[ax]) scores[ax] = (scores[ax]||0) + 1;
  }

  if (!Object.keys(scores).length) {
    // Fallback: check anchor_entities
    for (const [axId, ax] of Object.entries(AXIS_MAP)) {
      if ((ax.anchor_entities||[]).some(a => refs.includes(a))) {
        scores[axId] = (scores[axId]||0) + 2;
      }
    }
  }

  if (!Object.keys(scores).length) return null;
  return Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
}

/* ═══════════════════════════════════════════════════════════
   BUILD EVENTS LIST
═══════════════════════════════════════════════════════════ */
function buildEvents() {
  EVENTS = [];
  for (const ent of Object.values(ENTITIES)) {
    if (!EVENT_SCHEMAS.has(ent.schema)) continue;
    const date = eventDate(ent);
    if (!date) continue;
    const axis = assignDynamicAxis(ent) || assignFallbackAxis(ent);
    if (!axis) continue;
    ent._resolvedAxis = axis;
    EVENTS.push(ent);
  }
  EVENTS.sort((a,b) => {
    const da = parseDate(eventDate(a));
    const db = parseDate(eventDate(b));
    return (da||0) - (db||0);
  });
}

function assignFallbackAxis(ev) {
  // Last resort: use file default stored on entity
  return entityAxis(ev) || Object.keys(AXIS_MAP)[0] || null;
}

/* ═══════════════════════════════════════════════════════════
   YEAR SPINE
═══════════════════════════════════════════════════════════ */
function buildYearSpine() {
  const spine = document.getElementById('year-spine');
  if (!EVENTS.length) return;

  const firstDate = parseDate(eventDate(EVENTS[0]));
  const lastDate  = parseDate(eventDate(EVENTS[EVENTS.length-1]));
  const lastYear  = lastDate.getFullYear() + 1;

  // Remonter jusqu'à la date d'incorporation la plus ancienne
  let firstYear = firstDate.getFullYear();
  for (const ent of Object.values(ENTITIES)) {
    if (ent.schema !== 'Company') continue;
    const inc = p1(ent, 'incorporationDate');
    if (!inc) continue;
    const y = parseInt(inc.replace(/^[<>]/, '').slice(0, 4));
    if (!isNaN(y) && y < firstYear) firstYear = y;
  }

  // ── EPOCH_START dynamique ──
  {
    let minYear = firstDate.getFullYear();
    for (const ent of Object.values(ENTITIES)) {
      if (ent.schema !== 'Company') continue;
      const inc = p1(ent, 'incorporationDate');
      if (!inc) continue;
      const y = parseInt(inc.replace(/^[<>]/, '').slice(0, 4));
      if (!isNaN(y) && y < minYear) minYear = y;
    }
    EPOCH_START = new Date(`${minYear - 1}-01-01`);
  }

  // SCALE_D calibré sur la distance epoch → dernier événement
  SCALE_D       = Math.max(1, daysSinceEpoch(lastDate));
  CANVAS_HEIGHT = CANVAS_FIXED_H;

  // Recréer le wrapper interne (détruit les yr-blocks précédents)
  spine.innerHTML = '<div id="year-spine-inner"></div>';
  const inner = document.getElementById('year-spine-inner');

  // Pas adaptatif
  const MIN_LABEL_H = 14;
  const STEPS = [1, 2, 5, 10, 25, 50, 100];
  function snapStep(rawStep) {
    return STEPS.find(s => s >= rawStep) ?? STEPS[STEPS.length - 1];
  }

  for (let y = firstYear; y <= lastYear; y++) {
    const yY     = dateY(`${y}-01-01`);
    const yNext  = Math.min(CANVAS_FIXED_H, dateY(`${y+1}-01-01`));
    const height = Math.max(0, yNext - yY);

    const block = document.createElement('div');
    block.className = 'yr-block';
    block.style.height = height + 'px';
    block.setAttribute('data-year', y);

    const step  = snapStep(height > 0 ? MIN_LABEL_H / height : 100);
    if (y % step === 0) {
      const label = document.createElement('div');
      label.className = 'yr-label';
      label.textContent = y;
      block.appendChild(label);
    }
    inner.appendChild(block);
  }
}

/* ═══════════════════════════════════════════════════════════
   UBO INDEX — reconstitution des bénéficiaires effectifs
   (données non publiques depuis la réforme du RBE 31/07/2024)
═══════════════════════════════════════════════════════════ */
function buildUboIndex() {
  // 1. Construire les adjacences depuis les entités Ownership
  //    ownersOf[assetId] = [{ownerId, pct, estimated}]
  const ownersOf = new Map();
  for (const ent of Object.values(ENTITIES)) {
    if (ent.schema !== 'Ownership') continue;
    const owner = p1(ent, 'owner');
    const asset = p1(ent, 'asset');
    if (!owner || !asset) continue;
    const rawPct = p1(ent, 'percentage');
    let pct = null, estimated = false;
    if (rawPct) {
      const n = parseFloat(rawPct);
      if (!isNaN(n)) { pct = n; }
      else { estimated = true; pct = /majority/i.test(rawPct) ? 51 : null; }
    }
    if (!ownersOf.has(asset)) ownersOf.set(asset, []);
    ownersOf.get(asset).push({ ownerId: owner, pct, estimated });
  }

  // 2. Remonter récursivement jusqu'à trouver des Person (= UBO)
  //    Retourne [{uboId, pct, estimated}] — pct = produit cumulé des parts
  function resolveUbos(startId, visited = new Set()) {
    if (visited.has(startId)) return [];
    visited.add(startId);
    const owners = ownersOf.get(startId) || [];
    const result = [];
    for (const { ownerId, pct, estimated } of owners) {
      const ownerEnt = ENTITIES[ownerId];
      if (!ownerEnt) continue;
      if (ownerEnt.schema === 'Person') {
        result.push({ uboId: ownerId, pct, estimated });
      } else {
        // Intermédiaire : remonter et composer les pourcentages
        for (const u of resolveUbos(ownerId, new Set(visited))) {
          const chainPct = (pct != null && u.pct != null) ? Math.round((pct / 100) * u.pct * 100) / 100 : null;
          result.push({ uboId: u.uboId, pct: chainPct, estimated: estimated || u.estimated });
        }
      }
    }
    return result;
  }

  // 3. Construire les deux index
  const byCompany = new Map(); // coId → [{uboId, pct, estimated}]
  const byUbo     = new Map(); // uboId → [{coId, pct, estimated}]

  for (const [id, ent] of Object.entries(ENTITIES)) {
    if (ent.schema !== 'Company' && ent.schema !== 'LegalEntity') continue;
    const ubos = resolveUbos(id);
    if (!ubos.length) continue;
    byCompany.set(id, ubos);
    for (const { uboId, pct, estimated } of ubos) {
      if (!byUbo.has(uboId)) byUbo.set(uboId, []);
      byUbo.get(uboId).push({ coId: id, pct, estimated });
    }
  }
  return { byCompany, byUbo };
}

// Formater un % UBO pour affichage (gère les valeurs estimées et null)
function _fmtUboPct(pct, estimated) {
  if (pct == null) return '?%';
  const s = Number.isInteger(pct) ? pct : pct.toFixed(1).replace(/\.0$/, '');
  return estimated ? `~${s}%` : `${s}%`;
}

// Supprimer les badges et classes UBO de toutes les bandes
function _clearUboHighlight() {
  document.querySelectorAll('.co-band.ubo-lit, .co-band.ubo-dim').forEach(b => {
    b.classList.remove('ubo-lit', 'ubo-dim');
    b.style.removeProperty('--ubo-alpha');
    b.querySelectorAll('.ubo-pct-badge').forEach(el => el.remove());
  });
}

// Déclencher le surlignage UBO pour la société coId
function _triggerUboHighlight(coId) {
  if (!_uboIndex) return;
  const ubos = _uboIndex.byCompany.get(coId);
  if (!ubos || !ubos.length) return;

  // Recueillir toutes les sociétés partageant au moins un UBO avec coId
  // co-band DOM id format : co-${coId}
  const litMap = new Map(); // coId → {pct, estimated, uboNames}
  for (const { uboId, pct, estimated } of ubos) {
    const uboName = p1(ENTITIES[uboId], 'name') || uboId;
    const siblings = _uboIndex.byUbo.get(uboId) || [];
    for (const s of siblings) {
      if (!litMap.has(s.coId)) litMap.set(s.coId, { pct: s.pct, estimated: s.estimated, uboNames: [] });
      litMap.get(s.coId).uboNames.push(uboName);
    }
  }

  if (litMap.size <= 1) return; // Seule la société elle-même → pas de groupe visible

  // Calcul de l'alpha max pour la normalisation (max pct documenté parmi les filiales)
  const maxPct = [...litMap.values()].reduce((m, v) => Math.max(m, v.pct ?? 0), 0);

  // Appliquer les classes
  const allBands = document.querySelectorAll('.co-band');
  for (const band of allBands) {
    const id = band.id.replace(/^co-/, '');
    if (litMap.has(id)) {
      const { pct, estimated } = litMap.get(id);
      const alpha = pct != null && maxPct > 0
        ? Math.max(0.10, Math.min(0.50, (pct / maxPct) * 0.45))
        : 0.18;
      band.classList.add('ubo-lit');
      band.style.setProperty('--ubo-alpha', alpha.toFixed(3));
      // Badge %
      const badge = document.createElement('div');
      badge.className = 'ubo-pct-badge';
      badge.textContent = _fmtUboPct(pct, estimated);
      band.appendChild(badge);
    } else {
      band.classList.add('ubo-dim');
    }
  }
}

/* ═══════════════════════════════════════════════════════════
   AXIS RAILS
═══════════════════════════════════════════════════════════ */
// Positionner le tooltip près du curseur (appelé par les bandes de sociétés)
function _moveBandTooltip(e) {
  const TW = tooltip.offsetWidth  || 180;
  const TH = tooltip.offsetHeight || 60;
  let x = e.clientX + 14;
  let y = e.clientY - TH / 2;
  if (x + TW > window.innerWidth  - 8) x = e.clientX - TW - 10;
  if (y < 4)                           y = 4;
  if (y + TH > window.innerHeight - 4) y = window.innerHeight - TH - 4;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}

function buildAxisRails(canvas) {
  // Passe 2 : résolution des coordonnées Y (SCALE_D est maintenant calibré)
  resolveLayoutY();

  // ── Zones de fond par axe narratif ──
  for (const ax of Object.values(AXIS_MAP)) {
    const zone = document.createElement('div');
    zone.className = 'axis-zone';
    zone.style.left       = ax._xStart + 'px';
    zone.style.width      = ax._wPx + 'px';
    zone.style.background = ax.color;
    canvas.appendChild(zone);
  }

  // ── Bandes de sociétés ──
  // Précollecte des directorships indexés par company
  const dirsByCompany = {}; // companyId → [directorship entity]
  for (const ent of Object.values(ENTITIES)) {
    if (ent.schema !== 'Directorship') continue;
    const org = p1(ent, 'organization');
    if (!org) continue;
    if (!dirsByCompany[org]) dirsByCompany[org] = [];
    dirsByCompany[org].push(ent);
  }

  for (const [coId, layout] of Object.entries(_companyLayout)) {
    const co  = ENTITIES[coId];
    if (!co) continue;
    const ax  = AXIS_MAP[layout.axisId];
    if (!ax) continue;

    const status = p1(co, 'status') || 'default';
    const bg     = STATUS_BG[status] || STATUS_BG.default;

    const band = document.createElement('div');
    band.className = 'co-band';
    band.id = `co-${coId}`;
    band.style.left       = layout.xPx + 'px';
    band.style.top        = layout.yStart + 'px';
    band.style.width      = layout.wPx + 'px';
    band.style.height     = (layout.yEnd - layout.yStart) + 'px';
    band.style.background    = bg;
    band.style.borderColor   = 'rgba(0,0,0,0.15)';
    band.style.borderTopColor = ax.color;
    if (layout.noStartDate) band.classList.add('no-start-date');

    // Étiquette sticky
    const label = document.createElement('div');
    label.className = 'co-band-label';
    label.style.color = ax.color;
    label.title = p1(co, 'name') || coId;
    label.textContent = (p1(co, 'name') || coId).slice(0, 20);
    band.appendChild(label);

    // Mandats (Directorship) dans cette société
    const dirs = dirsByCompany[coId] || [];
    for (const dir of dirs) {
      const start = p1(dir, 'startDate');
      const end   = p1(dir, 'endDate');
      const personId = p1(dir, 'director');
      if (!start) continue;

      const yS = dateY(start);
      const yE = end ? dateY(end) : layout.yEnd;
      const col = personColor(personId);

      // Décalage horizontal dans la bande selon l'index du dirigeant
      const pIdx = Object.keys(_personColorMap).indexOf(personId);
      const mx   = 3 + (pIdx % 3) * 4; // 3 colonnes de 4px dans la bande

      const line = document.createElement('div');
      line.className = 'mandate-line';
      line.style.left       = mx + 'px';
      line.style.top        = (yS - layout.yStart) + 'px';
      line.style.height     = Math.max(2, yE - yS) + 'px';
      line.style.background = col;
      line.title = `${p1(dir,'role') || 'Mandat'} — ${personId}`;
      band.appendChild(line);
    }

    // Tooltip au survol de la bande + surlignage UBO
    band.addEventListener('mouseenter', (e) => {
      const name_   = p1(co, 'name')         || coId;
      const form    = p1(co, 'legalForm')     || '';
      const jur     = p1(co, 'jurisdiction')  || p1(co, 'country') || '';
      const inc     = p1(co, 'incorporationDate') || '';
      const dis     = p1(co, 'dissolutionDate')   || '';
      const st      = p1(co, 'status')        || '';
      const STATUS_LABEL = {
        active:'active', dormant:'dormante', dissolved:'dissoute',
        insolvent:'insolvable', liquidation:'liquidation judiciaire',
        terminated:'radiée', rj:'redressement judiciaire', default:''
      };
      const stLabel = STATUS_LABEL[st] || st;
      let lines = [`<strong>${esc(name_)}</strong>`];
      if (form)  lines.push(`<span style="opacity:0.75">${esc(form)}</span>`);
      const meta = [jur, stLabel ? `<em>${esc(stLabel)}</em>` : ''].filter(Boolean).join(' · ');
      if (meta) lines.push(meta);
      if (inc) lines.push(`Imm. ${formatDate(inc)}${dis ? ' → ' + formatDate(dis) : ''}`);
      // Ligne UBO si données disponibles
      if (_uboIndex) {
        const ubos = _uboIndex.byCompany.get(coId);
        if (ubos && ubos.length) {
          const uboStr = ubos.map(u => {
            const n = p1(ENTITIES[u.uboId], 'name') || u.uboId;
            return `${esc(n)} ${_fmtUboPct(u.pct, u.estimated)}`;
          }).join(', ');
          lines.push(`<span style="color:#ffe082;font-size:0.88em">UBE : ${uboStr}</span>`);
        }
      }
      tooltip.innerHTML = lines.join('<br>');
      tooltip.style.borderLeft = `3px solid ${ax.color}`;
      tooltip.style.display = 'block';
      _moveBandTooltip(e);
      // Surlignage groupé par UBO
      _clearUboHighlight();
      _triggerUboHighlight(coId);
    });
    band.addEventListener('mousemove', _moveBandTooltip);
    band.addEventListener('mouseleave', () => {
      tooltip.style.display = 'none';
      _clearUboHighlight();
    });

    canvas.appendChild(band);
  }
}

/* ═══════════════════════════════════════════════════════════
   CARD SIDE (left/right alternation per axis to avoid overlap)
═══════════════════════════════════════════════════════════ */
// cardSide supprimé — toutes les cartes à droite de leur axe

/* ═══════════════════════════════════════════════════════════
   EVENT NODES
═══════════════════════════════════════════════════════════ */
function buildEvents_DOM(canvas) {
  // ── Passe 1 : calculer le X naturel et le Y naturel de chaque événement ──
  const items = []; // { ev, ax, xNat, yNat }
  for (const ev of EVENTS) {
    const ax = AXIS_MAP[ev._resolvedAxis];
    if (!ax) continue;

    const yNat = dateY(eventDate(ev));
    // Ancrage X : bord droit de la zone de bandes de l'axe + CARD_OFFSET.
    // L'ancrage per-company (xPx + wPx + CARD_OFFSET) est incorrect car les bandes
    // sont contiguës — le point atterrirait à l'intérieur de la bande adjacente.
    // Toutes les cartes d'un axe s'alignent en une colonne à droite du bloc de bandes.
    const xNat = ax._xStart + (ax._wPx || BAND_W) + CARD_OFFSET;
    items.push({ ev, ax, xNat: Math.round(xNat), yNat });
  }

  // ── Passe 2 : dépilement vertical par groupe d'ancrage X ──
  // Grouper par xNat arrondi (évite les groupes distincts dus à la virgule flottante)
  const byX = new Map();
  for (const item of items) {
    const key = item.xNat;
    if (!byX.has(key)) byX.set(key, []);
    byX.get(key).push(item);
  }

  // Pour chaque groupe, trier par Y puis décaler les cartes compressées
  const placed = []; // { ev, ax, xNat, yFinal, peeked, stackDepth }
  for (const [, group] of byX) {
    group.sort((a, b) => a.yNat - b.yNat);
    let cursor = -Infinity; // bas estimé de la dernière carte placée
    for (let i = 0; i < group.length; i++) {
      const item = group[i];
      let yFinal = item.yNat;
      let peeked = false;
      let stackDepth = 0;

      if (yFinal < cursor + PEEK_GAP) {
        // Collision : comprimer et décaler
        yFinal = cursor + PEEK_GAP;
        peeked = true;
        // Compte le nombre de cartes compressées consécutives au-dessus
        stackDepth = placed.filter(p => p.xNat === item.xNat && p.peeked).length;
      }

      const cardH = peeked ? PEEK_H : CARD_EST_H;
      cursor = yFinal + cardH;
      placed.push({ ev: item.ev, ax: item.ax, xNat: item.xNat, yNat: item.yNat, yFinal, peeked, stackDepth });
    }
  }

  // ── Passe 3 : rendu DOM ──
  for (const { ev, ax, xNat, yNat, yFinal, peeked, stackDepth } of placed) {
    const anchor = document.createElement('div');
    anchor.className = 'ev-anchor';
    anchor.id = `ev-${ev.id}`;
    anchor.setAttribute('data-axis', ev._resolvedAxis);
    anchor.style.left = xNat + 'px';
    anchor.style.top  = yFinal + 'px';

    // Si décalée : petit trait pointillé vertical reliant yNat à yFinal
    if (peeked && yFinal > yNat + 6) {
      const connector = document.createElement('div');
      connector.style.cssText = [
        'position:absolute',
        'left:0px',
        'top:' + (yNat - yFinal) + 'px',
        'width:1px',
        'height:' + (yFinal - yNat) + 'px',
        'border-left:1px dashed rgba(160,155,148,0.4)',
        'pointer-events:none',
        'z-index:1',
      ].join(';');
      anchor.appendChild(connector);
    }

    // Segment bar pour événements à durée
    const endDate = eventEndDate(ev);
    if (endDate) {
      const yEnd = dateY(endDate);
      const seg = document.createElement('div');
      seg.className = 'ev-segment';
      seg.style.top    = '0px';
      seg.style.height = (yEnd - yFinal) + 'px';
      seg.style.background = ax.color;
      anchor.appendChild(seg);
    }

    // Dot
    const dot = document.createElement('div');
    dot.className = 'ev-dot' + (isAlert(ev) ? ' alert-dot' : '');
    dot.style.background = ax.color;
    dot.style.top  = (-7) + 'px';
    dot.style.left = '0px';   /* ancré au bord gauche de l'anchor = bord droit bande */
    anchor.appendChild(dot);

    // Card
    const card = document.createElement('div');
    const cls = ['ev-card', 'right', peeked ? 'peeked' : '', isAlert(ev) ? 'is-alert' : '']
      .filter(Boolean).join(' ');
    card.className = cls;
    card.style.borderLeftColor = ax.color;
    card.style.zIndex = String(peeked ? 10 + stackDepth : 20 + stackDepth);
    if (peeked && stackDepth > 0) {
      card.setAttribute('data-stack-depth', '+' + stackDepth);
    }

    const amount = formatAmount(p1(ev,'amount')||p1(ev,'amountExpected'), p1(ev,'amountCurrency')||p1(ev,'currency'));
    const dateStr = eventDate(ev);
    const endStr  = eventEndDate(ev);
    const dateDisplay = endStr
      ? `${formatDate(dateStr)} – ${formatDate(endStr)}`
      : formatDate(dateStr);

    card.innerHTML = `
      <div class="ev-card-title">${esc(eventName(ev))}</div>
      <div class="ev-card-date">${dateDisplay}</div>
      ${eventDesc(ev) ? `<div class="ev-card-desc">${esc(eventDesc(ev))}</div>` : ''}
      ${amount ? `<span class="ev-card-amount" style="color:${ax.color}">${esc(amount)}</span>` : ''}
      <div class="ev-card-schema">${ev.schema}</div>
    `;

    // Lien(s) source sur la carte
    const srcUrls = pAll(ev, 'sourceUrl');
    if (srcUrls.length) {
      const firstUrl  = srcUrls[0];
      const srcLabels = pAll(ev, 'sourceLabel');
      let srcText;
      if (srcLabels[0]) {
        srcText = srcLabels[0].length > 30 ? srcLabels[0].slice(0, 28) + '…' : srcLabels[0];
      } else {
        try { srcText = new URL(firstUrl).hostname.replace(/^www\./, ''); } catch { srcText = firstUrl.slice(0, 28); }
      }
      const srcLink = document.createElement('a');
      srcLink.href = firstUrl;
      srcLink.target = '_blank';
      srcLink.rel = 'noopener';
      srcLink.className = 'ev-card-source';
      srcLink.title = firstUrl;
      srcLink.innerHTML =
        `<span class="ev-card-source-icon">↗</span>${esc(srcText)}` +
        (srcUrls.length > 1 ? `<span class="ev-card-source-extra">+${srcUrls.length - 1}</span>` : '');
      srcLink.addEventListener('click', e => e.stopPropagation()); // ne pas déclencher openModal
      card.appendChild(srcLink);
    }

    // Survol géré par CSS .ev-anchor:hover { z-index:900 } — pas de handler JS.
    dot.addEventListener('mouseenter', (e) => showTooltip(e, ev));
    dot.addEventListener('mouseleave',  hideTooltip);
    card.addEventListener('click', () => openModal(ev));
    dot.addEventListener('click',  () => openModal(ev));
    dot.addEventListener('mouseenter', () => highlightConnectors(ev.id));
    dot.addEventListener('mouseleave',  clearConnectorHighlights);
    card.addEventListener('mouseenter', () => highlightConnectors(ev.id));
    card.addEventListener('mouseleave',  clearConnectorHighlights);

    anchor.appendChild(card);
    canvas.appendChild(anchor);
  }
}

/* ═══════════════════════════════════════════════════════════
   CONNECTOR LINES (SVG)
═══════════════════════════════════════════════════════════ */
let connectorMap = {}; // sharedEntityId → [evId, …]

function buildConnectors(svg) {
  connectorMap = {};

  // Group events by shared ftmRef
  for (const ev of EVENTS) {
    for (const ref of pAll(ev,'ftmRef')) {
      if (!connectorMap[ref]) connectorMap[ref] = [];
      connectorMap[ref].push(ev.id);
    }
  }

  svg.innerHTML = '';
  svg.style.width  = CANVAS_WIDTH + 'px';
  svg.style.height = CANVAS_HEIGHT + 'px';

  for (const [refId, evIds] of Object.entries(connectorMap)) {
    if (evIds.length < 2) continue;
    // Draw lines between consecutive pairs
    for (let i = 0; i < evIds.length - 1; i++) {
      const a = EVENTS.find(e => e.id === evIds[i]);
      const b = EVENTS.find(e => e.id === evIds[i+1]);
      if (!a || !b) continue;

      const ax1 = AXIS_MAP[a._resolvedAxis];
      const ax2 = AXIS_MAP[b._resolvedAxis];
      if (!ax1 || !ax2) continue;
      if (ax1 === ax2) continue; // same axis = no cross connector

      const x1 = ax1._xPx, y1 = dateY(eventDate(a));
      const x2 = ax2._xPx, y2 = dateY(eventDate(b));

      // Shared entity color = first axis color
      const color = ax1.color;

      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      const cx = (x1+x2)/2;
      path.setAttribute('d', `M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}`);
      path.setAttribute('stroke', color);
      path.classList.add('connector-line');
      path.setAttribute('data-evids', `${evIds[i]}|${evIds[i+1]}`);
      path.setAttribute('data-refid', refId);
      svg.appendChild(path);
    }
  }
}

function setConnectorsVisible(v) {
  document.querySelectorAll('.connector-line').forEach(l => {
    l.classList.toggle('visible', v);
  });
}

function highlightConnectors(evId) {
  if (!SHOW_CONNECTORS) return;
  document.querySelectorAll('.connector-line').forEach(l => {
    const ids = (l.getAttribute('data-evids')||'').split('|');
    l.style.opacity = ids.includes(evId) ? '0.85' : '0.08';
  });
}

function clearConnectorHighlights() {
  if (!SHOW_CONNECTORS) return;
  document.querySelectorAll('.connector-line').forEach(l => {
    l.style.opacity = '';
    l.classList.add('visible');
  });
}

/* ═══════════════════════════════════════════════════════════
   FILTRES : axe, schéma, texte
═══════════════════════════════════════════════════════════ */
let MUTED_SCHEMAS = new Set();
let SEARCH_TEXT   = '';

function applyFilters() {
  const needle = SEARCH_TEXT.trim().toLowerCase();
  document.querySelectorAll('.ev-anchor').forEach(el => {
    const evId   = el.id.replace('ev-', '');
    const evAxis = el.getAttribute('data-axis');
    const ev     = EVENTS.find(e => e.id === evId);
    if (!ev) return;

    // Critère 1 : axe muté
    const hiddenByAxis = MUTED_AXES.has(evAxis);

    // Critère 2 : schéma muté
    const hiddenBySchema = MUTED_SCHEMAS.size > 0 && !MUTED_SCHEMAS.has(ev.schema);

    // Critère 3 : texte absent
    let hiddenBySearch = false;
    if (needle) {
      const hay = [
        eventName(ev),
        eventDesc(ev) || '',
        eventDate(ev) || '',
        ev.schema,
        p1(ev, 'sourceLabel') || '',
      ].join(' ').toLowerCase();
      hiddenBySearch = !hay.includes(needle);
    }

    el.classList.toggle('axis-hidden', hiddenByAxis || hiddenBySchema || hiddenBySearch);
  });
}

function buildSchemaFilters() {
  // Recenser les schémas présents dans EVENTS
  const counts = {};
  for (const ev of EVENTS) counts[ev.schema] = (counts[ev.schema] || 0) + 1;

  const container = document.getElementById('inf-schema-btns');
  if (!container) return;
  container.innerHTML = '';

  // Icônes par schéma
  const SCHEMA_ICON = {
    Event:        '⬡',
    Document:     '◻',
    Directorship: '◈',
    Payment:      '⊛',
    Ownership:    '◉',
  };

  for (const [schema, count] of Object.entries(counts).sort((a,b)=>b[1]-a[1])) {
    const btn = document.createElement('button');
    btn.className = 'inf-schema-btn active';
    btn.dataset.schema = schema;
    btn.title = `${schema} (${count})`;
    btn.innerHTML = `${SCHEMA_ICON[schema] || '○'} ${schema}`;
    btn.addEventListener('click', () => {
      if (MUTED_SCHEMAS.has(schema)) {
        MUTED_SCHEMAS.delete(schema);
        btn.classList.add('active');
      } else {
        MUTED_SCHEMAS.add(schema);
        btn.classList.remove('active');
      }
      applyFilters();
    });
    container.appendChild(btn);
  }
}

// Recherche texte : debounced
let _searchDebounce = null;
document.addEventListener('DOMContentLoaded', () => {
  const inp = document.getElementById('inf-search');
  if (!inp) return;
  inp.addEventListener('input', () => {
    clearTimeout(_searchDebounce);
    _searchDebounce = setTimeout(() => {
      SEARCH_TEXT = inp.value;
      applyFilters();
    }, 200);
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Escape') { inp.value = ''; SEARCH_TEXT = ''; applyFilters(); inp.blur(); }
  });
});

function toggleAxis(axId) {
  if (MUTED_AXES.has(axId)) MUTED_AXES.delete(axId);
  else MUTED_AXES.add(axId);

  document.getElementById(`pill-${axId}`)?.classList.toggle('muted', MUTED_AXES.has(axId));

  document.querySelectorAll('.axis-rail').forEach(el => {
    const id = el.id.replace('rail-','');
    el.style.opacity = MUTED_AXES.has(id) ? '0.1' : '1';
  });

  applyFilters(); // unifié avec les autres filtres
}

/* ═══════════════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════════════ */
function openModal(ev) {
  const ax = AXIS_MAP[ev._resolvedAxis];
  const backdrop = document.getElementById('modal-backdrop');

  document.getElementById('modal-axis-tag').textContent = ax?.label || ev._resolvedAxis;
  document.getElementById('modal-axis-tag').style.background = ax?.color || '#666';
  document.getElementById('modal-schema-tag').textContent = ev.schema;
  document.getElementById('modal-title').textContent = eventName(ev);

  const dateStr = eventDate(ev);
  const endStr  = eventEndDate(ev);
  document.getElementById('modal-date').textContent =
    endStr ? `${formatDate(dateStr)} – ${formatDate(endStr)}` : formatDate(dateStr);

  const body = document.getElementById('modal-body');
  body.innerHTML = '';

  // Description
  const desc = eventDesc(ev);
  if (desc) {
    const sec = section('Description');
    const p = document.createElement('p');
    p.className = 'modal-description';
    p.textContent = desc;
    sec.appendChild(p);
    body.appendChild(sec);
  }

  // Amount
  const amount = formatAmount(p1(ev,'amount')||p1(ev,'amountExpected'), p1(ev,'amountCurrency')||p1(ev,'currency'));
  if (amount) {
    const sec = section('Montant');
    const el = document.createElement('div');
    el.className = 'modal-amount';
    el.style.color = ax?.color || 'inherit';
    el.textContent = amount;
    sec.appendChild(el);
    body.appendChild(sec);
  }

  // Properties grid (show interesting props)
  const skipProps = new Set(['name','fileName','description','date','startDate','endDate','dissolutionDate','incorporationDate','amount','amountCurrency','currency','axis','eventLabel','ftmRef','alert','sourceUrl']);
  const propsToShow = Object.entries(ev.properties || {})
    .filter(([k]) => !skipProps.has(k) && ev.properties[k].length);
  if (propsToShow.length) {
    const sec = section('Propriétés');
    const grid = document.createElement('div');
    grid.className = 'modal-prop-grid';
    for (const [k, vals] of propsToShow) {
      const prop = document.createElement('div');
      prop.className = 'modal-prop';
      prop.innerHTML = `<div class="modal-prop-key">${esc(k)}</div><div class="modal-prop-val">${esc(vals.join(' · '))}</div>`;
      grid.appendChild(prop);
    }
    sec.appendChild(grid);
    body.appendChild(sec);
  }

  // FtM references
  const refs = pAll(ev,'ftmRef');
  if (refs.length) {
    const sec = section('Entités liées');
    const refsCont = document.createElement('div');
    refsCont.className = 'modal-refs';
    for (const refId of refs) {
      const refEnt = ENTITIES[refId];
      if (!refEnt) {
        const el = document.createElement('div');
        el.className = 'modal-ref-card';
        el.innerHTML = `<span class="modal-ref-schema" style="background:#888">${esc(refId.split('-')[0])}</span><span class="modal-ref-name" style="color:var(--dust)">${esc(refId)}</span>`;
        refsCont.appendChild(el);
        continue;
      }
      const refAx = AXIS_MAP[entityAxis(refEnt)];
      const schemaColor = refAx?.color || '#888';
      const el = document.createElement('div');
      el.className = 'modal-ref-card';
      el.style.cursor = 'pointer';
      el.innerHTML = `
        <span class="modal-ref-schema" style="background:${schemaColor}">${esc(refEnt.schema)}</span>
        <span class="modal-ref-name">${esc(p1(refEnt,'name')||p1(refEnt,'fileName')||refId)}</span>
      `;
      if (pAll(refEnt,'name').length > 1) {
        el.title = 'Également : ' + pAll(refEnt,'name').slice(1).join(' · ');
      }
      el.addEventListener('click', () => {
        // If it's an event entity, navigate to it; else show its modal
        const asEvent = EVENTS.find(e => e.id === refId);
        if (asEvent) openModal(asEvent);
      });
      refsCont.appendChild(el);
    }
    sec.appendChild(refsCont);
    body.appendChild(sec);
  }

  // Source URL
  const srcUrls = pAll(ev,'sourceUrl');
  if (srcUrls.length) {
    const sec = section('Source primaire');
    for (const url of srcUrls) {
      const a = document.createElement('a');
      a.href = url;
      a.target = '_blank';
      a.rel = 'noopener';
      a.className = 'modal-source-link';
      let label = url;
      try { label = new URL(url).hostname; } catch {}
      a.innerHTML = `
        <span class="modal-source-icon">↗</span>
        <span class="modal-source-text">
          <span class="modal-source-label">${esc(label)}</span>
          <span class="modal-source-url">${esc(url)}</span>
        </span>
      `;
      sec.appendChild(a);
    }
    body.appendChild(sec);
  }

  backdrop.classList.add('open');
}

function section(label) {
  const wrap = document.createElement('div');
  const lbl = document.createElement('div');
  lbl.className = 'modal-section-label';
  lbl.textContent = label;
  wrap.appendChild(lbl);
  return wrap;
}

/* ═══════════════════════════════════════════════════════════
   ESCAPE
═══════════════════════════════════════════════════════════ */
function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════════════════════════
   SHA-256 (Web Crypto API — natif, sans dépendance)
═══════════════════════════════════════════════════════════ */
async function sha256hex(text) {
  const buf = await crypto.subtle.digest(
    'SHA-256', new TextEncoder().encode(text)
  );
  return Array.from(new Uint8Array(buf))
    .map(b => b.toString(16).padStart(2,'0')).join('');
}

/* ═══════════════════════════════════════════════════════════
   INTEGRITY REPORT
═══════════════════════════════════════════════════════════ */
const FILE_REPORTS = [];  // { name, version, status, hash, size }

const INT_OK      = '✓';
const INT_NEW     = '↑';
const INT_ALTERED = '✗';
const INT_UNKNOWN = '?';
const INT_MISSING = '—';

function integrityColor(s) {
  if (s === INT_OK)      return '#27ae60';
  if (s === INT_NEW)     return '#f39c12';
  if (s === INT_ALTERED) return '#e74c3c';
  return '#6b6762';
}

function buildIntegrityPanel() {
  const rows = document.getElementById('integrity-rows');
  rows.innerHTML = '';

  const allOk = FILE_REPORTS.every(r => r.status === INT_OK || r.status === INT_UNKNOWN);
  const hasAltered = FILE_REPORTS.some(r => r.status === INT_ALTERED);

  const summary = document.getElementById('inf-integrity');
  if (hasAltered) {
    summary.textContent = 'Intégrité : ✗ ALTÉRATION';
    summary.style.color = '#e74c3c';
  } else if (FILE_REPORTS.some(r => r.status === INT_NEW)) {
    summary.textContent = 'Intégrité : ↑ nouvelles versions';
    summary.style.color = '#f39c12';
  } else if (allOk) {
    summary.textContent = 'Intégrité : ✓ conforme';
    summary.style.color = '#27ae60';
  } else {
    summary.textContent = 'Intégrité : ? non vérifié';
    summary.style.color = '#6b6762';
  }

  for (const r of FILE_REPORTS) {
    const row = document.createElement('div');
    row.style.cssText = `
      display:grid; grid-template-columns:1fr 40px 18px 80px;
      gap:8px; align-items:center; padding:4px 0;
      border-bottom:1px solid rgba(255,255,255,0.04);
    `;
    const vLabel = r.version > 0 ? `v${r.version}` : 'base';
    const sizeKb = r.size ? `${(r.size/1024).toFixed(1)} Ko` : '—';
    row.innerHTML = `
      <span style="color:#c8c4be;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(r.hash)}">${esc(r.name)}</span>
      <span style="color:#6b6762;text-align:right">${esc(vLabel)}</span>
      <span style="color:${integrityColor(r.status)};text-align:center;font-weight:600">${r.status}</span>
      <span style="color:#6b6762;text-align:right">${esc(sizeKb)}</span>
    `;
    rows.appendChild(row);
  }

  // Légende
  const legend = document.createElement('div');
  legend.style.cssText = 'margin-top:10px;color:#4a4a5a;line-height:1.8;';
  legend.innerHTML = `✓ conforme &nbsp;↑ nouvelle version &nbsp;✗ altéré &nbsp;? non vérifié dans manifest`;
  rows.appendChild(legend);
}

function loaderFile(path, state) {
  // state: 'loading' | 'ok' | 'warn' | 'error'
  const container = document.getElementById('loader-files');
  const id = 'lf-' + path.replace(/[^a-z0-9]/gi,'_');
  let el = document.getElementById(id);
  if (!el) {
    el = document.createElement('div');
    el.className = 'loader-file';
    el.id = id;
    const name = path.split('/').pop();
    el.innerHTML = `<span class="lf-icon">○</span><span>${name}</span>`;
