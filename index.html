<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affaire DeSavoie / Chicherit — Frise</title>
<style>
/* Polices système uniquement — aucune requête externe */

/* ═══════════════════════════════════════════
   TOKENS & RESET
═══════════════════════════════════════════ */
:root {
  --ink:        #0a0b0d;
  --ink2:       #1a1c22;
  --ink3:       #252830;
  --smoke:      #f2f1ee;
  --smoke2:     #e8e6e2;
  --smoke3:     #d4d1cb;
  --dust:       #9a9590;
  --dust2:      #6b6762;
  --wire:       #d0cdc8;
  --wire2:      #e6e4e0;

  --red:        #b83232;
  --amber:      #c8821a;
  --gold:       #b89a20;
  --green:      #2a7a4e;
  --violet:     #6b3fa0;
  --teal:       #1f7a78;

  --font-display: Georgia, 'Times New Roman', serif;   /* réservé à yr-label */
  --font-card:    Inter, 'Segoe UI', system-ui, -apple-system, sans-serif;
  --font-mono:    ui-monospace, 'Cascadia Code', 'Consolas', 'Menlo', monospace;
  --font-ui:      system-ui, -apple-system, 'Segoe UI', sans-serif;

  --rail-w: 2px;
  --dot-r:  7px;
  --card-max-w: 520px;   /* largeur maximale des cartes adaptatives */
  --card-w: 520px;        /* alias de compatibilité — utiliser --card-max-w */
  --year-w: 56px;
  --pad-v:  18px;

  /* Hauteurs structurelles — propagées à tous les éléments dépendants */
  --hd-h:   56px;   /* hauteur #app-header */
  --ib-h:   28px;   /* hauteur #info-bar */
  --st-trk: 10px;   /* hauteur #scroll-track */

  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--smoke);
  color: var(--ink);
  font-family: var(--font-ui);
  font-size: 13px;
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ═══════════════════════════════════════════
   GRAIN OVERLAY (atmosphere)
═══════════════════════════════════════════ */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1000;
  opacity: 0.6;
}

/* ═══════════════════════════════════════════
   HEADER
═══════════════════════════════════════════ */
#app-header {
  position: sticky;
  top: 0;
  z-index: 200;
  background: var(--ink2);
  border-bottom: 1px solid var(--ink3);
  display: flex;
  align-items: stretch;
  gap: 0;
  height: var(--hd-h);
}

.hd-brand {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0 24px;
  border-right: 1px solid var(--ink3);
  flex-shrink: 0;
}

.hd-brand .sigil {
  width: 28px;
  height: 28px;
  border: 1.5px solid var(--red);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.hd-brand .sigil span {
  font-family: var(--font-display);
  font-size: 14px;
  color: var(--red);
  font-weight: 600;
  line-height: 1;
}

.hd-titles { display: flex; flex-direction: column; justify-content: center; }
.hd-title {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 600;
  color: #e8e5e0;
  letter-spacing: 0.01em;
  line-height: 1.2;
}
.hd-sub {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--dust);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 1px;
}
@media (max-width: 768px) {
  .hd-sub           { display: none; }
  .hd-axis-sub      { display: none; }
  .hd-axis-pill     { padding: 0 10px; gap: 5px; }
  .hd-axis-label    { font-size: 10px; }
  .hd-brand         { padding: 0 14px; gap: 10px; }
  .hd-meta          { padding: 0 10px; }
}

/* ── Tablette paysage / petite tablette ─────────────────── */
@media (max-width: 768px) {
  :root { --card-max-w: 320px; --card-w: 320px; }
  .hd-axes { overflow-x: auto; scrollbar-width: none; }
  .hd-axes::-webkit-scrollbar { display: none; }
}

/* ── Mobile portrait (≤ 480px) ─────────────────────────── */
@media (max-width: 480px) {
  /* Variables structurelles : propagées à tout ce qui en dépend */
  :root {
    --hd-h:   44px;
    --ib-h:   44px;   /* zone tactile confortable */
    --year-w: 32px;
    --card-max-w: 220px;
    --card-w: 220px;
    --dot-r:  9px;    /* cibles de tap plus larges */
  }

  /* Header */
  .hd-title   { font-size: 12px; }
  /* Axes : défilement horizontal silencieux au lieu de disparaître */
  .hd-axes    {
    overflow-x: auto;
    scrollbar-width: none;
    flex-shrink: 1;
    min-width: 0;
  }
  .hd-axes::-webkit-scrollbar { display: none; }
  .hd-axis-pill   { padding: 0 8px; }
  .hd-axis-label  { font-size: 9px; }
  .hd-brand       { padding: 0 10px; gap: 8px; flex-shrink: 0; }
  .hd-meta        { padding: 0 8px; flex-shrink: 0; }

  /* Info-bar : alléger les éléments secondaires */
  #info-bar         { gap: 10px; padding: 0 12px; font-size: 8px; }
  #info-bar .inf-sep,
  #info-bar #inf-connect-toggle,
  #info-bar #inf-deploy-ts,
  #info-bar #inf-integrity,
  #info-bar #inf-entity-count,
  #info-bar #inf-file-count,
  #info-bar #inf-scale-block { display: none; }

  /* Légende mobile : bottom sheet (remonte depuis le bas) */
  #legend-panel {
    left: 0;
    right: 0;
    width: 100%;
    top: auto;         /* annule le top calculé */
    bottom: var(--ib-h);
    max-height: 55dvh;
    border-radius: 12px 12px 0 0;
    border-right: none;
    border-top: 1px solid var(--wire2);
    box-shadow: 0 -4px 24px rgba(0,0,0,0.18);
  }
}

.hd-axes {
  display: flex;
  align-items: center;
  gap: 0;
  flex: 1;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
}
.hd-axes::-webkit-scrollbar { display: none; }

.hd-axis-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 12px;
  height: 100%;
  border-right: 1px solid var(--ink3);
  cursor: pointer;
  transition: background 0.15s;
  user-select: none;
  flex-shrink: 0;
}
.hd-axis-pill:hover { background: rgba(255,255,255,0.04); }
.hd-axis-pill.muted { opacity: 0.35; }

.hd-axis-pip {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.hd-axis-label {
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 500;
  color: #c8c4be;
  white-space: nowrap;
}
.hd-axis-sub {
  font-family: var(--font-mono);
  font-size: 8.5px;
  color: var(--dust);
  white-space: nowrap;
}

.hd-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 18px;
  margin-left: auto;
  flex-shrink: 0;
}
.hd-badge {
  font-family: var(--font-mono);
  font-size: 8.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--red);
  border: 1px solid rgba(184,50,50,0.4);
  padding: 3px 7px;
  border-radius: 2px;
}

/* ═══════════════════════════════════════════
   LAYOUT: STAGE + YEAR SPINE
═══════════════════════════════════════════ */
#stage {
  position: relative;
  display: flex;
  width: 100%;
  height: calc(100dvh - var(--hd-h) - var(--st-trk) - var(--ib-h)); /* header + scroll-track + info-bar */
  overflow: hidden;
}

/* ── Year spine ── */
#year-spine {
  position: relative;
  z-index: 100;
  width: var(--year-w);
  flex-shrink: 0;
  background: var(--smoke);
  border-right: var(--rail-w) solid var(--wire);
  overflow: hidden;   /* clip le wrapper interne lors du translateY */
}
/* Wrapper interne : reçoit translateY(-scrollTop) pour synchroniser
   les millésimes avec le contenu du canvas */
#year-spine-inner {
  will-change: transform;
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
}

.yr-block {
  /* Positionnement absolu dans year-spine-inner : top + height fixés par JS depuis dateY() */
  position: absolute;
  left: 0;
  right: 0;
  box-sizing: border-box;
  border-bottom: 1px solid var(--wire2);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  overflow: hidden;
}

.yr-label {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 300;
  color: var(--dust2);
  writing-mode: vertical-rl;
  text-orientation: mixed;
  transform: rotate(180deg);
  letter-spacing: 0.12em;
  opacity: 0.7;
  user-select: none;
  flex: 1;
  padding-bottom: 12px;   /* chronologique : label flotte vers le haut du bloc */
}
/* Mode antichronologique : le début de l'année est en BAS du bloc */
.yr-label.yr-label--inv {
  padding-bottom: 0;
  padding-top: 12px;      /* label flotte vers le bas du bloc */
}
/* Millésime horizontal (blocs suffisamment hauts) */
.yr-label--horiz {
  writing-mode: horizontal-tb;
  transform: none;
  text-align: center;
  letter-spacing: 0.08em;
  font-size: 11px;
  padding: 6px 2px 0;
  flex: none;
  align-self: center;
}

/* ── Canvas: the scrollable timeline ── */
#canvas {
  flex: 1;
  position: relative;
  overflow-x: auto;
  overflow-y: auto;
  height: 100%;         /* occupe toute la hauteur de #stage */
  touch-action: pan-x pan-y;
  -webkit-overflow-scrolling: touch;
}

/* SVG connector overlay */
#connector-svg {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 15;  /* au-dessus des bandes (z:8) — les dot-card-line deviennent visibles */
  width: 100%;
  height: 100%;
  overflow: visible;
}

/* ═══════════════════════════════════════════
   AXIS RAILS (continuous horizontal positions)
═══════════════════════════════════════════ */
.axis-rail { display: none; }

/* ── Bandes de sociétés ── */
.co-band {
  position: absolute;
  border-radius: 3px 3px 0 0;
  box-sizing: border-box;
  border: 1.5px solid rgba(0,0,0,0.18);
  border-top-width: 3px;
  overflow: visible;
  z-index: 8;
  transition: opacity 0.15s, box-shadow 0.15s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.10);
}
.co-band:hover {
  box-shadow: 0 2px 8px rgba(0,0,0,0.16);
}
.co-band.no-start-date {
  border-top-style: dashed;   /* date d'incorporation inconnue ou hors frise */
  opacity: 0.82;
}
.co-band:hover { z-index: 20; }

/* ── Surlignage bénéficiaires effectifs (UBO) ── */
.co-band.ubo-lit {
  outline: 2px solid rgba(255, 195, 40, 0.90);
  outline-offset: 1px;
  z-index: 22 !important;
}
/* Overlay coloré d'intensité proportionnelle à la part détenue */
.co-band.ubo-lit::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255, 195, 40, var(--ubo-alpha, 0.18));
  pointer-events: none;
  z-index: 1;
  border-radius: inherit;
}
.co-band.ubo-dim {
  opacity: 0.22;
  transition: opacity 0.12s;
}
/* Badge affichant le % UBO en haut de la bande */
.ubo-pct-badge {
  position: absolute;
  top: -19px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(32, 24, 4, 0.91);
  color: #ffe082;
  font-family: var(--font-mono);
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.04em;
  padding: 2px 5px;
  border-radius: 3px;
  white-space: nowrap;
  pointer-events: none;
  z-index: 120;
  line-height: 1.3;
  border: 1px solid rgba(255,195,40,0.45);
}

.co-band-label {
  position: absolute;
  /* top est mis à jour dynamiquement via --label-offset pour rester visible au scroll */
  top: var(--label-offset, 0px);
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  padding: 6px 2px;
  font-family: var(--font-mono);
  font-size: 6.5px;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  writing-mode: vertical-rl;
  text-orientation: mixed;
  transform: rotate(180deg);
  white-space: nowrap;
  overflow: hidden;
  opacity: 0.70;
  cursor: default;
  user-select: none;
  pointer-events: none;
  z-index: 5;
}

/* ── Traits de mandats ── */
.mandate-line {
  position: absolute;
  width: 2px;
  border-radius: 1px;
  opacity: 0.75;
  pointer-events: none;
  z-index: 4;
}

/* ── Zone d'axe narratif (fond) ── */
.axis-zone {
  position: absolute;
  top: 0;
  bottom: 0;
  opacity: 0.025;
  pointer-events: none;
  z-index: 0;
}
._axis-rail-hidden {
  position: absolute;
  top: 0;
  bottom: 0;
  width: var(--rail-w);
  transform: translateX(-50%);
  pointer-events: none;
  z-index: 1;
}

.axis-rail-line {
  position: absolute;
  inset: 0;
  opacity: 0.18;
}

/* ─ axis column header label ─ */
.axis-col-header {
  position: sticky;
  top: var(--hd-h);
  z-index: 50;
  pointer-events: none;
}

/* ═══════════════════════════════════════════
   HACHURES PROCÉDURALES (DDC / Relevé forclusion / Appel)
   Superposées sur la bande société, pointer-events:none.
   z-index 9 : au-dessus de co-band(8), sous dots/cartes(25).
═══════════════════════════════════════════ */
.proc-hatch {
  position: absolute;
  pointer-events: none;
  box-sizing: border-box;
  border-radius: 0;
  z-index: 9;
}
/* ── 2 premiers mois : déclaration des créances ── hachures rouges épaisses 45° */
.proc-hatch-ddc {
  background-image: repeating-linear-gradient(
    45deg,
    rgba(210, 40, 40, 0.42) 0px,
    rgba(210, 40, 40, 0.42) 3px,
    transparent           3px,
    transparent           9px
  );
}
/* ── Mois 3–6 : relevé de forclusion ── hachures oranges épaisses -45° (alternées) */
.proc-hatch-forc {
  background-image: repeating-linear-gradient(
    -45deg,
    rgba(220, 120, 20, 0.42) 0px,
    rgba(220, 120, 20, 0.42) 3px,
    transparent             3px,
    transparent             9px
  );
}
/* ── Superposé sur toute la plage 6 mois : délai appel liste créances ──
   hachures noires fines, direction perpendiculaire (135°) */
.proc-hatch-appel {
  background-image: repeating-linear-gradient(
    135deg,
    rgba(10, 10, 10, 0.10) 0px,
    rgba(10, 10, 10, 0.10) 1px,
    transparent            1px,
    transparent            5px
  );
  z-index: 10; /* légèrement au-dessus de ddc et forc */
}
/* Tooltip des hachures — visible au hover de la bande sous-jacente */
.proc-hatch[title]:hover { cursor: default; }

/* ═══════════════════════════════════════════
   EVENT CARDS
═══════════════════════════════════════════ */
.ev-anchor {
  position: absolute;
  /* Ancré à sa colonne d'axe ; le trait dot-card-line relie visuellement au dot sur bande */
  z-index: 25; /* > co-band:hover(20) et co-band.ubo-lit(22) */
}
.ev-anchor:hover,
.ev-anchor.hovered {
  z-index: 900 !important;
}

/* Nœud dot — positionné directement sur la bande société (indépendant de la carte) */
.ev-dot-node {
  position: absolute;
  z-index: 25; /* > co-band:hover(20) et co-band.ubo-lit(22) — toujours au premier plan */
  pointer-events: none; /* les événements sont capturés par .ev-dot enfant */
}

/* Étiquette date à gauche du dot — ancrée sur l'anchor.
   anchor.top = yFinal + DOT_R - CARD_TITLE_HALF_H  (décalé vers le haut de la moitié du titre).
   Pour que l'étiquette reste alignée sur le centre du dot :
     translateY = CARD_TITLE_HALF_H - 50% de sa propre hauteur
   var(--title-half) est positionné par JS sur chaque anchor. */
.ev-dot-label {
  position: absolute;
  left: 0;
  top: 0;
  transform: translate(calc(-100% - var(--dot-r) - 5px), calc(var(--title-half, 9px) - 50%));
  font-family: var(--font-mono);
  font-size: 7.5px;
  font-weight: 600;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--ink);
  white-space: nowrap;
  text-shadow: 0 0 4px #fff, 0 0 8px #fff, 1px 0 0 #fff, -1px 0 0 #fff, 0 1px 0 #fff, 0 -1px 0 #fff;
  pointer-events: none;
  opacity: 0.82;
  z-index: 4;
}

/* Surlignage dots / cartes sur hover bande company */
.ev-dot-node.band-hovered {
  z-index: 200 !important;
}
.ev-dot-node.band-hovered .ev-dot {
  transform: translateX(-50%) scale(1.5);
  box-shadow: 0 0 0 4px rgba(255,255,255,0.55);
}
/* Date label dans l'anchor (band-hovered = la carte ET la date se surligent ensemble) */
.ev-anchor.band-hovered .ev-dot-label {
  opacity: 1;
  font-weight: 700;
  letter-spacing: 0.09em;
  text-shadow: 0 0 6px #fff, 0 0 12px #fff, 1px 0 0 #fff, -1px 0 0 #fff, 0 1px 0 #fff, 0 -1px 0 #fff;
}
.ev-dot-node.band-dimmed {
  opacity: 0.18;
  transition: opacity 0.1s;
}
.ev-anchor.band-hovered {
  z-index: 850 !important;
}
.ev-anchor.band-hovered .ev-card {
  box-shadow: 0 6px 28px rgba(10,11,13,0.18), 0 2px 8px rgba(10,11,13,0.09);
}
.ev-anchor.band-dimmed {
  opacity: 0.12;
  transition: opacity 0.1s;
}
.dot-card-line.band-dimmed {
  stroke-opacity: 0 !important;
}
.ev-dot-node .ev-dot {
  pointer-events: all;
  top: 0;
  left: 0;
}
.ev-dot-node .ev-segment {
  left: 0;
}

.ev-dot {
  width: calc(var(--dot-r)*2);
  height: calc(var(--dot-r)*2);
  border-radius: 50%;
  border: 2px solid var(--smoke);
  position: absolute;
  top: 0;
  left: 0;
  transform: translateX(-50%);  /* centre le dot sur le bord gauche de l'anchor */
  cursor: pointer;
  transition: transform 0.2s var(--ease-out), box-shadow 0.2s;
  z-index: 3;
}
.ev-dot:hover {
  transform: translateX(-50%) scale(1.45);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.35);
}
.ev-dot.alert-dot {
  animation: pulse-alert 2.8s ease-in-out infinite;
}
@keyframes pulse-alert {
  0%, 100% { box-shadow: 0 0 0 0 rgba(184,50,50,0); }
  50%       { box-shadow: 0 0 0 6px rgba(184,50,50,0.25); }
}

/* Segment bar for events with duration */
.ev-segment {
  position: absolute;
  left: 0;
  transform: translateX(-50%);  /* centré sur le bord gauche de l'anchor */
  width: 3px;
  border-radius: 2px;
  opacity: 0.35;
  z-index: 2;
  pointer-events: none;
}

/* The floating card */
.ev-card {
  position: absolute;
  width: max-content;
  min-width: 110px;
  max-width: var(--card-max-w);
  top: 0;
  background: #fff;
  border: 1px solid var(--wire);
  border-radius: 4px;
  border-left-width: 4px;
  padding: 0 0 0; /* aucun padding : coin haut-gauche sur le centre du dot, flush right+bottom */
  box-shadow: 0 2px 12px rgba(10,11,13,0.07), 0 1px 3px rgba(10,11,13,0.04);
  cursor: pointer;
  transition: box-shadow 0.2s, transform 0.2s var(--ease-out), opacity 0.15s;
  border-left: 3px solid transparent;
  z-index: 4;
  opacity: 0;
  animation: card-in 0.35s var(--ease-out) forwards;
}
@keyframes card-in {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.ev-card:hover {
  box-shadow: 0 6px 24px rgba(10,11,13,0.12), 0 2px 6px rgba(10,11,13,0.06);
  transform: translateY(-1px);
}
.ev-card.right { left: calc(var(--dot-r) + 4px); }

/* Padding interne : uniquement left, et un léger top sur le titre */
.ev-card-title {
  font-family: var(--font-card);
  font-size: 13px;
  font-weight: 600;
  line-height: 1.3;
  color: var(--ink);
  margin-bottom: 2px;
  padding-left: 7px;
  padding-right: 7px;
  overflow-wrap: break-word;
  word-break: break-word;
}
.ev-card-date {
  font-family: var(--font-mono);
  font-size: 8.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--dust);
  margin-bottom: 4px;
  padding-left: 7px;
}
.ev-card-desc {
  font-family: var(--font-card);
  font-size: 11px;
  color: var(--dust2);
  line-height: 1.55;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
  padding-left: 7px;
  padding-right: 7px;
}
.ev-card-amount {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  display: block;
  margin-top: 5px;
  padding-left: 7px;
  padding-right: 7px;
}
.ev-card-schema {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--dust);
  margin-top: 5px;
  opacity: 0.7;
  padding-left: 7px;
}
.ev-card-source {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 6px;
  font-family: var(--font-mono);
  font-size: 7.5px;
  color: var(--dust2);
  text-decoration: none;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  cursor: pointer;
  transition: color 0.15s;
}
.ev-card-source:hover { color: var(--ink); }
.ev-card-source-icon { flex-shrink: 0; opacity: 0.7; }
.ev-card-source-extra {
  font-size: 7px;
  opacity: 0.55;
  flex-shrink: 0;
  margin-left: 2px;
}

/* alert badge */
.ev-card.is-alert .ev-card-title::before {
  content: '⚠ ';
  color: var(--red);
  font-style: normal;
  font-family: var(--font-ui);
}

/* ── Carte compressée (empilement vertical) ── */
.ev-card.peeked {
  height: 20px;           /* titre seul visible, date + corps masqués */
  overflow: hidden;
  transition: height 0.18s var(--ease-out), box-shadow 0.2s, transform 0.2s var(--ease-out), opacity 0.15s;
}
.ev-card.peeked .ev-card-date,
.ev-card.peeked .ev-card-desc,
.ev-card.peeked .ev-card-amount,
.ev-card.peeked .ev-card-schema {
  opacity: 0;
  pointer-events: none;
}
/* Au survol : expansion + premier plan */
.ev-card.peeked:hover {
  height: auto;
  overflow: visible;
  z-index: 999 !important;
}
.ev-card.peeked:hover .ev-card-date,
.ev-card.peeked:hover .ev-card-desc,
.ev-card.peeked:hover .ev-card-amount,
.ev-card.peeked:hover .ev-card-schema {
  opacity: 1;
  pointer-events: auto;
}
/* Badge de profondeur d'empilement */
.ev-card.peeked::after {
  content: attr(data-stack-depth);
  position: absolute;
  bottom: 5px;
  right: 8px;
  font-family: var(--font-mono);
  font-size: 7.5px;
  color: var(--dust);
  opacity: 0.6;
}


/* ═══════════════════════════════════════════
   FORMES DE DOTS PAR SCHEMA / TYPE
═══════════════════════════════════════════ */
/* CourtCase — carré arrondi (border-radius: 3px) */
.ev-dot--court {
  border-radius: 3px;
}
/* Event RJ — carré marron, taille légèrement augmentée */
.ev-dot--rj {
  border-radius: 3px;
  background: #7a2e14 !important;
  border-color: rgba(255,255,255,0.3);
  width:  calc(var(--dot-r) * 2.1);
  height: calc(var(--dot-r) * 2.1);
}
/* Event LJ — carré noir */
.ev-dot--lj {
  border-radius: 3px;
  background: #111111 !important;
  border-color: rgba(255,255,255,0.2);
  width:  calc(var(--dot-r) * 2.1);
  height: calc(var(--dot-r) * 2.1);
}
/* Directorship — losange (carré 45°) */
.ev-dot--directorship {
  border-radius: 2px;
  transform: translateX(-50%) rotate(45deg);
  width:  calc(var(--dot-r) * 1.5);
  height: calc(var(--dot-r) * 1.5);
  opacity: 0.85;
}
.ev-dot--directorship:hover {
  transform: translateX(-50%) rotate(45deg) scale(1.35);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.30);
}
/* Ownership — triangle (pseudo-clip) */
.ev-dot--ownership {
  border-radius: 50% 50% 0 50%;
  transform: translateX(-50%) rotate(-45deg);
  opacity: 0.82;
}
.ev-dot--ownership:hover {
  transform: translateX(-50%) rotate(-45deg) scale(1.35);
}
/* Document — carré à coins coupés */
.ev-dot--document {
  border-radius: 3px 0 3px 3px;
  opacity: 0.88;
}
.ev-dot--document::after {
  content: '';
  position: absolute;
  top: -1px; right: -1px;
  width: 5px; height: 5px;
  background: var(--smoke);
  border-left: 1px solid rgba(255,255,255,0.4);
  border-bottom: 1px solid rgba(255,255,255,0.4);
}

/* Tick horizontal — événements génériques (schema Event sans catégorie proc.) */
.ev-dot--tick {
  width: calc(var(--dot-r) * 2.5);
  height: 3px;
  border-radius: 1.5px;
  top: calc(var(--dot-r) - 1.5px);   /* centrage vertical : DOT_R − tickH/2 */
  transform: translateX(-50%);        /* centrage horizontal seulement */
  border: none;
  opacity: 0.75;
}
.ev-dot--tick:hover {
  transform: translateX(-50%) scaleX(1.4);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.30);
  opacity: 1;
}
/* Payment — cercle vide, plus petit */
.ev-dot--payment {
  background: transparent !important;
  border: 2.5px solid currentColor;
  width:  calc(var(--dot-r) * 1.6);
  height: calc(var(--dot-r) * 1.6);
  box-shadow: none;
}

/* ═══════════════════════════════════════════
   STYLES DE CARTES PAR TYPE PROCÉDURAL / SCHEMA
═══════════════════════════════════════════ */
/* Redressement judiciaire — fond marron chaud */
.ev-card--rj {
  background: #6b2710;
  border-color: rgba(255,255,255,0.10);
  border-left-color: #bf7040 !important; /* barre gauche plus claire */
}
.ev-card--rj .ev-card-title,
.ev-card--rj .ev-card-desc,
.ev-card--rj .ev-card-date,
.ev-card--rj .ev-card-schema { color: rgba(255,235,215,0.92); }
.ev-card--rj .ev-card-amount { color: #ffd080 !important; }
.ev-card--rj .ev-dot-label   { color: #d4905a; }

/* Liquidation judiciaire — fond charbon */
.ev-card--lj {
  background: #111216;
  border-color: rgba(255,255,255,0.07);
  border-left-color: #505060 !important;
}
.ev-card--lj .ev-card-title,
.ev-card--lj .ev-card-desc,
.ev-card--lj .ev-card-date,
.ev-card--lj .ev-card-schema { color: rgba(230,225,220,0.90); }
.ev-card--lj .ev-card-amount { color: #c8b8f0 !important; }

/* Directorship — sans fond ni bordure (sauf left) */
.ev-card--directorship {
  background: transparent;
  border-top: none;
  border-right: none;
  border-bottom: none;
  box-shadow: none;
}
.ev-card--directorship .ev-card-title,
.ev-card--directorship .ev-card-desc {
  text-shadow: 0 0 6px rgba(255,255,255,0.9), 0 0 12px rgba(255,255,255,0.6);
  color: var(--ink);
}

/* Ownership — sans fond, légère teinte */
.ev-card--ownership {
  background: rgba(255,255,255,0.45);
  border-top: none;
  border-right: none;
  border-bottom: none;
  box-shadow: none;
}

/* Payment — transparent comme Directorship */
.ev-card--payment {
  background: transparent;
  border-top: none;
  border-right: none;
  border-bottom: none;
  box-shadow: none;
}
.ev-card--payment .ev-card-title,
.ev-card--payment .ev-card-amount {
  text-shadow: 0 0 6px rgba(255,255,255,0.9), 0 0 10px rgba(255,255,255,0.5);
}

/* Document — transparent (BODACC, dépôts, actes) */
.ev-card--document {
  background: transparent;
  border-top: none;
  border-right: none;
  border-bottom: none;
  box-shadow: none;
}
.ev-card--document .ev-card-title,
.ev-card--document .ev-card-desc,
.ev-card--document .ev-card-date {
  text-shadow: 0 0 5px rgba(255,255,255,0.95), 0 0 10px rgba(255,255,255,0.7);
  color: var(--ink);
}

/* CourtCase — fond très légèrement teinté selon l'axe (borde left seule couleur forte) */
.ev-card--court {
  background: #f8f4ff;
  border-color: rgba(80,40,160,0.15);
}


/* ── Opacification au survol des cartes à fond transparent/semi-transparent ── */
.ev-card--directorship:hover,
.ev-card--payment:hover,
.ev-card--document:hover,
.ev-card--ownership:hover {
  background: rgba(252, 251, 249, 0.97) !important;
  box-shadow: 0 4px 18px rgba(10,11,13,0.11), 0 1px 4px rgba(10,11,13,0.06) !important;
  border-top: 1px solid var(--wire) !important;
  border-right: 1px solid var(--wire) !important;
  border-bottom: 1px solid var(--wire) !important;
}
/* Supprimer le text-shadow blanc une fois la carte opaque */
.ev-card--directorship:hover .ev-card-title,
.ev-card--directorship:hover .ev-card-desc,
.ev-card--payment:hover .ev-card-title,
.ev-card--payment:hover .ev-card-amount,
.ev-card--document:hover .ev-card-title,
.ev-card--document:hover .ev-card-desc,
.ev-card--document:hover .ev-card-date,
.ev-card--ownership:hover .ev-card-title {
  text-shadow: none !important;
}
/* Surlignage indirect : cartes transparentes restent transparentes (lisibilité via text-shadow) */
/* Alert : toujours prioritaire sur les variantes ci-dessus */
.ev-card.is-alert {
  border-left-color: var(--red) !important;
}
/* muted state */
.ev-anchor.axis-hidden { opacity: 0; pointer-events: none; transition: opacity 0.2s; }

/* ═══════════════════════════════════════════
   CONNECTOR LINES (SVG)
═══════════════════════════════════════════ */
.connector-line {
  stroke-width: 1;
  stroke-dasharray: 4 3;
  fill: none;
  opacity: 0;
  transition: opacity 0.2s;
}
.connector-line.visible { opacity: 0.5; }

/* Trait permanent reliant chaque carte à son dot sur bande */
.dot-card-line {
  stroke-width: 1.5;
  stroke-dasharray: 4 4;
  fill: none;
  stroke-opacity: 0;        /* invisible par défaut — apparaît uniquement au surlignage */
  transition: stroke-opacity 0.12s;
  pointer-events: none;
}
.dot-card-line.highlighted,
.dot-card-line.band-hovered {
  stroke-opacity: 0.80 !important;
  stroke-dasharray: none;
  stroke-width: 2;
}

/* ── Ligne CDP personne (traversant toute la frise) ── */
.person-cdp-line {
  stroke-width: 1.5;
  stroke-dasharray: 6 4;
  fill: none;
  stroke-opacity: 0.55;
}
.person-cdp-line:hover {
  stroke-opacity: 0.9;
  stroke-width: 2.5;
  cursor: pointer;
}

/* ═══════════════════════════════════════════
   MODAL
═══════════════════════════════════════════ */
#modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(10,11,13,0.45);
  z-index: 500;
  display: none;
  align-items: flex-start;
  justify-content: flex-end;
  backdrop-filter: blur(3px);
}
#modal-backdrop.open { display: flex; }

#modal-panel {
  width: 420px;
  max-width: 95vw;
  height: 100vh;
  background: #fff;
  border-left: 1px solid var(--wire);
  display: flex;
  flex-direction: column;
  animation: slide-in 0.28s var(--ease-out);
  overflow: hidden;
}
@keyframes slide-in {
  from { transform: translateX(40px); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}

#modal-header {
  padding: 20px 22px 16px;
  border-bottom: 1px solid var(--wire2);
  flex-shrink: 0;
}
.modal-axis-tag {
  font-family: var(--font-mono);
  font-size: 8.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #fff;
  padding: 2px 7px;
  border-radius: 2px;
  display: inline-block;
  margin-bottom: 8px;
}
.modal-schema-tag {
  font-family: var(--font-mono);
  font-size: 8.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--dust);
  margin-left: 6px;
}
#modal-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 600;
  line-height: 1.25;
  color: var(--ink);
  margin-bottom: 4px;
}
#modal-date {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--dust);
  letter-spacing: 0.06em;
}
.modal-close {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 30px; height: 30px;
  border: none;
  background: var(--smoke2);
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--dust2);
  transition: background 0.15s;
}
.modal-close:hover { background: var(--smoke3); }

#modal-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px 22px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
#modal-body::-webkit-scrollbar { width: 4px; }
#modal-body::-webkit-scrollbar-thumb { background: var(--wire); border-radius: 2px; }

.modal-section-label {
  font-family: var(--font-mono);
  font-size: 8.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--dust);
  margin-bottom: 6px;
}

.modal-description {
  font-size: 13px;
  line-height: 1.65;
  color: var(--ink2);
}

.modal-amount {
  font-family: var(--font-mono);
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.02em;
}

.modal-prop-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px 16px;
}
.modal-prop { display: flex; flex-direction: column; gap: 2px; }
.modal-prop-key {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--dust);
}
.modal-prop-val {
  font-size: 12px;
  color: var(--ink);
  word-break: break-word;
}

.modal-refs { display: flex; flex-direction: column; gap: 8px; }
.modal-ref-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  background: var(--smoke);
  border-radius: 3px;
  text-decoration: none;
  transition: background 0.12s;
}
.modal-ref-card:hover { background: var(--smoke2); }
.modal-ref-schema {
  font-family: var(--font-mono);
  font-size: 7.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #fff;
  padding: 2px 5px;
  border-radius: 2px;
  white-space: nowrap;
  flex-shrink: 0;
}
.modal-ref-name {
  font-size: 12px;
  color: var(--ink);
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.modal-source-link {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  background: var(--smoke);
  border-radius: 3px;
  text-decoration: none;
  transition: background 0.12s;
  border: 1px solid var(--wire2);
}
.modal-source-link:hover { background: var(--smoke2); }
.modal-source-icon { font-size: 12px; flex-shrink: 0; }
.modal-source-text { display: flex; flex-direction: column; min-width: 0; }
.modal-source-label { font-size: 11px; font-weight: 500; color: var(--ink); }
.modal-source-url {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--dust);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ═══════════════════════════════════════════
   LOADER / ERROR
═══════════════════════════════════════════ */
#loader {
  position: fixed;
  inset: 0;
  background: var(--smoke);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 999;
  transition: opacity 0.3s;
}
#loader.done { opacity: 0; pointer-events: none; }

.loader-sigil {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 300;
  color: var(--dust);
  animation: loader-pulse 1.8s ease-in-out infinite;
}
@keyframes loader-pulse {
  0%, 100% { opacity: 0.3; }
  50%       { opacity: 1; }
}
.loader-text {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--dust);
}
.loader-files { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
.loader-file {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--dust);
  display: flex;
  align-items: center;
  gap: 6px;
  transition: color 0.2s;
}
.loader-file.done { color: var(--green); }
.loader-file .lf-icon { font-size: 10px; }

/* ═══════════════════════════════════════════
   TOOLTIP
═══════════════════════════════════════════ */
#tooltip {
  position: fixed;
  background: var(--ink2);
  color: #e8e5e0;
  border-radius: 4px;
  padding: 7px 10px;
  font-size: 11px;
  pointer-events: none;
  z-index: 800;
  max-width: 220px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  display: none;
  line-height: 1.5;
}
#tooltip.visible { display: block; }
#tooltip strong {
  font-family: var(--font-display);
  font-size: 13px;
  display: block;
  margin-bottom: 2px;
}

/* ═══════════════════════════════════════════
   FOOTER INFO BAR
═══════════════════════════════════════════ */
/* ═══════════════════════════════════════════
   SCROLL TRACK (sticky mirror scrollbar under header)
═══════════════════════════════════════════ */
#scroll-track {
  position: sticky;
  top: var(--hd-h);          /* height of #app-header */
  z-index: 190;
  height: var(--st-trk);
  overflow-x: scroll;
  overflow-y: hidden;
  background: var(--ink2);
  border-bottom: 1px solid var(--ink3);
  scrollbar-width: thin;
  scrollbar-color: var(--wire) transparent;
}
#scroll-track::-webkit-scrollbar        { height: 6px; }
#scroll-track::-webkit-scrollbar-thumb  { background: var(--wire); border-radius: 3px; }
#scroll-track::-webkit-scrollbar-track  { background: transparent; }
#scroll-track-ghost { height: 1px; display: block; }

/* ── Heatmap densité ── */
#density-heatmap {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  opacity: 1;
}

/* ── Slider T dans l'info-bar ── */
#inf-scale-block {
  display: flex;
  align-items: center;
  gap: 7px;
  flex-shrink: 0;
}
#inf-scale-label {
  font-family: var(--font-mono);
  font-size: 8.5px;
  color: var(--dust);
  letter-spacing: 0.06em;
  white-space: nowrap;
  user-select: none;
}
#inf-scale-T {
  color: var(--amber);
  font-weight: 600;
}
#inf-scale-opt {
  color: var(--dust2);
  font-size: 7.5px;
}
#inf-scale-slider {
  -webkit-appearance: none;
  appearance: none;
  width: 90px;
  height: 3px;
  border-radius: 2px;
  background: var(--wire);
  outline: none;
  cursor: pointer;
}
#inf-scale-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--amber);
  cursor: pointer;
  border: none;
}
#inf-scale-slider::-moz-range-thumb {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--amber);
  cursor: pointer;
  border: none;
}
#inf-entropy-spark {
  display: inline-block;
  vertical-align: middle;
}
@media (max-width: 768px) { #inf-scale-block { display: none; } }

#info-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: var(--ib-h);
  background: var(--ink2);
  border-top: 1px solid var(--ink3);
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 0 16px;
  z-index: 150;
  font-family: var(--font-mono);
  font-size: 8.5px;
  color: var(--dust);
  letter-spacing: 0.06em;
}
#info-bar span { white-space: nowrap; }

/* ── Recherche texte ── */
#inf-search {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 3px;
  color: #c8c4be;
  font-family: var(--font-mono);
  font-size: 9px;
  padding: 2px 7px;
  width: 130px;
  outline: none;
  transition: border-color 0.15s, width 0.2s;
}
#inf-search:focus {
  border-color: rgba(255,255,255,0.25);
  width: 180px;
}
#inf-search::placeholder { color: rgba(200,196,190,0.35); }

/* ── Filtres schéma ── */
.inf-schema-btn {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-family: var(--font-mono);
  font-size: 7.5px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: rgba(200,196,190,0.55);
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 3px;
  padding: 2px 6px;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
  user-select: none;
}
